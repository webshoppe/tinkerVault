<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Hermes Console</title>
<meta name="theme-color" content="#14161a" />
<meta name="description" content="Resolve Hermes approval-gated tool calls and browse sessions from any device." />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="favicon.ico" sizes="any" />
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Hermes" />
<style>
  :root {
    --bg: #14161a;
    --panel: #1d2026;
    --panel-2: #242830;
    --border: #333944;
    --text: #e6e8eb;
    --muted: #9aa3af;
    --accent: #4f8cff;
    --accent-2: #3a6fd8;
    --ok: #35c46a;
    --warn: #e0a83d;
    --danger: #e05555;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --radius: 10px;
    --radius-sm: 7px;
    --shadow: 0 2px 8px rgba(0,0,0,0.28);
    --shadow-lg: 0 8px 28px rgba(0,0,0,0.42);
    --ease: 0.16s cubic-bezier(.4,0,.2,1);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
  }
  body { display: flex; flex-direction: column; height: 100vh; }
  ::selection { background: rgba(79,140,255,0.35); }
  /* Scrollbars */
  * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  *::-webkit-scrollbar { width: 9px; height: 9px; }
  *::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }
  *::-webkit-scrollbar-thumb:hover { background: #454c59; }

  header {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px calc(10px + env(safe-area-inset-top, 0px));
    padding-top: 10px;
    background: linear-gradient(180deg, #20242c, var(--panel));
    border-bottom: 1px solid var(--border);
    flex: 0 0 auto;
    box-shadow: var(--shadow);
    z-index: 5;
  }
  header h1 {
    font-size: 15px; margin: 0; font-weight: 650; letter-spacing: 0.2px;
    background: linear-gradient(90deg, var(--text), var(--accent));
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  header h1 .app-version {
    font-size: 11px; font-weight: 500; letter-spacing: 0.3px;
    color: var(--muted); -webkit-text-fill-color: var(--muted);
    vertical-align: middle; margin-left: 2px; opacity: 0.85;
    font-family: var(--mono);
  }
  .status-dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--danger); flex: 0 0 auto;
    box-shadow: 0 0 0 3px rgba(224,85,85,0.16);
    transition: background var(--ease), box-shadow var(--ease);
  }
  .status-dot.ok { background: var(--ok); box-shadow: 0 0 0 3px rgba(53,196,106,0.18); }
  .status-dot.warn { background: var(--warn); box-shadow: 0 0 0 3px rgba(224,168,61,0.18); }
  header .spacer { flex: 1; }
  header .conn-info { font-size: 11px; color: var(--muted); font-family: var(--mono); }
  header button {
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 6px 11px; cursor: pointer; font-size: 12.5px; white-space: nowrap;
    transition: border-color var(--ease), background var(--ease), transform var(--ease);
  }
  header button:hover { border-color: var(--accent); background: #2b303a; }
  header button:active { transform: translateY(1px); }
  #installBtn { border-color: var(--accent); color: var(--accent); font-weight: 600; }
  #installBtn:hover { background: rgba(79,140,255,0.12); }

  main { flex: 1 1 auto; overflow-y: auto; padding: 16px 14px; scroll-behavior: smooth; }

  /* Connection panel */
  .panel {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px; max-width: 520px; margin: 0 auto 16px;
    box-shadow: var(--shadow-lg);
    animation: panelIn 0.18s ease;
  }
  @keyframes panelIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }
  .panel h2 {
    font-size: 13px; margin: 0 0 14px; font-weight: 650;
    text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted);
  }
  .field { margin-bottom: 13px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
  .field input {
    width: 100%; padding: 10px 11px; background: var(--bg);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--text); font-size: 14px; font-family: var(--mono);
    transition: border-color var(--ease), box-shadow var(--ease);
  }
  .field input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,140,255,0.16); }
  .row { display: flex; gap: 10px; }
  .row .field { flex: 1; }
  .btn {
    background: linear-gradient(180deg, var(--accent), var(--accent-2)); color: #fff; border: none;
    border-radius: var(--radius-sm); padding: 10px 16px; cursor: pointer;
    font-size: 14px; font-weight: 550; margin-right: 8px;
    transition: filter var(--ease), transform var(--ease), box-shadow var(--ease);
    box-shadow: var(--shadow);
  }
  .btn:hover { filter: brightness(1.08); }
  .btn:active { transform: translateY(1px); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; filter: none; transform: none; }
  .btn.secondary { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); box-shadow: none; }
  .btn.secondary:hover { border-color: var(--accent); }
  .btn.danger { background: linear-gradient(180deg, #e86a6a, var(--danger)); }
  .btn.ok { background: linear-gradient(180deg, #46d179, var(--ok)); }

  .conn-msg { font-size: 13px; margin-top: 10px; min-height: 18px; }
  .conn-msg.err { color: var(--danger); }
  .conn-msg.good { color: var(--ok); }

  .caps { margin-top: 12px; font-size: 12px; font-family: var(--mono); color: var(--muted); line-height: 1.9; }
  .caps span.on { color: var(--ok); }
  .caps span.off { color: var(--danger); }

  /* Sessions panel */
  .sessions-actions { display: flex; gap: 10px; margin-bottom: 12px; }
  .active-session {
    font-size: 12px; font-family: var(--mono); color: var(--muted);
    margin-bottom: 10px; min-height: 16px;
  }
  .active-session b { color: var(--ok); }
  .session-list { display: flex; flex-direction: column; gap: 6px; max-height: 50vh; overflow-y: auto; }
  .session-item {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px; background: var(--panel-2);
    border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: pointer;
    transition: border-color var(--ease), background var(--ease), transform var(--ease);
  }
  .session-item:hover { border-color: var(--accent); background: #2b303a; }
  .session-item:active { transform: scale(0.995); }
  .session-item.active { border-color: var(--ok); background: rgba(53,196,106,0.07); }
  .session-item .si-main { flex: 1; min-width: 0; }
  .session-item .si-title {
    font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .session-item .si-meta { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-top: 2px; }

  /* Chat */
  #chatArea { max-width: 760px; margin: 0 auto; }
  .msg {
    padding: 11px 14px; border-radius: var(--radius); margin-bottom: 10px;
    white-space: pre-wrap; word-break: break-word; line-height: 1.5;
    max-width: 88%; box-shadow: var(--shadow);
    animation: msgIn 0.16s ease;
  }
  @keyframes msgIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  .msg.user {
    background: linear-gradient(180deg, #2b3340, #262c37);
    border: 1px solid #3a4453; margin-left: auto;
    border-bottom-right-radius: 4px;
  }
  .msg.assistant {
    background: var(--panel); border: 1px solid var(--border);
    margin-right: auto; border-bottom-left-radius: 4px;
  }
  .msg .role { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 5px; opacity: 0.8; }
  .msg-row { display: flex; flex-direction: column; }
  .msg .body { font-size: 14px; }
  .msg-actions {
    display: flex; gap: 6px; margin-top: 8px;
  }
  .msg-action {
    font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.3px;
    color: var(--muted); background: var(--panel-2);
    border: 1px solid var(--border); border-radius: 5px;
    padding: 2px 8px; cursor: pointer; opacity: 0; transition: opacity 0.14s ease, color 0.14s ease, background 0.14s ease;
  }
  .msg:hover .msg-action { opacity: 0.9; }
  .msg-action:hover { color: var(--text); background: var(--border); }
  .msg-action.copied { color: var(--ok); border-color: var(--ok); opacity: 1; }

  .status-line {
    font-size: 12px; color: var(--muted); font-family: var(--mono);
    padding: 5px 12px; margin: 0 auto 8px; max-width: 760px;
    border-left: 2px solid var(--accent); background: rgba(79,140,255,0.05);
    border-radius: 0 6px 6px 0;
  }

  .approval-card {
    background: linear-gradient(180deg, #2e2818, #29230f); border: 1px solid var(--warn);
    border-radius: var(--radius); padding: 16px; margin: 0 auto 12px; max-width: 760px;
    box-shadow: 0 0 0 3px rgba(224,168,61,0.1), var(--shadow-lg);
    animation: msgIn 0.16s ease;
  }
  .approval-card h3 { margin: 0 0 10px; font-size: 14px; color: var(--warn); }
  .approval-card pre {
    background: #14161a; border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 11px; overflow-x: auto; font-size: 12px; font-family: var(--mono);
    margin: 8px 0; max-height: 240px;
  }
  .approval-actions { display: flex; gap: 10px; margin-top: 12px; }

  details.debug {
    margin: 0 auto 8px; max-width: 760px; border: 1px solid var(--border);
    border-radius: var(--radius-sm); background: var(--panel); overflow: hidden;
  }
  details.debug summary {
    padding: 7px 11px; font-size: 12px; color: var(--muted);
    cursor: pointer; font-family: var(--mono); user-select: none;
  }
  details.debug summary:hover { color: var(--text); }
  details.debug pre {
    margin: 0; padding: 11px; background: #0f1114; overflow-x: auto;
    font-size: 11px; font-family: var(--mono); border-top: 1px solid var(--border);
  }

  /* Composer */
  footer {
    flex: 0 0 auto; border-top: 1px solid var(--border);
    background: linear-gradient(0deg, #20242c, var(--panel));
    padding: 10px 14px calc(10px + env(safe-area-inset-bottom, 0px));
  }
  .composer { display: flex; gap: 10px; max-width: 760px; margin: 0 auto; align-items: flex-end; }
  .composer textarea {
    flex: 1; resize: none; min-height: 44px; max-height: 160px;
    padding: 11px 12px; background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); font-size: 14px; font-family: inherit;
    line-height: 1.4; transition: border-color var(--ease), box-shadow var(--ease);
  }
  .composer textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,140,255,0.16); }
  .composer textarea:disabled { opacity: 0.5; }
  .composer .stack { display: flex; flex-direction: column; gap: 6px; }
  .composer .stack .btn { margin-right: 0; }
  .powered-by {
    max-width: 760px; margin: 7px auto 0; text-align: center;
    font-size: 10.5px; color: var(--muted); font-family: var(--mono);
    letter-spacing: 0.2px; opacity: 0.75; min-height: 13px;
  }
  .hidden { display: none !important; }
</style>
</head>
<body>
<header>
  <div class="status-dot" id="statusDot" title="Disconnected"></div>
  <h1>Hermes Console <span class="app-version" id="appVersion">v…</span></h1>
  <div class="spacer"></div>
  <div class="conn-info" id="connInfo"></div>
  <button id="installBtn" class="hidden" title="Install Hermes Console">⬇ Install</button>
  <button id="forkBtn" class="hidden" title="Fork the active session">⑂ Fork</button>
  <button id="sessionsBtn" title="Browse sessions">☰ Sessions</button>
  <button id="settingsBtn" title="Connection settings">⚙ Settings</button>
</header>

<main>
  <!-- Connection panel -->
  <div class="panel" id="connPanel">
    <h2>Connection</h2>
    <div class="field">
      <label for="host">Host</label>
      <input id="host" type="text" placeholder="e.g. 192.168.1.20 or hermes.local" autocomplete="off" />
    </div>
    <div class="row">
      <div class="field">
        <label for="port">Port</label>
        <input id="port" type="text" placeholder="8642" autocomplete="off" />
      </div>
    </div>
    <div class="field">
      <label for="bearer">Bearer key</label>
      <input id="bearer" type="password" placeholder="API bearer key" autocomplete="off" />
    </div>
    <button class="btn" id="saveConnectBtn">Save &amp; Connect</button>
    <button class="btn secondary" id="clearBtn">Clear stored config</button>
    <div class="conn-msg" id="connMsg"></div>
    <div class="caps" id="capsView"></div>
  </div>

  <!-- Sessions panel -->
  <div class="panel hidden" id="sessionsPanel">
    <h2>Sessions</h2>
    <div class="sessions-actions">
      <button class="btn" id="newSessionBtn">+ New session</button>
      <button class="btn secondary" id="refreshSessionsBtn">Refresh</button>
    </div>
    <div class="conn-msg" id="sessionsMsg"></div>
    <div class="active-session" id="activeSessionInfo"></div>
    <div class="session-list" id="sessionList"></div>
  </div>

  <!-- Chat -->
  <div id="chatArea"></div>
</main>

<footer>
  <div class="composer">
    <textarea id="chatInput" placeholder="Type a message… (Enter to send, Shift+Enter for newline)" disabled></textarea>
    <div class="stack">
      <button class="btn" id="sendBtn" disabled>Send</button>
      <button class="btn danger hidden" id="stopBtn">Stop</button>
    </div>
  </div>
  <div class="powered-by" id="poweredBy"></div>
</footer>

<script>
"use strict";

/* ============================================================
   Hermes Console: Phase 1 (approval flow, end to end)
   Single-file PWA. Talks to a running Hermes API server via the Runs API.
   ============================================================ */

const CONFIG_KEY = "hermesConsoleConfig";

// ---- App state ----
const state = {
  config: null,          // { host, port, bearer }
  capabilities: null,    // full /v1/capabilities response
  features: {},          // capabilities.features (booleans)
  connected: false,
  activeRunId: null,     // current run id (null when no run active)
  sseAbort: null,        // AbortController for the current SSE fetch (SSE path only, disabled)
  pollTimer: null,       // setTimeout handle for the polling loop
  polling: false,        // true while the poll loop is active
  firstPollLogged: false,// log the raw shape of the first poll response per run
  assistantEl: null,     // DOM node for the streaming assistant message
  assistantText: "",     // accumulated assistant text
  approvalPending: false,
  approvalHandledFor: null, // run_id we've already shown an approval card for (avoid dupes while polling)
  activeSessionId: null,    // selected/created session; sent as session_id on POST /v1/runs
  firstSessionsLogged: false, // log raw shape of first GET /api/sessions response
};

// ---- Monitoring mode ----
// SSE is DISABLED on this Hermes server: GET /v1/runs/{run_id}/events returns 200
// but WITHOUT an Access-Control-Allow-Origin header, so the browser blocks the
// cross-origin read ("CORS header 'Access-Control-Allow-Origin' missing").
// Every OTHER endpoint (health, capabilities, POST /v1/runs, /approval, /stop)
// sends CORS correctly; this gap is specific to the events stream.
// Until that's fixed server-side, we poll GET /v1/runs/{run_id} instead.
// Flip this to true to re-enable the fetch-based SSE reader once the header lands.
const USE_SSE = false;
const POLL_INTERVAL_MS = 1500;

// ---- DOM refs ----
const el = (id) => document.getElementById(id);
const dom = {
  statusDot: el("statusDot"),
  appVersion: el("appVersion"),
  connInfo: el("connInfo"),
  poweredBy: el("poweredBy"),
  installBtn: el("installBtn"),
  settingsBtn: el("settingsBtn"),
  sessionsBtn: el("sessionsBtn"),
  forkBtn: el("forkBtn"),
  connPanel: el("connPanel"),
  sessionsPanel: el("sessionsPanel"),
  newSessionBtn: el("newSessionBtn"),
  refreshSessionsBtn: el("refreshSessionsBtn"),
  sessionsMsg: el("sessionsMsg"),
  activeSessionInfo: el("activeSessionInfo"),
  sessionList: el("sessionList"),
  host: el("host"),
  port: el("port"),
  bearer: el("bearer"),
  saveConnectBtn: el("saveConnectBtn"),
  clearBtn: el("clearBtn"),
  connMsg: el("connMsg"),
  capsView: el("capsView"),
  chatArea: el("chatArea"),
  chatInput: el("chatInput"),
  sendBtn: el("sendBtn"),
  stopBtn: el("stopBtn"),
};

// ============================================================
// Config / localStorage
// ============================================================
function loadConfig() {
  try {
    const raw = localStorage.getItem(CONFIG_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (e) {
    console.warn("Failed to parse stored config:", e);
    return null;
  }
}

function saveConfig(cfg) {
  localStorage.setItem(CONFIG_KEY, JSON.stringify(cfg));
}

function clearConfig() {
  localStorage.removeItem(CONFIG_KEY);
}

function baseUrl() {
  const { host, port } = state.config;
  return `http://${host}:${port}`;
}

function authHeaders(extra) {
  return Object.assign(
    { "Authorization": "Bearer " + state.config.bearer },
    extra || {}
  );
}

// ============================================================
// UI helpers
// ============================================================
function setStatus(kind, title) {
  dom.statusDot.className = "status-dot" + (kind ? " " + kind : "");
  dom.statusDot.title = title || "";
}

function setConnMsg(text, kind) {
  dom.connMsg.textContent = text || "";
  dom.connMsg.className = "conn-msg" + (kind ? " " + kind : "");
}

function showPanel(show) {
  dom.connPanel.classList.toggle("hidden", !show);
  if (show) dom.sessionsPanel.classList.add("hidden");
}

function showSessionsPanel(show) {
  dom.sessionsPanel.classList.toggle("hidden", !show);
  if (show) dom.connPanel.classList.add("hidden");
}

function setComposerEnabled(enabled) {
  dom.chatInput.disabled = !enabled;
  dom.sendBtn.disabled = !enabled;
}

function renderCapabilities() {
  if (!state.features || Object.keys(state.features).length === 0) {
    dom.capsView.textContent = "";
    return;
  }
  const parts = Object.entries(state.features).map(([k, v]) => {
    const cls = v ? "on" : "off";
    const mark = v ? "✓" : "✗";
    return `<span class="${cls}">${mark} ${k}</span>`;
  });
  dom.capsView.innerHTML = "Features: " + parts.join("&nbsp;&nbsp;");
}

// Static, read-only "Powered by: <agent> <version>" line, sourced from whatever
// GET /v1/capabilities already reports for model/agent identity. No new endpoint.
// Field names aren't contractually fixed, so probe several plausible locations
// on the stored capabilities response and degrade gracefully if absent.
function renderPoweredBy() {
  const c = state.capabilities;
  if (!c || typeof c !== "object") { dom.poweredBy.textContent = ""; return; }
  const str = (v) => (typeof v === "string" && v.trim()) ? v.trim() : null;
  const agent =
    str(c.agent) || str(c.agent_name) || str(c.name) || str(c.model) || str(c.model_name) ||
    (c.model && str(c.model.name)) ||
    (c.agent && str(c.agent.name)) ||
    (c.server && (str(c.server.name) || str(c.server.agent))) ||
    (c.info && (str(c.info.agent) || str(c.info.name))) || null;
  const version =
    str(c.version) || str(c.agent_version) || str(c.model_version) || str(c.build) ||
    (c.agent && str(c.agent.version)) ||
    (c.model && str(c.model.version)) ||
    (c.server && str(c.server.version)) ||
    (c.info && str(c.info.version)) || null;
  if (!agent && !version) { dom.poweredBy.textContent = ""; return; }
  const label = [agent, version].filter(Boolean).join(" ");
  dom.poweredBy.textContent = "Powered by: " + label;
}

function featureOn(name) {
  return !!(state.features && state.features[name] === true);
}

// Append a chat message container. role = "user" | "assistant"
function addMessage(role, text) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  const row = document.createElement("div");
  row.className = "msg-row";

  const roleEl = document.createElement("div");
  roleEl.className = "role";
  roleEl.textContent = role;
  const body = document.createElement("div");
  body.className = "body";
  body.textContent = text || "";

  row.appendChild(roleEl);
  row.appendChild(body);
  div.appendChild(row);

  // Per-message toolbar (Phase 1.1): Copy on every message, Rerun on user msgs.
  const tb = document.createElement("div");
  tb.className = "msg-actions";
  const copyBtn = document.createElement("button");
  copyBtn.className = "msg-action";
  copyBtn.type = "button";
  copyBtn.textContent = "Copy";
  copyBtn.title = "Copy this message";
  copyBtn.addEventListener("click", () => copyMessage(div, body.textContent));
  tb.appendChild(copyBtn);
  if (role === "user") {
    const rerunBtn = document.createElement("button");
    rerunBtn.className = "msg-action";
    rerunBtn.type = "button";
    rerunBtn.textContent = "Rerun";
    rerunBtn.title = "Send this input again";
    rerunBtn.addEventListener("click", () => rerunMessage(body.textContent));
    tb.appendChild(rerunBtn);
  }
  div.appendChild(tb);

  dom.chatArea.appendChild(div);
  scrollToBottom();
  return body;
}

// Copy a message's raw text via the Clipboard API. We read from the stored
// element text (the same string shown), not from the DOM node passed in, so
// what gets copied is exactly what was rendered.
async function copyMessage(div, text) {
  const btn = div.querySelector(".msg-action");
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(text);
    } else {
      legacyCopy(text);
    }
    flashCopied(btn);
    console.log("[copy] wrote", JSON.stringify(text.slice(0, 80) + (text.length > 80 ? "…" : "")));
  } catch (e) {
    console.error("[copy] failed, falling back", e);
    legacyCopy(text);
    flashCopied(btn);
  }
}

function legacyCopy(text) {
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed";
  ta.style.opacity = "0";
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand("copy"); } catch (e) {}
  document.body.removeChild(ta);
}

function flashCopied(btn) {
  if (!btn) return;
  const prev = btn.textContent;
  btn.textContent = "Copied";
  btn.classList.add("copied");
  setTimeout(() => { btn.textContent = prev; btn.classList.remove("copied"); }, 1200);
}

// Rerun: resubmit the exact input as a new run via the existing send path.
// "Send this again": no history replay, no edit step (out of scope).
function rerunMessage(text) {
  console.log("[rerun] resubmitting", JSON.stringify(text.slice(0, 80) + (text.length > 80 ? "…" : "")));
  sendMessage(text);
}

function addStatusLine(text) {
  const div = document.createElement("div");
  div.className = "status-line";
  div.textContent = text;
  dom.chatArea.appendChild(div);
  scrollToBottom();
  return div;
}

// Collapsible debug panel for unrecognized / raw events
function addDebugPanel(label, obj) {
  const det = document.createElement("details");
  det.className = "debug";
  const sum = document.createElement("summary");
  sum.textContent = "debug: " + label;
  const pre = document.createElement("pre");
  try { pre.textContent = JSON.stringify(obj, null, 2); }
  catch (e) { pre.textContent = String(obj); }
  det.appendChild(sum);
  det.appendChild(pre);
  dom.chatArea.appendChild(det);
  scrollToBottom();
  return det;
}

function scrollToBottom() {
  const main = document.querySelector("main");
  main.scrollTop = main.scrollHeight;
}

// ============================================================
// Connection: health + capabilities
// ============================================================
async function connect() {
  setConnMsg("Connecting…");
  setStatus("warn", "Connecting");
  state.connected = false;
  setComposerEnabled(false);

  // 1. Health check
  try {
    const hres = await fetch(baseUrl() + "/health", { method: "GET" });
    if (!hres.ok) throw new Error("HTTP " + hres.status);
    const hjson = await hres.json();
    if (!hjson || hjson.status !== "ok") {
      throw new Error("unexpected health payload: " + JSON.stringify(hjson));
    }
    console.log("[health] ok", hjson);
  } catch (e) {
    setConnMsg("Health check failed: " + e.message, "err");
    setStatus("", "Disconnected");
    console.error("[health] failed", e);
    return false;
  }

  // 2. Capabilities
  try {
    const cres = await fetch(baseUrl() + "/v1/capabilities", {
      method: "GET",
      headers: authHeaders(),
    });
    if (!cres.ok) throw new Error("HTTP " + cres.status);
    const cjson = await cres.json();
    state.capabilities = cjson;
    state.features = (cjson && cjson.features) ? cjson.features : {};
    console.log("[capabilities]", cjson);
  } catch (e) {
    setConnMsg("Capabilities request failed: " + e.message, "err");
    setStatus("", "Disconnected");
    console.error("[capabilities] failed", e);
    return false;
  }

  // Connected
  state.connected = true;
  setStatus("ok", "Connected");
  setConnMsg("Connected.", "good");
  renderCapabilities();
  renderPoweredBy();
  dom.connInfo.textContent = `${state.config.host}:${state.config.port}`;

  // Gate UI on features. run_submission controls whether we can send at all.
  const canSubmit = featureOn("run_submission");
  setComposerEnabled(canSubmit);
  if (!canSubmit) {
    setConnMsg("Connected, but server does not advertise run_submission; sending disabled.", "err");
  }

  // Hide panel once connected.
  showPanel(false);
  return true;
}

// ============================================================
// Sending a run + SSE streaming
// ============================================================
async function sendMessage(text) {
  // When called with an explicit string (e.g. Rerun button), use that; otherwise
  // read from the composer input. Note: the click handler passes a PointerEvent
  // as the first arg, so we only treat genuinely-string args as explicit text.
  if (typeof text !== "string") text = dom.chatInput.value.trim();
  else text = text.trim();
  if (!text) return;
  if (!state.connected) { setConnMsg("Not connected.", "err"); return; }
  if (state.activeRunId) { console.warn("A run is already active."); return; }

  dom.chatInput.value = "";
  addMessage("user", text);

  // Reset streaming assistant state
  state.assistantEl = null;
  state.assistantText = "";
  state.approvalPending = false;
  state.approvalHandledFor = null;
  state.firstPollLogged = false;

  let runId = null;
  try {
    // Include session_id once a session is active, so messages accumulate into
    // one conversation instead of each run spawning its own orphan session.
    const runBody = { input: text };
    if (state.activeSessionId) runBody.session_id = state.activeSessionId;
    const res = await fetch(baseUrl() + "/v1/runs", {
      method: "POST",
      headers: authHeaders({ "Content-Type": "application/json" }),
      body: JSON.stringify(runBody),
    });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const json = await res.json();
    console.log("[POST /v1/runs] response", json);
    runId = json.run_id;
    if (!runId) throw new Error("no run_id in response: " + JSON.stringify(json));
    if (json.status && json.status !== "started") {
      console.warn("[POST /v1/runs] unexpected status:", json.status);
    }
    // If we had no active session, adopt the one this run belongs to so the
    // NEXT message continues the same conversation. Note: when no session_id is
    // supplied, this server returns session_id === run_id (confirmed live);
    // adopting it still threads subsequent messages correctly.
    if (!state.activeSessionId && json.session_id) {
      setActiveSession(json.session_id);
      console.log("[session] adopted session from run:", json.session_id);
    }
  } catch (e) {
    addStatusLine("Failed to start run: " + e.message);
    console.error("[POST /v1/runs] failed", e);
    return;
  }

  state.activeRunId = runId;
  setRunActiveUI(true);
  addStatusLine("Run started: " + runId);

  // Monitor the run. SSE is disabled (see USE_SSE / CORS note above), so we poll.
  if (USE_SSE) {
    streamEvents(runId);
  } else {
    startPolling(runId);
  }
}

function setRunActiveUI(active) {
  // Stop button only when run_stop feature present.
  const showStop = active && featureOn("run_stop");
  dom.stopBtn.classList.toggle("hidden", !showStop);
  // Disable send while a run is active.
  dom.sendBtn.disabled = active || !featureOn("run_submission");
  dom.chatInput.disabled = active;
}

// ============================================================
// Polling-based run monitoring (ACTIVE PATH)
// ------------------------------------------------------------
// SSE (GET /v1/runs/{id}/events) is blocked by a missing CORS header on this
// server, so we poll GET /v1/runs/{id} on an interval instead. On the very
// first poll we log the raw response shape so field names can be confirmed
// against reality rather than assumed.
// ============================================================
function startPolling(runId) {
  state.polling = true;
  pollOnce(runId);
}

function stopPolling() {
  state.polling = false;
  if (state.pollTimer) { clearTimeout(state.pollTimer); state.pollTimer = null; }
}

async function pollOnce(runId) {
  // Bail if this run is no longer the active one (stopped, superseded, etc).
  if (!state.polling || state.activeRunId !== runId) return;
  // While an approval card is showing we pause polling until the decision resumes it.
  if (state.approvalPending) return;

  const url = baseUrl() + "/v1/runs/" + encodeURIComponent(runId);
  let run;
  try {
    const res = await fetch(url, { method: "GET", headers: authHeaders() });
    if (!res.ok) throw new Error("HTTP " + res.status);
    run = await res.json();
  } catch (e) {
    addStatusLine("Poll error: " + e.message);
    console.error("[GET /v1/runs/{id}] failed", e);
    finishRun();
    return;
  }

  // Log the FULL raw shape of the first poll so we can confirm real field names.
  if (!state.firstPollLogged) {
    state.firstPollLogged = true;
    console.log("[poll] FIRST raw run object for", runId, run);
    addDebugPanel("first poll: run object", run);
  } else {
    const st = (run.status || run.state || "(none)").toString();
    console.log(`[poll] run=${runId} status=${st}`, run);
  }

  // Approval-pending? Reuse the same isolated detector used by the SSE path.
  if (isApprovalPending(run)) {
    if (state.approvalHandledFor !== runId) {
      state.approvalHandledFor = runId;
      handleApprovalPending(run, runId);
    }
    return; // handleApprovalPending pauses polling; decide() resumes it.
  }

  // Render any assistant output carried by the run object.
  renderRunOutput(run);

  // Terminal?
  const term = terminalStatus(run);
  if (term) {
    addStatusLine("Run " + term + ".");
    finishRun();
    return;
  }

  // Not done; schedule the next poll.
  state.pollTimer = setTimeout(() => pollOnce(runId), POLL_INTERVAL_MS);
}

// Render assistant text from a polled run object. Because polling returns
// cumulative state (not deltas), we set the assistant bubble to the full text
// each time rather than appending. Tries several plausible field locations.
function renderRunOutput(run) {
  let text = null;
  if (typeof run.output === "string") text = run.output;
  else if (run.output && typeof run.output === "object") {
    if (typeof run.output.text === "string") text = run.output.text;
    else if (typeof run.output.content === "string") text = run.output.content;
  }
  if (text === null && typeof run.text === "string") text = run.text;
  if (text === null && typeof run.content === "string") text = run.content;
  // Some servers return a messages array; take the last assistant message.
  if (text === null && Array.isArray(run.messages)) {
    for (let i = run.messages.length - 1; i >= 0; i--) {
      const m = run.messages[i];
      if (m && (m.role === "assistant" || !m.role)) {
        if (typeof m.content === "string") { text = m.content; break; }
        if (Array.isArray(m.content)) {
          text = m.content.map(c => (typeof c === "string" ? c : (c && c.text) || "")).join("");
          break;
        }
      }
    }
  }
  if (text === null) return; // nothing renderable yet
  if (!state.assistantEl) state.assistantEl = addMessage("assistant", "");
  state.assistantText = text;
  state.assistantEl.textContent = text;
  scrollToBottom();
}

// ============================================================
// SSE-based run monitoring (DISABLED, kept for when CORS is fixed)
// ------------------------------------------------------------
// This fetch()-based SSE reader is intentionally left in place but gated behind
// USE_SSE (currently false). It is DISABLED specifically because on this Hermes
// server GET /v1/runs/{run_id}/events responds 200 WITHOUT an
// Access-Control-Allow-Origin header, so the browser blocks the cross-origin
// read. This is the only endpoint with that gap. When the server starts sending
// the CORS header on the events stream, flip USE_SSE back to true to prefer
// real-time streaming over polling.
// ============================================================
async function streamEvents(runId) {
  if (!featureOn("run_events_sse")) {
    addStatusLine("Server does not advertise run_events_sse; cannot stream events.");
    console.warn("[SSE] run_events_sse not enabled");
    finishRun();
    return;
  }

  const ac = new AbortController();
  state.sseAbort = ac;
  const url = baseUrl() + "/v1/runs/" + encodeURIComponent(runId) + "/events";

  try {
    const res = await fetch(url, {
      method: "GET",
      headers: authHeaders({ "Accept": "text/event-stream" }),
      signal: ac.signal,
    });
    if (!res.ok) throw new Error("HTTP " + res.status);
    if (!res.body) throw new Error("no response body (ReadableStream unavailable)");

    const reader = res.body.getReader();
    const decoder = new TextDecoder("utf-8");
    let buffer = "";

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      // SSE frames are separated by a blank line.
      let sep;
      while ((sep = buffer.indexOf("\n\n")) !== -1) {
        const rawFrame = buffer.slice(0, sep);
        buffer = buffer.slice(sep + 2);
        handleSseFrame(rawFrame, runId);
      }
      // Handle CRLF-style separators too.
      while ((sep = buffer.indexOf("\r\n\r\n")) !== -1) {
        const rawFrame = buffer.slice(0, sep);
        buffer = buffer.slice(sep + 4);
        handleSseFrame(rawFrame, runId);
      }
    }
    // Flush any trailing frame.
    if (buffer.trim()) handleSseFrame(buffer, runId);
    console.log("[SSE] stream closed for run", runId);
  } catch (e) {
    if (e.name === "AbortError") {
      console.log("[SSE] aborted for run", runId);
    } else {
      addStatusLine("Event stream error: " + e.message);
      console.error("[SSE] error", e);
    }
  } finally {
    // If the stream ended naturally and we're not paused on approval, finish.
    if (!state.approvalPending) finishRun();
  }
}

// Parse one SSE frame into { event, data } and dispatch.
function handleSseFrame(rawFrame, runId) {
  const lines = rawFrame.split(/\r?\n/);
  let eventName = null;
  const dataLines = [];
  for (const line of lines) {
    if (line.startsWith(":")) continue; // comment / keepalive
    if (line.startsWith("event:")) {
      eventName = line.slice(6).trim();
    } else if (line.startsWith("data:")) {
      dataLines.push(line.slice(5).replace(/^ /, ""));
    }
  }
  const dataStr = dataLines.join("\n");
  if (!dataStr && !eventName) return; // nothing useful

  let data;
  try { data = dataStr ? JSON.parse(dataStr) : {}; }
  catch (e) { data = { _raw: dataStr }; }

  // Attach the SSE event name if present.
  if (eventName && typeof data === "object" && data !== null && data.type === undefined) {
    data._sseEvent = eventName;
  }
  dispatchEvent(data, eventName, runId);
}

// ============================================================
// Event dispatch / render loop
// ============================================================
function dispatchEvent(event, sseEventName, runId) {
  // Log EVERY event's raw type/status so the real shape is easy to spot on first live test.
  const typeGuess = event.type || event.event || sseEventName || "(none)";
  const statusGuess = event.status || (event.data && event.data.status) || "(none)";
  console.log(`[event] type=${typeGuess} status=${statusGuess}`, event);

  // 1. Approval check FIRST; isolated function, easy to correct later.
  if (isApprovalPending(event)) {
    handleApprovalPending(event, runId);
    return;
  }

  // 2. Token / text deltas.
  const delta = extractTextDelta(event);
  if (delta !== null) {
    appendAssistantText(delta);
    return;
  }

  // 3. Tool-call / tool-progress → inline status line.
  if (isToolEvent(event)) {
    addStatusLine(describeToolEvent(event));
    return;
  }

  // 4. Terminal statuses.
  const term = terminalStatus(event);
  if (term) {
    addStatusLine("Run " + term + ".");
    // finishRun handled by stream close / finally, but mark done here too.
    if (term === "completed" || term === "failed" || term === "stopped" || term === "error") {
      // let the stream close naturally; nothing else to do.
    }
    return;
  }

  // 5. Unrecognized shape → raw JSON in collapsible debug panel + console.log.
  addDebugPanel(typeGuess, event);
}

// ---- Isolated, easy-to-correct approval detector ----
// Best guess: status field "requires_approval"/"pending_approval",
// or an event type/name containing "approval". Correct this after first live test.
function isApprovalPending(event) {
  if (!event || typeof event !== "object") return false;
  const status = (event.status || "").toString().toLowerCase();
  const type = (event.type || event.event || event._sseEvent || "").toString().toLowerCase();
  if (status === "requires_approval" || status === "pending_approval") return true;
  if (status.includes("approval")) return true;
  if (type.includes("approval")) return true;
  // Some servers may nest under event.data.
  if (event.data && typeof event.data === "object") {
    const ds = (event.data.status || "").toString().toLowerCase();
    if (ds.includes("approval")) return true;
  }
  return false;
}

// Extract a text/token delta from an event, or null if none.
function extractTextDelta(event) {
  if (!event || typeof event !== "object") return null;
  const type = (event.type || event.event || event._sseEvent || "").toString().toLowerCase();

  // Common shapes: {type:"token", token:"..."} / {type:"text.delta", delta:"..."} /
  // {type:"...delta", content:"..."} / {delta:{text:"..."}}
  if (typeof event.token === "string") return event.token;
  if (typeof event.text === "string" && type.includes("delta")) return event.text;
  if (typeof event.delta === "string") return event.delta;
  if (event.delta && typeof event.delta === "object") {
    if (typeof event.delta.text === "string") return event.delta.text;
    if (typeof event.delta.content === "string") return event.delta.content;
  }
  if (typeof event.content === "string" && (type.includes("token") || type.includes("delta") || type.includes("text"))) {
    return event.content;
  }
  return null;
}

function isToolEvent(event) {
  const type = (event.type || event.event || event._sseEvent || "").toString().toLowerCase();
  return type.includes("tool");
}

function describeToolEvent(event) {
  const type = (event.type || event.event || event._sseEvent || "tool").toString();
  const name = event.name || event.tool || (event.tool_call && event.tool_call.name) ||
               (event.data && (event.data.name || event.data.tool)) || "";
  const status = event.status || (event.data && event.data.status) || "";
  let s = "🔧 " + type;
  if (name) s += " · " + name;
  if (status) s += " (" + status + ")";
  return s;
}

function terminalStatus(event) {
  const status = (event.status || (event.data && event.data.status) || "").toString().toLowerCase();
  const type = (event.type || event.event || event._sseEvent || "").toString().toLowerCase();
  const candidates = ["completed", "complete", "done", "finished", "failed", "error", "stopped", "cancelled", "canceled"];
  for (const c of candidates) {
    if (status === c || type.includes(c)) return c;
  }
  return null;
}

// ---- Streaming assistant text ----
function appendAssistantText(delta) {
  if (!state.assistantEl) {
    state.assistantEl = addMessage("assistant", "");
  }
  state.assistantText += delta;
  state.assistantEl.textContent = state.assistantText;
  scrollToBottom();
}

// ============================================================
// Approval handling
// ============================================================
function handleApprovalPending(event, runId) {
  state.approvalPending = true;

  // Pull the pending tool call name + arguments from whatever the event carries.
  const info = extractApprovalInfo(event);

  const card = document.createElement("div");
  card.className = "approval-card";

  const h = document.createElement("h3");
  h.textContent = "⏸ Approval required";
  card.appendChild(h);

  const meta = document.createElement("div");
  meta.style.fontSize = "13px";
  meta.innerHTML = "Tool: <b>" + escapeHtml(info.name || "(unknown)") + "</b>";
  card.appendChild(meta);

  const argLabel = document.createElement("div");
  argLabel.style.cssText = "font-size:12px;color:var(--muted);margin-top:8px;";
  argLabel.textContent = "Arguments:";
  card.appendChild(argLabel);

  const pre = document.createElement("pre");
  try { pre.textContent = JSON.stringify(info.arguments, null, 2); }
  catch (e) { pre.textContent = String(info.arguments); }
  card.appendChild(pre);

  // Full raw event too, for correcting the contract later.
  const rawDet = document.createElement("details");
  rawDet.className = "debug";
  const rawSum = document.createElement("summary");
  rawSum.textContent = "raw approval event";
  const rawPre = document.createElement("pre");
  rawPre.textContent = JSON.stringify(event, null, 2);
  rawDet.appendChild(rawSum); rawDet.appendChild(rawPre);
  card.appendChild(rawDet);

  const actions = document.createElement("div");
  actions.className = "approval-actions";
  const approveBtn = document.createElement("button");
  approveBtn.className = "btn ok";
  approveBtn.textContent = "Approve";
  const denyBtn = document.createElement("button");
  denyBtn.className = "btn danger";
  denyBtn.textContent = "Deny";
  actions.appendChild(approveBtn);
  actions.appendChild(denyBtn);
  card.appendChild(actions);

  dom.chatArea.appendChild(card);
  scrollToBottom();

  const decide = async (decision) => {
    approveBtn.disabled = true;
    denyBtn.disabled = true;
    await submitApproval(runId, decision, info, event);
    // After a decision, resume monitoring for continuation.
    state.approvalPending = false;
    state.approvalHandledFor = null;
    approveBtn.textContent = decision === "approve" ? "Approved" : "Approve";
    denyBtn.textContent = decision === "deny" ? "Denied" : "Deny";
    // Resume monitoring to catch the continued run.
    if (state.activeRunId === runId) {
      if (USE_SSE) {
        streamEvents(runId);
      } else {
        state.polling = true;
        pollOnce(runId);
      }
    }
  };

  approveBtn.addEventListener("click", () => decide("approve"));
  denyBtn.addEventListener("click", () => decide("deny"));

  // Approval paused auto-continuation. For the polling path, state.approvalPending
  // already stops pollOnce from scheduling further polls. For the SSE path, abort
  // the in-flight stream so we don't double-read; it's re-opened after the decision.
  if (USE_SSE && state.sseAbort) {
    try { state.sseAbort.abort(); } catch (e) {}
  }
}

function extractApprovalInfo(event) {
  // Try a variety of plausible locations for the pending tool call.
  const src = event.tool_call || event.tool || event.pending || event.approval ||
              (event.data && (event.data.tool_call || event.data.tool || event.data.approval)) ||
              event.data || event;
  const name = src.name || src.tool || src.tool_name ||
               (event.data && event.data.name) || event.name || "";
  let args = src.arguments || src.args || src.input || src.parameters ||
             (event.data && event.data.arguments) || null;
  if (args === null && src !== event) args = src;
  return { name, arguments: args, source: src };
}

async function submitApproval(runId, decision, info, rawEvent) {
  // Body format is a best guess; log request + response so it's easy to correct.
  const body = {
    decision: decision,                 // "approve" | "deny"
    approved: decision === "approve",   // include boolean form too, defensively
  };
  // If the event carried an approval/tool call id, echo it back.
  const callId = rawEvent.id || rawEvent.approval_id || rawEvent.tool_call_id ||
                 (info.source && (info.source.id || info.source.tool_call_id)) ||
                 (rawEvent.data && (rawEvent.data.id || rawEvent.data.approval_id));
  if (callId) body.approval_id = callId;

  const url = baseUrl() + "/v1/runs/" + encodeURIComponent(runId) + "/approval";
  console.log("[POST approval] request", { url, body });
  addStatusLine("Approval decision sent: " + decision);

  try {
    const res = await fetch(url, {
      method: "POST",
      headers: authHeaders({ "Content-Type": "application/json" }),
      body: JSON.stringify(body),
    });
    let respJson;
    try { respJson = await res.json(); } catch (e) { respJson = "(no/invalid JSON body)"; }
    console.log("[POST approval] response", { status: res.status, body: respJson });
    if (!res.ok) {
      addStatusLine("Approval POST failed: HTTP " + res.status);
    }
  } catch (e) {
    console.error("[POST approval] failed", e);
    addStatusLine("Approval POST error: " + e.message);
  }
}

// ============================================================
// Stop
// ============================================================
async function stopRun() {
  const runId = state.activeRunId;
  if (!runId) return;
  if (!featureOn("run_stop")) return;

  const url = baseUrl() + "/v1/runs/" + encodeURIComponent(runId) + "/stop";
  console.log("[POST stop] request", { url });
  try {
    const res = await fetch(url, { method: "POST", headers: authHeaders() });
    let respJson;
    try { respJson = await res.json(); } catch (e) { respJson = "(no/invalid JSON body)"; }
    console.log("[POST stop] response", { status: res.status, body: respJson });
    addStatusLine("Stop requested.");
  } catch (e) {
    console.error("[POST stop] failed", e);
    addStatusLine("Stop error: " + e.message);
  }
  // Stop monitoring (polling and/or SSE).
  stopPolling();
  if (state.sseAbort) { try { state.sseAbort.abort(); } catch (e) {} }
  finishRun();
}

function finishRun() {
  stopPolling();
  state.activeRunId = null;
  state.sseAbort = null;
  state.approvalPending = false;
  state.approvalHandledFor = null;
  setRunActiveUI(false);
  setComposerEnabled(featureOn("run_submission"));
}

// ============================================================
// Sessions API (Phase 3): plain GET/POST/PATCH only.
// We deliberately avoid POST /api/sessions/{id}/chat/stream: streaming
// endpoints on this server have shown the missing-CORS-header gap (confirmed on
// /v1/runs/{id}/events), so we stick to non-streaming calls that all work.
// ============================================================

// Pull a display title + timestamp + id from a session object without assuming
// exact field names (read them off the logged raw response and adjust if needed).
function sessionTitle(s) {
  return s.title || s.name || s.summary || s.label || null;
}
function sessionId(s) {
  return s.id || s.session_id || s.uuid || s._id || null;
}
function sessionUpdatedAt(s) {
  return s.updated_at || s.updatedAt || s.modified_at || s.last_active_at ||
         s.created_at || s.createdAt || s.timestamp || null;
}

function setActiveSession(id, meta) {
  state.activeSessionId = id;
  renderActiveSessionInfo(meta);
  // Fork only makes sense with an active session.
  dom.forkBtn.classList.toggle("hidden", !id);
  // Re-highlight the list if it's populated.
  highlightActiveSessionInList();
}

function renderActiveSessionInfo(meta) {
  if (!state.activeSessionId) {
    dom.activeSessionInfo.innerHTML = "No active session; the next message starts a fresh one.";
    dom.connInfo.dataset.session = "";
    return;
  }
  const title = meta ? (sessionTitle(meta) || state.activeSessionId) : state.activeSessionId;
  dom.activeSessionInfo.innerHTML = "Active session: <b>" + escapeHtml(title) + "</b>";
}

function highlightActiveSessionInList() {
  const items = dom.sessionList.querySelectorAll(".session-item");
  items.forEach((it) => {
    it.classList.toggle("active", it.dataset.sid === state.activeSessionId);
  });
}

function setSessionsMsg(text, kind) {
  dom.sessionsMsg.textContent = text || "";
  dom.sessionsMsg.className = "conn-msg" + (kind ? " " + kind : "");
}

// GET /api/sessions: list and render.
async function loadSessions() {
  if (!state.connected) { setSessionsMsg("Not connected.", "err"); return; }
  setSessionsMsg("Loading sessions…");
  dom.sessionList.innerHTML = "";

  let data;
  try {
    const res = await fetch(baseUrl() + "/api/sessions?limit=100&offset=0", {
      method: "GET",
      headers: authHeaders(),
    });
    if (!res.ok) throw new Error("HTTP " + res.status);
    data = await res.json();
  } catch (e) {
    setSessionsMsg("Failed to list sessions: " + e.message, "err");
    console.error("[GET /api/sessions] failed", e);
    return;
  }

  // Log the raw first response + drop it in a debug panel (established pattern),
  // so real field names can be confirmed rather than assumed.
  if (!state.firstSessionsLogged) {
    state.firstSessionsLogged = true;
    console.log("[sessions] FIRST raw /api/sessions response", data);
    addDebugPanel("first /api/sessions response", data);
  }

  // The list may be the array itself or nested under a common key.
  const list = Array.isArray(data) ? data
    : (data.sessions || data.items || data.results || data.data || []);
  if (!Array.isArray(list) || list.length === 0) {
    setSessionsMsg("No sessions found.", "");
    return;
  }

  setSessionsMsg(list.length + " session(s).", "good");
  for (const s of list) {
    dom.sessionList.appendChild(renderSessionItem(s));
  }
  highlightActiveSessionInList();
}

function renderSessionItem(s) {
  const id = sessionId(s);
  const title = sessionTitle(s) || id || "(untitled)";
  const updated = sessionUpdatedAt(s);

  const item = document.createElement("div");
  item.className = "session-item";
  if (id) item.dataset.sid = id;

  const main = document.createElement("div");
  main.className = "si-main";
  const t = document.createElement("div");
  t.className = "si-title";
  t.textContent = title;
  const meta = document.createElement("div");
  meta.className = "si-meta";
  meta.textContent = (updated ? String(updated) : "") + (id && title !== id ? "  ·  " + id : "");
  main.appendChild(t);
  main.appendChild(meta);
  item.appendChild(main);

  item.addEventListener("click", () => { if (id) selectSession(id, s); });
  return item;
}

// Select a session: load its message history and make it active.
async function selectSession(id, meta) {
  setSessionsMsg("Loading session…");
  let history;
  try {
    const res = await fetch(baseUrl() + "/api/sessions/" + encodeURIComponent(id) + "/messages", {
      method: "GET",
      headers: authHeaders(),
    });
    if (!res.ok) throw new Error("HTTP " + res.status);
    history = await res.json();
  } catch (e) {
    setSessionsMsg("Failed to load messages: " + e.message, "err");
    console.error("[GET /api/sessions/{id}/messages] failed", e);
    return;
  }

  console.log("[sessions] messages for", id, history);
  renderHistory(history);
  setActiveSession(id, meta);
  setSessionsMsg("Loaded session " + id + ".", "good");
  showSessionsPanel(false);
}

// Render message history into the chat area via the existing addMessage().
function renderHistory(history) {
  // Reset the chat view and streaming state for the newly selected session.
  dom.chatArea.innerHTML = "";
  state.assistantEl = null;
  state.assistantText = "";

  const msgs = Array.isArray(history) ? history
    : (history.messages || history.items || history.results || history.data || []);
  if (!Array.isArray(msgs)) {
    addDebugPanel("unrecognized messages shape", history);
    return;
  }
  for (const m of msgs) {
    const role = (m.role || m.author || m.sender || "assistant").toString().toLowerCase();
    // Content may be a string or an array of parts.
    let content = m.content;
    if (Array.isArray(content)) {
      content = content.map(c => (typeof c === "string" ? c : (c && (c.text || c.content)) || "")).join("");
    } else if (content && typeof content === "object") {
      content = content.text || content.content || JSON.stringify(content);
    } else if (typeof content !== "string") {
      content = (m.text != null ? String(m.text) : "");
    }
    // Only render user/assistant turns in the thread; log others (system/tool).
    if (role === "user" || role === "assistant") {
      addMessage(role, content);
    } else {
      console.log("[history] non-chat message role=" + role, m);
    }
  }
}

// POST /api/sessions: create empty session, switch to it.
async function createSession() {
  if (!state.connected) { setSessionsMsg("Not connected.", "err"); return; }
  setSessionsMsg("Creating session…");
  let created;
  try {
    const res = await fetch(baseUrl() + "/api/sessions", {
      method: "POST",
      headers: authHeaders({ "Content-Type": "application/json" }),
      body: JSON.stringify({}),
    });
    if (!res.ok) throw new Error("HTTP " + res.status);
    created = await res.json();
  } catch (e) {
    setSessionsMsg("Failed to create session: " + e.message, "err");
    console.error("[POST /api/sessions] failed", e);
    return;
  }
  console.log("[POST /api/sessions] response", created);
  const id = sessionId(created);
  if (!id) {
    setSessionsMsg("Created, but no id in response; see console.", "err");
    addDebugPanel("create session response", created);
    return;
  }
  // Empty history for a fresh session.
  dom.chatArea.innerHTML = "";
  state.assistantEl = null;
  state.assistantText = "";
  setActiveSession(id, created);
  setSessionsMsg("New session " + id + " created.", "good");
  showSessionsPanel(false);
}

// POST /api/sessions/{id}/fork: branch the active session, switch to the fork.
async function forkSession() {
  const id = state.activeSessionId;
  if (!id) { setSessionsMsg("No active session to fork.", "err"); return; }
  setSessionsMsg("Forking session…");
  let forked;
  try {
    const res = await fetch(baseUrl() + "/api/sessions/" + encodeURIComponent(id) + "/fork", {
      method: "POST",
      headers: authHeaders({ "Content-Type": "application/json" }),
      body: JSON.stringify({}),
    });
    if (!res.ok) throw new Error("HTTP " + res.status);
    forked = await res.json();
  } catch (e) {
    setSessionsMsg("Failed to fork: " + e.message, "err");
    console.error("[POST /api/sessions/{id}/fork] failed", e);
    return;
  }
  console.log("[POST /api/sessions/{id}/fork] response", forked);
  const newId = sessionId(forked);
  if (!newId) {
    setSessionsMsg("Forked, but no id in response; see console.", "err");
    addDebugPanel("fork response", forked);
    return;
  }
  // Load the fork's history (it carries the parent's messages up to the branch).
  await selectSession(newId, forked);
  setSessionsMsg("Forked into session " + newId + ".", "good");
}

// ============================================================
// Misc
// ============================================================
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

// ============================================================
// Wiring
// ============================================================
dom.saveConnectBtn.addEventListener("click", async () => {
  const host = dom.host.value.trim();
  const port = (dom.port.value.trim() || "8642");
  const bearer = dom.bearer.value;
  if (!host) { setConnMsg("Host is required.", "err"); return; }
  if (!bearer) { setConnMsg("Bearer key is required.", "err"); return; }
  state.config = { host, port, bearer };
  saveConfig(state.config);
  await connect();
});

dom.clearBtn.addEventListener("click", () => {
  clearConfig();
  state.config = null;
  state.connected = false;
  state.capabilities = null;
  state.features = {};
  dom.host.value = "";
  dom.port.value = "";
  dom.bearer.value = "";
  dom.capsView.textContent = "";
  dom.poweredBy.textContent = "";
  dom.connInfo.textContent = "";
  setStatus("", "Disconnected");
  setConnMsg("Stored config cleared.", "");
  setComposerEnabled(false);
});

dom.settingsBtn.addEventListener("click", () => {
  const hidden = dom.connPanel.classList.contains("hidden");
  showPanel(hidden);
});

dom.sessionsBtn.addEventListener("click", () => {
  const willShow = dom.sessionsPanel.classList.contains("hidden");
  showSessionsPanel(willShow);
  if (willShow) loadSessions();
});
dom.refreshSessionsBtn.addEventListener("click", loadSessions);
dom.newSessionBtn.addEventListener("click", createSession);
dom.forkBtn.addEventListener("click", forkSession);

dom.sendBtn.addEventListener("click", sendMessage);
dom.chatInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    if (!dom.sendBtn.disabled) sendMessage();
  }
});
dom.stopBtn.addEventListener("click", stopRun);

// ============================================================
// PWA: install prompt + service worker (Phase 4)
// ============================================================
// Capture beforeinstallprompt and surface our own Install button instead of
// the browser default. Fires on Android Chrome (Add to Home Screen) and
// desktop Chrome/Edge (Install app). iOS Safari doesn't fire this event
// (install is manual via Share → Add to Home Screen), so the button just
// stays hidden there, expected.
let deferredInstallPrompt = null;

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();              // suppress the mini-infobar
  deferredInstallPrompt = e;
  dom.installBtn.classList.remove("hidden");
  console.log("[pwa] install available");
});

dom.installBtn.addEventListener("click", async () => {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  const { outcome } = await deferredInstallPrompt.userChoice;
  console.log("[pwa] install choice:", outcome);
  deferredInstallPrompt = null;
  dom.installBtn.classList.add("hidden");
});

window.addEventListener("appinstalled", () => {
  dom.installBtn.classList.add("hidden");
  deferredInstallPrompt = null;
  console.log("[pwa] installed");
});

// Register the service worker. Needs HTTPS or localhost (GitHub Pages is HTTPS).
// Relative path so it registers under the deploy subpath scope.
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").then(
      (reg) => console.log("[pwa] service worker registered, scope:", reg.scope),
      (err) => console.warn("[pwa] service worker registration failed:", err)
    );
  });
}

// Fetch the app's own version from ./VERSION at runtime (so it can't drift from
// CHANGELOG/README). Falls back to the static "v…" placeholder if the fetch
// fails (e.g. opened via file:// where fetch is blocked).
async function loadAppVersion() {
  try {
    const res = await fetch("./VERSION", { cache: "no-cache" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    let v = (await res.text()).trim();
    if (!v) throw new Error("empty");
    if (!v.startsWith("v") && !v.startsWith("V")) v = "v" + v;
    dom.appVersion.textContent = v;
    console.log("[version] loaded", v);
  } catch (e) {
    console.warn("[version] could not load ./VERSION:", e.message);
  }
}

// ============================================================
// Boot
// ============================================================
(function init() {
  loadAppVersion();
  const cfg = loadConfig();
  if (cfg && cfg.host && cfg.port) {
    state.config = cfg;
    dom.host.value = cfg.host || "";
    dom.port.value = cfg.port || "8642";
    dom.bearer.value = cfg.bearer || "";
    // Auto-connect if config is already saved.
    connect();
  } else {
    dom.port.value = "8642";
    showPanel(true);
    setComposerEnabled(false);
    setStatus("", "Disconnected");
  }
})();
</script>
