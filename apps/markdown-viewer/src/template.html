<title>Markdown Viewer</title>
<style>/*__STYLE__*/</style>
</head>
<body>
<div id="toolbar">
  <span class="brand">📄 MD Viewer</span>
  <input type="file" id="fileInput" accept=".md,.markdown,.txt,text/markdown" multiple hidden>
  <label class="btn" for="fileInput">📂 Open</label>
  <button id="themeBtn" title="Toggle light/dark">🌙 Dark</button>
  <button id="tocBtn" title="Toggle table of contents">☰ TOC</button>
  <button id="rawBtn" title="Toggle raw/rendered">📝 Raw</button>
  <button id="editBtn" title="Toggle edit mode (re-renders as you type)">✏️ Edit</button>
  <button id="copyBtn" title="Copy raw Markdown of the active tab">📋 Copy MD</button>
  <button id="saveBtn" title="Download the active tab's (edited) Markdown as a NEW .md file">💾 Save</button>
  <button id="exportBtn" title="Export rendered view to standalone HTML">⬇ Export</button>
  <span class="spacer"></span>
  <input type="search" id="searchInput" placeholder="Search in document…" autocomplete="off">
  <span class="hint" id="searchHint"></span>
  <span class="hint" id="fileHint"></span>
</div>
<div id="tabs"></div>
<div id="link-error-host"></div>
<div id="app">
  <nav id="toc"><h2>Contents</h2><ul id="tocList"></ul></nav>
  <main id="content"><div id="drop-hint"><h1>Drop a .md file here</h1><p>or click <strong>Open</strong> to choose a file.</p></div></main>
  <textarea id="edit-area" spellcheck="false" placeholder="Markdown source for the active tab…"></textarea>
</div>
<footer id="app-footer">MD Viewer v--VERSION--</footer>
<div id="toast" role="status" aria-live="polite"></div>

<script>/*__MARKED__*/</script>
<script>/*__HLJS__*/</script>
<script>/*__APP__*/</script>
</body>
</html>
