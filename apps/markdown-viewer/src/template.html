<title>Markdown Viewer</title>
<style>
/* ===================== BASE / THEME VARIABLES ===================== */
:root {
  --bg: #ffffff;
  --bg-elev: #f6f8fa;
  --fg: #1f2328;
  --fg-muted: #656d76;
  --border: #d0d7de;
  --accent: #0969da;
  --code-bg: #f6f8fa;
  --table-stripe: #f6f8fa;
  --blockquote-border: #d0d7de;
  --selection: #cfe3ff;
  --mark-bg: #fff3b0;
}
html[data-theme="dark"] {
  --bg: #0d1117;
  --bg-elev: #161b22;
  --fg: #e6edf3;
  --fg-muted: #8b949e;
  --border: #30363d;
  --accent: #58a6ff;
  --code-bg: #161b22;
  --table-stripe: #161b22;
  --blockquote-border: #30363d;
  --selection: #1f4068;
  --mark-bg: #5c4a00;
}
* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }
body {
  background: var(--bg);
  color: var(--fg);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  font-size: 16px;
  line-height: 1.6;
}
::selection { background: var(--selection); }

/* ===================== TOOLBAR ===================== */
#toolbar {
  position: sticky; top: 0; z-index: 20;
  display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
  padding: 8px 12px;
  background: var(--bg-elev);
  border-bottom: 1px solid var(--border);
}
#toolbar .brand { font-weight: 700; margin-right: 8px; }
#toolbar button, #toolbar label.btn {
  background: var(--bg); color: var(--fg);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 6px 10px; font-size: 13px; cursor: pointer;
  display: inline-flex; align-items: center; gap: 4px;
}
#toolbar button:hover, #toolbar label.btn:hover { border-color: var(--accent); }
#toolbar input[type="search"] {
  background: var(--bg); color: var(--fg);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 6px 10px; font-size: 13px; min-width: 160px;
}
#toolbar .spacer { flex: 1; }
#toolbar .hint { color: var(--fg-muted); font-size: 12px; }

/* ===================== TABS ===================== */
#tabs {
  display: flex; flex-wrap: wrap; gap: 4px;
  padding: 4px 12px 0; background: var(--bg-elev);
  border-bottom: 1px solid var(--border);
}
#tabs .tab {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 10px; border: 1px solid var(--border);
  border-bottom: none; border-radius: 6px 6px 0 0;
  background: var(--bg); cursor: pointer; font-size: 13px;
  max-width: 220px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#tabs .tab.active { background: var(--bg); font-weight: 600; border-color: var(--accent); }
#tabs .tab .close { color: var(--fg-muted); font-weight: 700; }
#tabs .tab .close:hover { color: #d1242f; }

/* ===================== LAYOUT ===================== */
#app { display: flex; align-items: flex-start; }
#toc {
  position: sticky; top: 49px; align-self: flex-start;
  width: 240px; flex: 0 0 240px; max-height: calc(100vh - 49px);
  overflow: auto; padding: 16px 12px; border-right: 1px solid var(--border);
  font-size: 14px;
}
#toc.collapsed { display: none; }
#toc h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .04em; color: var(--fg-muted); margin: 0 0 8px; }
#toc ul { list-style: none; margin: 0; padding: 0; }
#toc li { margin: 2px 0; }
#toc a { color: var(--fg-muted); text-decoration: none; display: block; padding: 2px 6px; border-radius: 4px; }
#toc a:hover { color: var(--accent); background: var(--bg-elev); }
#toc .lvl-2 { padding-left: 6px; }
#toc .lvl-3 { padding-left: 18px; }
#toc .lvl-4 { padding-left: 30px; }
#toc .lvl-5 { padding-left: 42px; }
#toc .lvl-6 { padding-left: 54px; }

#content {
  flex: 1 1 auto; min-width: 0;
  max-width: 900px; margin: 0 auto; padding: 24px 32px 80px;
}

/* ===================== MARKDOWN STYLES ===================== */
#content h1, #content h2, #content h3, #content h4, #content h5, #content h6 {
  margin: 24px 0 16px; font-weight: 600; line-height: 1.25; position: relative;
}
#content h1 { font-size: 2em; border-bottom: 1px solid var(--border); padding-bottom: .3em; }
#content h2 { font-size: 1.5em; border-bottom: 1px solid var(--border); padding-bottom: .3em; }
#content h3 { font-size: 1.25em; }
#content h4 { font-size: 1em; }
#content h5 { font-size: .875em; }
#content h6 { font-size: .85em; color: var(--fg-muted); }
#content .anchor {
  position: absolute; left: -1.1em; color: var(--fg-muted); text-decoration: none;
  opacity: 0; font-weight: 400;
}
#content h1:hover .anchor, #content h2:hover .anchor, #content h3:hover .anchor,
#content h4:hover .anchor, #content h5:hover .anchor, #content h6:hover .anchor { opacity: 1; }
#content p { margin: 0 0 16px; }
#content a { color: var(--accent); text-decoration: none; }
#content a:hover { text-decoration: underline; }
#content img { max-width: 100%; }
#content hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
#content blockquote {
  margin: 0 0 16px; padding: 0 1em; color: var(--fg-muted);
  border-left: .25em solid var(--blockquote-border);
}
#content blockquote > :last-child { margin-bottom: 0; }
#content ul, #content ol { margin: 0 0 16px; padding-left: 2em; }
#content li { margin: 4px 0; }
#content li.task-list-item { list-style: none; margin-left: -1.4em; }
#content li.task-list-item input { margin-right: 6px; }

/* tables */
#content table { border-collapse: collapse; margin: 0 0 16px; display: block; width: max-content; max-width: 100%; overflow: auto; }
#content th, #content td { border: 1px solid var(--border); padding: 6px 13px; }
#content th { background: var(--bg-elev); font-weight: 600; }
#content tr:nth-child(2n) td { background: var(--table-stripe); }

/* inline code */
#content code {
  background: var(--code-bg); border-radius: 6px; padding: .2em .4em;
  font-size: 85%; font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
}

/* code blocks + copy button */
#content pre {
  position: relative; background: var(--code-bg); border: 1px solid var(--border);
  border-radius: 8px; padding: 14px 16px; overflow: auto; margin: 0 0 16px;
}
#content pre code {
  background: transparent; padding: 0; font-size: 14px; line-height: 1.45;
  display: block;
}
.copy-btn {
  position: absolute; top: 8px; right: 8px; z-index: 5;
  background: var(--bg); color: var(--fg-muted); border: 1px solid var(--border);
  border-radius: 6px; padding: 3px 8px; font-size: 12px; cursor: pointer; opacity: .85;
}
.copy-btn:hover { color: var(--accent); border-color: var(--accent); opacity: 1; }
.copy-btn.copied { color: #1a7f37; border-color: #1a7f37; }

/* search marks */
mark.hl { background: var(--mark-bg); color: inherit; border-radius: 2px; padding: 0 1px; }
mark.hl.current { outline: 2px solid var(--accent); }

/* empty state */
#drop-hint {
  margin: 12vh auto; max-width: 520px; text-align: center; color: var(--fg-muted);
  border: 2px dashed var(--border); border-radius: 12px; padding: 40px 24px;
}
#drop-hint.dragover { border-color: var(--accent); background: var(--bg-elev); }
#drop-hint h1 { border: none; color: var(--fg); }
#raw-view {
  white-space: pre-wrap; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  font-size: 14px; line-height: 1.5; padding: 8px 0;
}

/* ===================== HIGHLIGHT.JS THEMES ===================== */
/*__HLJS_LIGHT__*/
/*__HLJS_DARK__*/

@media (max-width: 720px) {
  #toc { display: none; }
  #content { padding: 16px; }
}

/* ===================== INTERNAL LINK ERROR ===================== */
#link-error-host {
  display: none;
  margin: 12px 16px;
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-left: 4px solid #d29922;
  border-radius: 6px;
  background: var(--bg-elev);
  color: var(--fg);
  font-size: 14px;
  line-height: 1.5;
}
#link-error-host code {
  background: var(--code-bg);
  padding: 1px 5px;
  border-radius: 4px;
  font-size: 12px;
}

#app-footer {
  padding: 10px 16px;
  font-size: 12px;
  color: var(--fg-muted);
  border-top: 1px solid var(--border);
  background: var(--bg-elev);
  text-align: center;
}
</style>
</head>
<body>
<div id="toolbar">
  <span class="brand">📄 MD Viewer</span>
  <input type="file" id="fileInput" accept=".md,.markdown,.txt,text/markdown" hidden>
  <label class="btn" for="fileInput">📂 Open</label>
  <button id="themeBtn" title="Toggle light/dark">🌙 Dark</button>
  <button id="tocBtn" title="Toggle table of contents">☰ TOC</button>
  <button id="rawBtn" title="Toggle raw/rendered">📝 Raw</button>
  <button id="exportBtn" title="Export rendered view to standalone HTML">⬇ Export</button>
  <span class="spacer"></span>
  <input type="search" id="searchInput" placeholder="Search in document…" autocomplete="off">
  <span class="hint" id="searchHint"></span>
  <span class="hint" id="fileHint"></span>
</div>
<div id="tabs"></div>
<div id="link-error-host"></div>
<div id="app">
  <nav id="toc"><h2>Contents</h2><ul id="tocList"></ul></nav>
  <main id="content"><div id="drop-hint"><h1>Drop a .md file here</h1><p>or click <strong>Open</strong> to choose a file.</p></div></main>
</div>
<footer id="app-footer">MD Viewer v--VERSION--</footer>

<script>/*__MARKED__*/</script>
<script>/*__HLJS__*/</script>
<script>
"use strict";
/* ===================== APP STATE ===================== */
const $ = (id) => document.getElementById(id);
const fileInput = $('fileInput');
const content = $('content');
const tocList = $('tocList');
const tabsEl = $('tabs');

const store = {
  tabs: [],            // {name, text}
  active: -1,
  theme: 'light',
  tocOpen: true,
  rawMode: false,
};
const LS_KEY = 'mdv_state_v1';

/* ===================== PERSISTENCE ===================== */
function saveState() {
  try {
    const slim = {
      tabs: store.tabs.map(t => ({ name: t.name, text: t.text })),
      active: store.active, theme: store.theme, tocOpen: store.tocOpen, rawMode: store.rawMode,
    };
    localStorage.setItem(LS_KEY, JSON.stringify(slim));
  } catch (e) { /* quota — ignore */ }
}
function loadState() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return false;
    const s = JSON.parse(raw);
    store.theme = s.theme || 'light';
    store.tocOpen = s.tocOpen !== false;
    store.rawMode = !!s.rawMode;
    store.tabs = (s.tabs || []).filter(t => t && typeof t.text === 'string');
    store.active = Math.min(Math.max(s.active || 0, 0), Math.max(store.tabs.length - 1, 0));
    return store.tabs.length > 0;
  } catch (e) { return false; }
}

/* ===================== MARKED CONFIG ===================== */
marked.setOptions({ gfm: true, breaks: false, headerIds: false, mangle: false });

function slugify(text) {
  return text.toLowerCase().trim()
    .replace(/[^\w\s-]/g, '')
    .replace(/\s+/g, '-')
    .replace(/-+/g, '-') || 'section';
}

/* ===================== RENDER ===================== */
function renderMarkdown(mdText) {
  const html = marked.parse(mdText);
  content.innerHTML = html;
  applyHighlights();
  addCopyButtons();
  addAnchors();
  buildTOC();
  clearSearch();
}

function applyHighlights() {
  content.querySelectorAll('pre code').forEach((block) => {
    try { hljs.highlightElement(block); } catch (e) {}
  });
}

function addCopyButtons() {
  content.querySelectorAll('pre').forEach((pre) => {
    if (pre.querySelector('.copy-btn')) return;
    const btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.type = 'button';
    btn.textContent = 'Copy';
    const code = pre.querySelector('code');
    const text = code ? code.textContent : pre.textContent;
    btn.addEventListener('click', () => copyText(text, btn));
    pre.appendChild(btn);
  });
}

function addAnchors() {
  const seen = {};
  content.querySelectorAll('h1,h2,h3,h4,h5,h6').forEach((h) => {
    const base = slugify(h.textContent);
    let id = base;
    if (seen[base] != null) { seen[base] += 1; id = base + '-' + seen[base]; }
    else { seen[base] = 0; }
    h.id = id;
    const a = document.createElement('a');
    a.className = 'anchor';
    a.href = '#' + id;
    a.textContent = '#';
    a.title = 'Link to this section';
    h.insertBefore(a, h.firstChild);
  });
}

function buildTOC() {
  tocList.innerHTML = '';
  const heads = content.querySelectorAll('h1,h2,h3,h4,h5,h6');
  if (!heads.length) {
    const li = document.createElement('li');
    li.innerHTML = '<span style="color:var(--fg-muted)">No headings</span>';
    tocList.appendChild(li);
    return;
  }
  heads.forEach((h) => {
    const li = document.createElement('li');
    li.className = 'lvl-' + h.tagName[1];
    const a = document.createElement('a');
    a.href = '#' + h.id;
    a.textContent = h.textContent.replace(/^#\s*/, '');
    a.addEventListener('click', (e) => {
      e.preventDefault();
      h.scrollIntoView({ behavior: 'smooth', block: 'start' });
      history.replaceState(null, '', '#' + h.id);
    });
    li.appendChild(a);
    tocList.appendChild(li);
  });
}

/* ===================== CLIPBOARD ===================== */
async function copyText(text, btn) {
  let ok = false;
  try {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(text);
      ok = true;
    }
  } catch (e) {}
  if (!ok) {
    try {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      ok = document.execCommand('copy');
      ta.remove();
    } catch (e) {}
  }
  if (btn) {
    const old = btn.textContent;
    btn.textContent = ok ? 'Copied!' : 'Failed';
    btn.classList.toggle('copied', ok);
    setTimeout(() => { btn.textContent = old; btn.classList.remove('copied'); }, 1400);
  }
  return ok;
}

/* ===================== TABS ===================== */
function renderTabs() {
  tabsEl.innerHTML = '';
  store.tabs.forEach((t, i) => {
    const el = document.createElement('div');
    el.className = 'tab' + (i === store.active ? ' active' : '');
    const name = document.createElement('span');
    name.textContent = t.name;
    name.title = t.name;
    el.appendChild(name);
    const close = document.createElement('span');
    close.className = 'close';
    close.textContent = '×';
    close.title = 'Close tab';
    close.addEventListener('click', (e) => { e.stopPropagation(); closeTab(i); });
    el.appendChild(close);
    el.addEventListener('click', () => { setActive(i); });
    tabsEl.appendChild(el);
  });
  tabsEl.style.display = store.tabs.length ? 'flex' : 'none';
}

function openTab(name, text, activate = true) {
  const existing = store.tabs.findIndex(t => t.name === name);
  if (existing >= 0) {
    store.tabs[existing].text = text;
    if (activate) store.active = existing;
  } else {
    store.tabs.push({ name, text });
    if (activate) store.active = store.tabs.length - 1;
  }
  renderTabs();
  if (activate) showActive();
  saveState();
  updateFileHint();
}

function closeTab(i) {
  store.tabs.splice(i, 1);
  if (store.active >= store.tabs.length) store.active = store.tabs.length - 1;
  if (store.active < 0) store.active = 0;
  renderTabs();
  showActive();
  saveState();
  updateFileHint();
}

function setActive(i) {
  store.active = i;
  renderTabs();
  showActive();
  saveState();
}

function showActive() {
  const t = store.tabs[store.active];
  if (!t) {
    content.innerHTML = '<div id="drop-hint"><h1>Drop a .md file here</h1><p>or click <strong>Open</strong> to choose a file.</p></div>';
    tocList.innerHTML = '';
    return;
  }
  if (store.rawMode) {
    showRaw(t.text);
  } else {
    renderMarkdown(t.text);
  }
}

function showRaw(text) {
  content.innerHTML = '';
  const pre = document.createElement('pre');
  pre.id = 'raw-view';
  pre.textContent = text;
  content.appendChild(pre);
  tocList.innerHTML = '';
}

/* ===================== SEARCH ===================== */
let searchMarks = [];
let searchIdx = -1;
function clearSearchMarks() {
  searchMarks.forEach(m => {
    const parent = m.parentNode;
    if (parent) parent.replaceChild(document.createTextNode(m.textContent), m);
    parent && parent.normalize && parent.normalize();
  });
  searchMarks = [];
  searchIdx = -1;
}
function clearSearch() {
  clearSearchMarks();
  $('searchHint').textContent = '';
  $('searchInput').value = '';
}
function runSearch() {
  const q = $('searchInput').value.trim();
  clearSearchMarks();
  if (!q) { $('searchHint').textContent = ''; return; }
  const walker = document.createTreeWalker(content, NodeFilter.SHOW_TEXT, {
    acceptNode(n) {
      if (!n.nodeValue.trim()) return NodeFilter.FILTER_REJECT;
      if (n.parentNode && (n.parentNode.closest('pre') || n.parentNode.closest('style') || n.parentNode.closest('script'))) return NodeFilter.FILTER_REJECT;
      return NodeFilter.FILTER_ACCEPT;
    }
  });
  const targets = [];
  let n;
  while ((n = walker.nextNode())) targets.push(n);
  const lower = q.toLowerCase();
  targets.forEach(node => {
    const text = node.nodeValue;
    const idx = text.toLowerCase().indexOf(lower);
    if (idx === -1) return;
    const frag = document.createDocumentFragment();
    let last = 0, i = idx;
    while (i !== -1) {
      if (i > last) frag.appendChild(document.createTextNode(text.slice(last, i)));
      const mark = document.createElement('mark');
      mark.className = 'hl';
      mark.textContent = text.slice(i, i + q.length);
      frag.appendChild(mark);
      searchMarks.push(mark);
      last = i + q.length;
      i = text.toLowerCase().indexOf(lower, last);
    }
    if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
    node.parentNode.replaceChild(frag, node);
  });
  if (searchMarks.length) {
    searchIdx = 0;
    searchMarks[0].classList.add('current');
    searchMarks[0].scrollIntoView({ block: 'center' });
    $('searchHint').textContent = (searchIdx + 1) + '/' + searchMarks.length;
  } else {
    $('searchHint').textContent = '0/0';
  }
}
function searchNext(dir) {
  if (!searchMarks.length) return;
  searchMarks[searchIdx].classList.remove('current');
  searchIdx = (searchIdx + dir + searchMarks.length) % searchMarks.length;
  searchMarks[searchIdx].classList.add('current');
  searchMarks[searchIdx].scrollIntoView({ block: 'center' });
  $('searchHint').textContent = (searchIdx + 1) + '/' + searchMarks.length;
}

/* ===================== EXPORT ===================== */
function exportStandalone() {
  const t = store.tabs[store.active];
  if (!t) { alert('Open a file first.'); return; }
  // Build a self-contained HTML with current rendered content + current theme hljs css.
  const dark = store.theme === 'dark';
  const hljsCss = dark ? `HLJS_DARK_SRC` : `HLJS_LIGHT_SRC`;
  const bodyHtml = content.innerHTML;
  const doc = `<!DOCTYPE html>
<html lang="en" data-theme="${store.theme}">
<head>
<meta charset="utf-8">
<title>${escapeHtml(t.name)}</title>
<style>
:root{--bg:#fff;--bg-elev:#f6f8fa;--fg:#1f2328;--fg-muted:#656d76;--border:#d0d7de;--accent:#0969da;--code-bg:#f6f8fa;--table-stripe:#f6f8fa;--blockquote-border:#d0d7de;}
html[data-theme="dark"]{--bg:#0d1117;--bg-elev:#161b22;--fg:#e6edf3;--fg-muted:#8b949e;--border:#30363d;--accent:#58a6ff;--code-bg:#161b22;--table-stripe:#161b22;--blockquote-border:#30363d;}
body{background:var(--bg);color:var(--fg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;font-size:16px;line-height:1.6;margin:0;}
main{max-width:900px;margin:0 auto;padding:24px 32px 80px;}
h1,h2,h3,h4,h5,h6{margin:24px 0 16px;font-weight:600;line-height:1.25;} h1{font-size:2em;border-bottom:1px solid var(--border);padding-bottom:.3em;} h2{font-size:1.5em;border-bottom:1px solid var(--border);padding-bottom:.3em;} h3{font-size:1.25em;} h4{font-size:1em;} h5{font-size:.875em;} h6{font-size:.85em;color:var(--fg-muted);}
a{color:var(--accent);text-decoration:none;} a:hover{text-decoration:underline;}
img{max-width:100%;} hr{border:none;border-top:1px solid var(--border);margin:24px 0;}
blockquote{margin:0 0 16px;padding:0 1em;color:var(--fg-muted);border-left:.25em solid var(--blockquote-border);}

function escapeHtml(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* ===================== FILE LOADING ===================== */
function readFile(file) {
  const reader = new FileReader();
  reader.onload = () => openTab(file.name, String(reader.result || ''));
  reader.onerror = () => alert('Failed to read file: ' + file.name);
  reader.readAsText(file);
}

fileInput.addEventListener('change', (e) => {
  const f = e.target.files && e.target.files[0];
  if (f) readFile(f);
  fileInput.value = '';
});

/* drag and drop anywhere */
function preventDefaults(e){ e.preventDefault(); e.stopPropagation(); }
['dragenter','dragover','dragleave','drop'].forEach(ev => {
  window.addEventListener(ev, preventDefaults, false);
});
let dragDepth = 0;
window.addEventListener('dragenter', () => { dragDepth++; $('drop-hint') && ($('drop-hint').classList && $('drop-hint').classList.add('dragover')); document.body.style.outline = '3px dashed var(--accent)'; });
window.addEventListener('dragleave', () => { dragDepth = Math.max(0, dragDepth - 1); if (dragDepth === 0) { document.body.style.outline = ''; } });
window.addEventListener('drop', (e) => {
  dragDepth = 0; document.body.style.outline = '';
  const files = e.dataTransfer && e.dataTransfer.files;
  if (files && files.length) {
    for (const f of files) {
      if (/\.(md|markdown|txt)$/i.test(f.name) || f.type === 'text/markdown') readFile(f);
      else readFile(f); // try anyway
    }
  }
});

/* ===================== INTERNAL .md LINKS ===================== */
// Intercept clicks on same-origin relative links ending in .md/.markdown/.txt
// and load the target into the existing multi-file tab system instead of
// letting the browser navigate to raw, unformatted text.
function resolvePath(href) {
  const url = new URL(href, window.location.href);
  if (url.origin !== window.location.origin) return null;
  const clean = url.pathname.split('#')[0].split('?')[0];
  if (!/\.(md|markdown|txt)$/i.test(clean)) return null;
  return url;
}

function fetchMd(href, linkEl) {
  fetch(href)
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
    .then(text => openTab(decodeURIComponent(href.split('/').pop().split('#')[0]) || 'document.md', text))
    .catch(err => {
      // Fetch is blocked in many file:// contexts (e.g. Chrome) or failed.
      // Never fall through to raw-text navigation; show an on-page message.
      showLinkError(linkEl, href, err);
    });
}

function showLinkError(linkEl, href, err) {
  const msg = document.createElement('div');
  msg.className = 'link-error';
  msg.setAttribute('role', 'alert');
  msg.innerHTML = '⚠ Could not open <code>' + escapeHtml(href) + '</code> directly.<br>' +
    'Use the <strong>Open</strong> button or drag the file into the viewer instead.';
  const host = document.getElementById('link-error-host');
  if (host) { host.innerHTML = ''; host.appendChild(msg); host.style.display = 'block'; }
}

document.addEventListener('click', (e) => {
  if (e.defaultPrevented || e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;
  const a = e.target.closest('a');
  if (!a) return;
  const href = a.getAttribute('href');
  if (!href || href.charAt(0) === '#') return; // in-page anchors: leave alone
  let target;
  try { target = resolvePath(href); } catch (_) { return; } // absolute/other -> default nav
  if (!target) return; // external http(s) or non-md -> default nav
  e.preventDefault();
  fetchMd(target.href, a);
}, true);

/* ===================== BOOT ===================== */
function boot() {
  const had = loadState();
  document.documentElement.setAttribute('data-theme', store.theme);
  $('themeBtn').textContent = store.theme === 'light' ? '🌙 Dark' : '☀️ Light';
  $('toc').classList.toggle('collapsed', !store.tocOpen);
  $('rawBtn').textContent = store.rawMode ? '👁 Rendered' : '📝 Raw';
  renderTabs();
  if (had) { showActive(); }
  updateFileHint();
}
boot();
