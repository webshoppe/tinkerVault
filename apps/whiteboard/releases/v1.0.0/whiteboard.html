<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Whiteboard</title>
  <!-- Inline SVG favicon (no external file at runtime) -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='8' y1='8' x2='56' y2='56' gradientUnits='userSpaceOnUse'%3E%3Cstop offset='0%25' stop-color='%234a7cff'/%3E%3Cstop offset='100%25' stop-color='%237c5cff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect x='6' y='10' width='52' height='40' rx='8' fill='url(%23g)'/%3E%3Crect x='11' y='15' width='42' height='30' rx='4' fill='%23ffffff'/%3E%3Cpath d='M18 36c4-8 8-10 12-6s7 6 12 2 6-8 8-10' fill='none' stroke='%234a7cff' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3Crect x='38' y='18' width='12' height='11' rx='1.5' fill='%23fff59d' stroke='%23e6d86a' stroke-width='0.8'/%3E%3Cpath d='M40 21.5h8M40 24.5h6' stroke='%23b8a84a' stroke-width='1' stroke-linecap='round'/%3E%3Cpath d='M24 50h16l3 8H21l3-8z' fill='%233b6ae0'/%3E%3C/svg%3E" type="image/svg+xml" />
  <style>
    /* ===== Design tokens ===== */
    :root, [data-theme="light"] {
      --bg: #e8eaed;
      --bg-elevated: #ffffff;
      --bg-workspace: #f0f2f5;
      --bg-muted: #f3f4f6;
      --border: #d0d4db;
      --border-strong: #a8adb6;
      --text: #1a1a1a;
      --text-muted: #6b7280;
      --accent: #4a7cff;
      --accent-hover: #3b6ae0;
      --accent-soft: rgba(74, 124, 255, 0.12);
      --danger: #b42318;
      --danger-border: #f3b4af;
      --danger-bg: #fef3f2;
      --success: #059669;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
      --radius: 8px;
      --radius-sm: 6px;
      --toolbar-h: auto;
      --font: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      --mono: ui-monospace, "Cascadia Code", "Segoe UI Mono", Menlo, monospace;
      --transition: 0.18s ease;
    }
    [data-theme="dark"] {
      --bg: #12141a;
      --bg-elevated: #1c1f28;
      --bg-workspace: #161922;
      --bg-muted: #252833;
      --border: #2e3340;
      --border-strong: #454b5a;
      --text: #e8eaed;
      --text-muted: #9ca3af;
      --accent: #6b9bff;
      --accent-hover: #8ab0ff;
      --accent-soft: rgba(107, 155, 255, 0.16);
      --danger: #f97066;
      --danger-border: #912018;
      --danger-bg: #2a1215;
      --success: #34d399;
      --shadow: 0 1px 3px rgba(0,0,0,0.3);
      --shadow-lg: 0 12px 32px rgba(0,0,0,0.45);
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      font-family: var(--font); font-size: 14px;
      color: var(--text); background: var(--bg);
      overflow: hidden;
      transition: background var(--transition), color var(--transition);
    }
    button, input, select, textarea { font: inherit; color: inherit; }
    button {
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      border-radius: var(--radius-sm);
      padding: 6px 11px;
      line-height: 1.3;
      transition: background var(--transition), border-color var(--transition), box-shadow var(--transition), color var(--transition);
    }
    button:hover { background: var(--bg-muted); border-color: var(--border-strong); }
    button:active { transform: translateY(0.5px); }
    button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    button.active, button[aria-pressed="true"] {
      background: var(--accent); border-color: var(--accent); color: #fff;
    }
    button.active:hover, button[aria-pressed="true"]:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
    button.danger { color: var(--danger); border-color: var(--danger-border); }
    button.danger:hover { background: var(--danger-bg); }
    button:disabled { opacity: 0.42; cursor: not-allowed; transform: none; }
    button.ghost { background: transparent; border-color: transparent; }
    button.ghost:hover { background: var(--bg-muted); border-color: transparent; }
    button.icon-btn { padding: 6px 8px; min-width: 32px; }
    select, input[type="text"] {
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      border-radius: var(--radius-sm);
      padding: 6px 10px;
      color: var(--text);
    }
    select:focus, input[type="text"]:focus {
      outline: 2px solid var(--accent); outline-offset: 1px;
    }

    /* ===== App shell ===== */
    #app {
      display: flex; flex-direction: column;
      height: 100%; min-height: 100vh; min-height: 100dvh;
    }

    #toolbar {
      display: flex; flex-wrap: wrap; align-items: center;
      gap: 8px 12px;
      padding: 10px 14px;
      background: var(--bg-elevated);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow);
      flex-shrink: 0; z-index: 30;
      transition: background var(--transition), border-color var(--transition);
    }
    .brand {
      display: flex; align-items: center; gap: 8px;
      font-weight: 700; font-size: 15px; letter-spacing: -0.02em;
      white-space: nowrap; user-select: none;
    }
    .brand-mark {
      width: 26px; height: 26px; border-radius: 7px;
      background: linear-gradient(135deg, var(--accent), #7c5cff);
      display: grid; place-items: center;
      color: #fff; font-size: 13px; font-weight: 800;
      box-shadow: 0 2px 6px rgba(74,124,255,0.35);
    }
    .brand small {
      font-weight: 500; font-size: 11px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .toolbar-group {
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    }
    .toolbar-group .label {
      font-size: 11px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.05em; margin-right: 2px;
    }
    .toolbar-sep {
      width: 1px; height: 26px; background: var(--border); flex-shrink: 0;
    }
    #board-select {
      min-width: 160px; max-width: 240px;
    }
    .type-badge {
      font-size: 11px; font-weight: 600;
      padding: 3px 8px; border-radius: 999px;
      background: var(--accent-soft); color: var(--accent);
      white-space: nowrap;
    }
    #template-tools {
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
      flex: 1; min-width: 0;
    }
    #status {
      font-size: 12px; color: var(--text-muted);
      white-space: nowrap; min-width: 4em; text-align: right;
      transition: color var(--transition);
    }
    #status.saved { color: var(--success); }
    #status.error { color: var(--danger); }
    .toolbar-end {
      margin-left: auto;
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    #version-badge {
      font-size: 11px; font-weight: 600; font-variant-numeric: tabular-nums;
      color: var(--text-muted); letter-spacing: 0.02em;
      padding: 3px 8px; border-radius: 999px;
      border: 1px solid var(--border); background: var(--bg-muted);
      user-select: none; white-space: nowrap;
    }
    .about-body {
      font-size: 13px; line-height: 1.55; color: var(--text);
    }
    .about-body p { margin: 0 0 10px; }
    .about-body ul { margin: 0 0 10px; padding-left: 1.2em; }
    .about-body li { margin: 3px 0; }
    .about-body kbd {
      font-family: var(--mono); font-size: 11px;
      border: 1px solid var(--border); border-radius: 4px;
      padding: 1px 5px; background: var(--bg-muted);
    }
    .about-meta {
      margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border);
      font-size: 12px; color: var(--text-muted);
    }

    /* Dropdown menus */
    .menu-wrap { position: relative; }
    .menu-panel {
      display: none; position: absolute; top: calc(100% + 6px); left: 0;
      min-width: 200px; z-index: 50;
      background: var(--bg-elevated); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow-lg);
      padding: 6px; animation: menuIn 0.14s ease;
    }
    .menu-panel.right { left: auto; right: 0; }
    .menu-wrap.open .menu-panel { display: block; }
    .menu-panel button {
      display: block; width: 100%; text-align: left;
      border: none; background: transparent; border-radius: 5px;
      padding: 8px 10px; margin: 0;
    }
    .menu-panel button:hover { background: var(--bg-muted); }
    .menu-panel button.danger:hover { background: var(--danger-bg); color: var(--danger); }
    .menu-panel .menu-sep {
      height: 1px; background: var(--border); margin: 4px 0;
    }
    .menu-panel .menu-hint {
      font-size: 11px; color: var(--text-muted); padding: 4px 10px 6px;
    }
    @keyframes menuIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: none; }
    }

    /* Workspace */
    #workspace {
      flex: 1; min-height: 0; position: relative; overflow: hidden;
      background: var(--bg-workspace);
      transition: background var(--transition);
    }
    #board-root {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      opacity: 1;
      transition: opacity 0.16s ease;
    }
    #board-root.switching { opacity: 0; }

    /* Shared */
    .swatch {
      width: 26px; height: 26px; border-radius: 50%;
      border: 2px solid transparent; padding: 0;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.15);
    }
    .swatch.active {
      box-shadow: 0 0 0 2px var(--bg-elevated), 0 0 0 4px var(--accent);
    }
    .brush-size-btn { min-width: 34px; font-weight: 600; }
    .empty-hint {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 8px;
      color: var(--text-muted); font-size: 15px;
      pointer-events: none; user-select: none; text-align: center; padding: 24px;
    }
    .empty-hint.hidden { display: none; }
    .empty-hint strong { color: var(--text); font-weight: 600; }
    .empty-hint kbd {
      font-family: var(--mono); font-size: 12px;
      border: 1px solid var(--border); border-radius: 4px;
      padding: 2px 6px; background: var(--bg-elevated);
    }

    /* ===== Paint ===== */
    .paint-root { background: #c8ccd2; }
    [data-theme="dark"] .paint-root { background: #0e1016; }
    .paint-canvas-wrap {
      flex: 1; min-height: 0; position: relative;
      margin: 12px; border-radius: var(--radius); overflow: hidden;
      box-shadow: var(--shadow-lg); background: #fff; touch-action: none; cursor: crosshair;
    }
    .paint-canvas-wrap canvas { display: block; width: 100%; height: 100%; }

    /* ===== Notepad ===== */
    .notepad-root {
      background:
        linear-gradient(90deg, rgba(74,124,255,0.05) 1px, transparent 1px),
        linear-gradient(rgba(74,124,255,0.05) 1px, transparent 1px),
        var(--bg-workspace);
      background-size: 24px 24px;
    }
    .notepad-board {
      flex: 1; min-height: 0; position: relative; overflow: auto;
      min-width: 100%; min-height: 100%;
    }
    .sticky-note {
      position: absolute; min-width: 140px; min-height: 100px;
      width: 200px; height: 180px;
      background: #fff9c4; border: 1px solid rgba(0,0,0,0.12);
      border-radius: 4px; box-shadow: 2px 3px 10px rgba(0,0,0,0.12);
      display: flex; flex-direction: column; z-index: 1; overflow: hidden;
      transition: box-shadow 0.15s ease;
    }
    .sticky-note:focus-within, .sticky-note.dragging, .sticky-note.selected {
      z-index: 10; box-shadow: 3px 6px 16px rgba(0,0,0,0.18);
      outline: 2px solid rgba(74,124,255,0.5);
    }
    .sticky-note .note-header {
      display: flex; align-items: center; gap: 4px;
      padding: 4px 6px; background: rgba(0,0,0,0.06);
      cursor: grab; user-select: none; flex-shrink: 0;
    }
    .sticky-note.dragging .note-header { cursor: grabbing; }
    .sticky-note .note-header .grip {
      flex: 1; font-size: 11px; color: rgba(0,0,0,0.4); letter-spacing: 0.06em;
    }
    .sticky-note .note-header button {
      padding: 2px 6px; font-size: 12px; line-height: 1.2;
      border-radius: 4px; border-color: transparent; background: transparent; color: #1a1a1a;
    }
    .sticky-note .note-header button:hover { background: rgba(0,0,0,0.08); }
    .sticky-note .note-body {
      flex: 1; min-height: 0; padding: 8px 10px; border: none; resize: none;
      background: transparent; outline: none; width: 100%;
      font-size: 13px; line-height: 1.45; color: #1a1a1a;
    }
    .sticky-note .resize-handle {
      position: absolute; right: 0; bottom: 0; width: 16px; height: 16px;
      cursor: nwse-resize;
      background:
        linear-gradient(135deg, transparent 50%, rgba(0,0,0,0.25) 50%, rgba(0,0,0,0.25) 60%, transparent 60%),
        linear-gradient(135deg, transparent 70%, rgba(0,0,0,0.25) 70%, rgba(0,0,0,0.25) 80%, transparent 80%);
    }
    .sticky-note.color-yellow { background: #fff9c4; }
    .sticky-note.color-pink   { background: #f8bbd9; }
    .sticky-note.color-blue   { background: #bbdefb; }
    .sticky-note.color-green  { background: #c8e6c9; }
    .sticky-note.color-orange { background: #ffe0b2; }

    /* ===== Snip / annotate ===== */
    .snip-root { background: var(--bg-workspace); }
    .snip-stage {
      flex: 1; min-height: 0; position: relative; overflow: auto;
      display: flex; align-items: flex-start; justify-content: center;
      padding: 16px;
    }
    .snip-stage.drop-active {
      outline: 2px dashed var(--accent); outline-offset: -8px;
      background: var(--accent-soft);
    }
    .snip-canvas-wrap {
      position: relative; box-shadow: var(--shadow-lg);
      border-radius: 4px; overflow: hidden; background: #1a1a1a;
      line-height: 0; max-width: 100%;
    }
    .snip-canvas-wrap canvas {
      display: block; max-width: 100%; height: auto; cursor: crosshair;
      touch-action: none;
    }
    .snip-canvas-wrap.has-image canvas { background: #fff; }

    /* ===== Wordpad ===== */
    .wordpad-root {
      background: var(--bg-workspace);
      display: flex; flex-direction: column;
    }
    .wordpad-editor-wrap {
      flex: 1; min-height: 0; overflow: auto; padding: 20px;
      display: flex; justify-content: center;
    }
    .wordpad-editor {
      width: min(760px, 100%);
      min-height: calc(100% - 8px);
      background: var(--bg-elevated);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      padding: 36px 48px;
      outline: none;
      line-height: 1.6;
      font-size: 15px;
      transition: background var(--transition), color var(--transition), border-color var(--transition);
    }
    .wordpad-editor:focus {
      border-color: var(--accent);
      box-shadow: var(--shadow-lg), 0 0 0 3px var(--accent-soft);
    }
    .wordpad-editor h1 { font-size: 1.75em; margin: 0.6em 0 0.35em; font-weight: 700; }
    .wordpad-editor h2 { font-size: 1.35em; margin: 0.7em 0 0.3em; font-weight: 650; }
    .wordpad-editor p { margin: 0.45em 0; }
    .wordpad-editor ul, .wordpad-editor ol { margin: 0.45em 0; padding-left: 1.4em; }
    .wordpad-editor:empty::before {
      content: attr(data-placeholder);
      color: var(--text-muted);
      pointer-events: none;
    }

    /* Modals */
    .modal-backdrop {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(15, 18, 28, 0.45);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      animation: fadeIn 0.15s ease;
    }
    .modal {
      background: var(--bg-elevated); color: var(--text);
      border: 1px solid var(--border); border-radius: 12px;
      box-shadow: var(--shadow-lg);
      width: min(420px, 100%);
      padding: 20px 22px;
      animation: popIn 0.16s ease;
    }
    .modal h2 {
      margin: 0 0 6px; font-size: 17px; font-weight: 700; letter-spacing: -0.01em;
    }
    .modal p.sub {
      margin: 0 0 16px; color: var(--text-muted); font-size: 13px; line-height: 1.45;
    }
    .modal .field { margin-bottom: 14px; }
    .modal .field label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.04em;
    }
    .modal .field input, .modal .field select { width: 100%; }
    .modal-actions {
      display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px;
    }
    .template-picker {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    }
    .template-picker button {
      text-align: left; padding: 10px 12px; border-radius: var(--radius);
    }
    .template-picker button.active {
      background: var(--accent-soft); color: var(--text); border-color: var(--accent);
    }
    .template-picker button strong { display: block; font-size: 13px; }
    .template-picker button span {
      display: block; font-size: 11px; color: var(--text-muted); margin-top: 2px; font-weight: 400;
    }
    .template-picker button.active span { color: var(--text-muted); }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.97) translateY(4px); }
      to { opacity: 1; transform: none; }
    }

    /* Hidden file inputs */
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0); border: 0;
    }

    @media (max-width: 720px) {
      #toolbar { padding: 8px 10px; gap: 6px 8px; }
      #status { width: 100%; margin-left: 0; order: 99; text-align: left; }
      .toolbar-sep { display: none; }
      .wordpad-editor { padding: 20px 18px; }
      .template-picker { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="app">
    <header id="toolbar" role="banner">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">W</div>
        <div>Whiteboard <small>offline</small></div>
      </div>
      <div class="toolbar-sep" aria-hidden="true"></div>

      <div class="toolbar-group" aria-label="Boards">
        <span class="label">Board</span>
        <select id="board-select" aria-label="Select board"></select>
        <span id="type-badge" class="type-badge">—</span>
        <button type="button" id="btn-new-board" title="New board">+ New</button>
        <div class="menu-wrap" id="board-menu-wrap">
          <button type="button" id="btn-board-menu" class="icon-btn" aria-haspopup="true" aria-expanded="false" title="Board actions">▾</button>
          <div class="menu-panel" id="board-menu" role="menu">
            <button type="button" data-action="rename" role="menuitem">Rename…</button>
            <button type="button" data-action="duplicate" role="menuitem">Duplicate</button>
            <div class="menu-sep"></div>
            <button type="button" data-action="delete" class="danger" role="menuitem">Delete board…</button>
          </div>
        </div>
      </div>

      <div class="toolbar-sep" aria-hidden="true"></div>

      <div class="toolbar-group">
        <div class="menu-wrap" id="file-menu-wrap">
          <button type="button" id="btn-file-menu" aria-haspopup="true" aria-expanded="false">File ▾</button>
          <div class="menu-panel" id="file-menu" role="menu">
            <button type="button" data-action="export-board" role="menuitem">Export current board (JSON)</button>
            <button type="button" data-action="export-all" role="menuitem">Export all boards (JSON)</button>
            <button type="button" data-action="import-json" role="menuitem">Import JSON…</button>
            <div class="menu-sep"></div>
            <button type="button" data-action="export-png" role="menuitem">Export as PNG…</button>
            <button type="button" data-action="export-text" role="menuitem">Export as text…</button>
            <div class="menu-sep"></div>
            <div class="menu-hint">PNG works for Paint &amp; Annotate.<br>Text works for Wordpad.</div>
          </div>
        </div>
        <button type="button" id="btn-theme" class="icon-btn" title="Toggle light/dark theme" aria-label="Toggle theme">◐</button>
        <button type="button" id="btn-about" class="icon-btn" title="About / help" aria-label="About">?</button>
      </div>

      <div class="toolbar-sep" aria-hidden="true"></div>
      <div id="template-tools" aria-live="polite"></div>
      <div class="toolbar-end">
        <div id="status" aria-live="polite">Ready</div>
        <span id="version-badge" title="App version">v1.0.0</span>
      </div>
    </header>
    <main id="workspace" role="main" aria-label="Board workspace">
      <div id="board-root"></div>
    </main>
  </div>
  <input type="file" id="import-file" class="sr-only" accept="application/json,.json" />
  <input type="file" id="image-file" class="sr-only" accept="image/*" />

  <script>
(function () {
  'use strict';

  const APP_VERSION = '1.0.0';
  const STORAGE_KEY = 'whiteboard-app-v2';
  const STORAGE_KEY_LEGACY = 'whiteboard-app-v1';
  const MAX_UNDO = 40;

  // =========================================================================
  // Utilities
  // =========================================================================
  function uid(prefix) {
    return (prefix || 'id') + '_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8);
  }

  function downloadBlob(filename, blob) {
    const a = document.createElement('a');
    const url = URL.createObjectURL(blob);
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    setTimeout(function () {
      URL.revokeObjectURL(url);
      a.remove();
    }, 500);
  }

  function downloadText(filename, text, mime) {
    downloadBlob(filename, new Blob([text], { type: mime || 'text/plain;charset=utf-8' }));
  }

  function downloadDataUrl(filename, dataUrl) {
    const a = document.createElement('a');
    a.href = dataUrl;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
  }

  function safeName(name) {
    return String(name || 'board').replace(/[^\w\- ]+/g, '').trim().replace(/\s+/g, '-') || 'board';
  }

  function HistoryStack(limit) {
    this.limit = limit || MAX_UNDO;
    this.stack = [];
    this.index = -1;
  }
  HistoryStack.prototype.push = function (snapshot) {
    // Drop redo branch
    this.stack = this.stack.slice(0, this.index + 1);
    this.stack.push(snapshot);
    if (this.stack.length > this.limit) {
      this.stack.shift();
    }
    this.index = this.stack.length - 1;
  };
  HistoryStack.prototype.canUndo = function () { return this.index > 0; };
  HistoryStack.prototype.canRedo = function () { return this.index >= 0 && this.index < this.stack.length - 1; };
  HistoryStack.prototype.undo = function () {
    if (!this.canUndo()) return null;
    this.index--;
    return this.stack[this.index];
  };
  HistoryStack.prototype.redo = function () {
    if (!this.canRedo()) return null;
    this.index++;
    return this.stack[this.index];
  };
  HistoryStack.prototype.reset = function (snapshot) {
    this.stack = snapshot != null ? [snapshot] : [];
    this.index = this.stack.length - 1;
  };
  HistoryStack.prototype.current = function () {
    return this.index >= 0 ? this.stack[this.index] : null;
  };

  // =========================================================================
  // Storage + migration
  // =========================================================================
  function loadRaw(key) {
    try {
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : null;
    } catch (e) {
      console.warn('load failed', e);
      return null;
    }
  }

  function saveRaw(key, data) {
    try {
      localStorage.setItem(key, JSON.stringify(data));
      return true;
    } catch (e) {
      console.warn('save failed', e);
      return false;
    }
  }

  function migrateLegacy(v1) {
    const boards = [];
    const templates = (v1 && v1.templates) || {};
    const order = ['paint', 'notepad', 'snip', 'wordpad'];
    order.forEach(function (tid) {
      if (templates[tid]) {
        boards.push({
          id: uid('board'),
          name: tid.charAt(0).toUpperCase() + tid.slice(1) + ' board',
          templateId: tid,
          state: templates[tid],
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString()
        });
      }
    });
    // Also pick up any other keys
    Object.keys(templates).forEach(function (tid) {
      if (!order.includes(tid)) {
        boards.push({
          id: uid('board'),
          name: tid + ' board',
          templateId: tid,
          state: templates[tid],
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString()
        });
      }
    });
    if (!boards.length) return null;
    const preferredTpl = v1.currentTemplateId;
    let currentBoardId = boards[0].id;
    if (preferredTpl) {
      const match = boards.find(function (b) { return b.templateId === preferredTpl; });
      if (match) currentBoardId = match.id;
    }
    return {
      version: 2,
      theme: 'light',
      currentBoardId: currentBoardId,
      boards: boards,
      migratedFrom: 1
    };
  }

  function defaultStore() {
    const id = uid('board');
    return {
      version: 2,
      theme: 'light',
      currentBoardId: id,
      boards: [{
        id: id,
        name: 'Paint board',
        templateId: 'paint',
        state: {},
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString()
      }]
    };
  }

  function loadStore() {
    let data = loadRaw(STORAGE_KEY);
    if (data && data.version === 2 && Array.isArray(data.boards)) {
      return data;
    }
    const legacy = loadRaw(STORAGE_KEY_LEGACY);
    if (legacy) {
      const migrated = migrateLegacy(legacy);
      if (migrated) {
        saveRaw(STORAGE_KEY, migrated);
        return migrated;
      }
    }
    return defaultStore();
  }

  // =========================================================================
  // Template registry
  // =========================================================================
  /**
   * Template contract:
   *   id, name, description?, kind? ('raster'|'text'|'other')
   *   create(ctx) -> instance
   * Instance:
   *   mount(el), unmount(), getState(), setState(s), renderTools(el)
   *   Optional: undo(), redo(), canUndo(), canRedo(),
   *             exportPng() -> dataUrl|null, exportText() -> string|null
   * ctx: onChange(), setStatus(msg, kind?)
   */
  const TemplateRegistry = {
    _map: Object.create(null),
    register: function (t) {
      if (!t || !t.id || typeof t.create !== 'function') throw new Error('Invalid template');
      this._map[t.id] = t;
    },
    get: function (id) { return this._map[id] || null; },
    list: function () {
      const self = this;
      return Object.keys(this._map).map(function (k) { return self._map[k]; });
    }
  };

  // =========================================================================
  // Modal helper
  // =========================================================================
  function showModal(opts) {
    return new Promise(function (resolve) {
      const backdrop = document.createElement('div');
      backdrop.className = 'modal-backdrop';
      backdrop.setAttribute('role', 'dialog');
      backdrop.setAttribute('aria-modal', 'true');

      const modal = document.createElement('div');
      modal.className = 'modal';
      const h2 = document.createElement('h2');
      h2.textContent = opts.title || 'Dialog';
      modal.appendChild(h2);
      if (opts.subtitle) {
        const p = document.createElement('p');
        p.className = 'sub';
        p.textContent = opts.subtitle;
        modal.appendChild(p);
      }

      const fields = opts.fields || [];
      const values = {};
      fields.forEach(function (f) {
        const wrap = document.createElement('div');
        wrap.className = 'field';
        const lab = document.createElement('label');
        lab.textContent = f.label;
        wrap.appendChild(lab);
        if (f.type === 'template-picker') {
          const grid = document.createElement('div');
          grid.className = 'template-picker';
          values[f.name] = f.value || (f.options[0] && f.options[0].id);
          f.options.forEach(function (opt) {
            const b = document.createElement('button');
            b.type = 'button';
            b.className = opt.id === values[f.name] ? 'active' : '';
            b.innerHTML = '<strong></strong><span></span>';
            b.querySelector('strong').textContent = opt.name;
            b.querySelector('span').textContent = opt.description || '';
            b.addEventListener('click', function () {
              values[f.name] = opt.id;
              grid.querySelectorAll('button').forEach(function (x) { x.classList.remove('active'); });
              b.classList.add('active');
            });
            grid.appendChild(b);
          });
          wrap.appendChild(grid);
        } else {
          const input = document.createElement(f.type === 'select' ? 'select' : 'input');
          if (f.type !== 'select') {
            input.type = f.type || 'text';
            input.value = f.value || '';
          } else {
            (f.options || []).forEach(function (opt) {
              const o = document.createElement('option');
              o.value = opt.id;
              o.textContent = opt.name;
              if (opt.id === f.value) o.selected = true;
              input.appendChild(o);
            });
          }
          input.id = 'modal-field-' + f.name;
          wrap.appendChild(input);
          values[f.name] = function () { return input.value; };
        }
        modal.appendChild(wrap);
      });

      const actions = document.createElement('div');
      actions.className = 'modal-actions';
      const cancel = document.createElement('button');
      cancel.type = 'button';
      cancel.textContent = opts.cancelLabel || 'Cancel';
      cancel.addEventListener('click', close.bind(null, null));
      const ok = document.createElement('button');
      ok.type = 'button';
      ok.className = opts.danger ? 'danger active' : 'active';
      ok.textContent = opts.okLabel || 'OK';
      ok.addEventListener('click', function () {
        const out = {};
        fields.forEach(function (f) {
          out[f.name] = typeof values[f.name] === 'function' ? values[f.name]() : values[f.name];
        });
        close(out);
      });
      actions.appendChild(cancel);
      actions.appendChild(ok);
      modal.appendChild(actions);
      backdrop.appendChild(modal);

      function onKey(e) {
        if (e.key === 'Escape') close(null);
        if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') {
          e.preventDefault();
          ok.click();
        }
      }
      function close(result) {
        document.removeEventListener('keydown', onKey);
        backdrop.remove();
        resolve(result);
      }
      backdrop.addEventListener('click', function (e) {
        if (e.target === backdrop) close(null);
      });
      document.addEventListener('keydown', onKey);
      document.body.appendChild(backdrop);
      const first = modal.querySelector('input, select, button.active');
      if (first && first.focus) setTimeout(function () { first.focus(); first.select && first.select(); }, 30);
    });
  }

  // =========================================================================
  // App shell (multi-board)
  // =========================================================================
  const App = {
    store: null,
    instance: null,
    currentBoardId: null,
    saveTimer: null,
    _keyHandler: null,

    init: function () {
      this.store = loadStore();
      this.applyTheme(this.store.theme || 'light', true);
      this.bindChrome();
      this.refreshBoardSelect();

      const startId = this.store.currentBoardId;
      const board = this.getBoard(startId) || this.store.boards[0];
      if (board) this.openBoard(board.id, { silent: true });
      else this.setStatus('No boards', 'error');

      window.addEventListener('beforeunload', function () { App.flushSave(); });
      setInterval(function () { App.flushSave(); }, 30000);

      this._keyHandler = function (e) { App.onGlobalKey(e); };
      window.addEventListener('keydown', this._keyHandler);
    },

    bindChrome: function () {
      const self = this;
      document.getElementById('board-select').addEventListener('change', function (e) {
        self.openBoard(e.target.value);
      });
      document.getElementById('btn-new-board').addEventListener('click', function () {
        self.promptNewBoard();
      });
      document.getElementById('btn-theme').addEventListener('click', function () {
        self.applyTheme(self.store.theme === 'dark' ? 'light' : 'dark');
      });
      document.getElementById('btn-about').addEventListener('click', function () {
        self.showAbout();
      });
      var verBadge = document.getElementById('version-badge');
      if (verBadge) verBadge.textContent = 'v' + APP_VERSION;

      // Board menu
      const boardWrap = document.getElementById('board-menu-wrap');
      document.getElementById('btn-board-menu').addEventListener('click', function (e) {
        e.stopPropagation();
        self.toggleMenu('board-menu-wrap');
      });
      document.getElementById('board-menu').addEventListener('click', function (e) {
        const btn = e.target.closest('button[data-action]');
        if (!btn) return;
        self.closeMenus();
        const action = btn.dataset.action;
        if (action === 'rename') self.promptRename();
        if (action === 'duplicate') self.duplicateBoard();
        if (action === 'delete') self.deleteBoard();
      });

      // File menu
      document.getElementById('btn-file-menu').addEventListener('click', function (e) {
        e.stopPropagation();
        self.toggleMenu('file-menu-wrap');
      });
      document.getElementById('file-menu').addEventListener('click', function (e) {
        const btn = e.target.closest('button[data-action]');
        if (!btn) return;
        self.closeMenus();
        const action = btn.dataset.action;
        if (action === 'export-board') self.exportBoardJson(false);
        if (action === 'export-all') self.exportBoardJson(true);
        if (action === 'import-json') document.getElementById('import-file').click();
        if (action === 'export-png') self.exportPng();
        if (action === 'export-text') self.exportText();
      });

      document.getElementById('import-file').addEventListener('change', function (e) {
        const file = e.target.files && e.target.files[0];
        e.target.value = '';
        if (file) self.importJsonFile(file);
      });

      document.addEventListener('click', function () { self.closeMenus(); });
    },

    toggleMenu: function (wrapId) {
      const wrap = document.getElementById(wrapId);
      const wasOpen = wrap.classList.contains('open');
      this.closeMenus();
      if (!wasOpen) {
        wrap.classList.add('open');
        const btn = wrap.querySelector('button');
        if (btn) btn.setAttribute('aria-expanded', 'true');
      }
    },

    closeMenus: function () {
      document.querySelectorAll('.menu-wrap.open').forEach(function (w) {
        w.classList.remove('open');
        const btn = w.querySelector('button');
        if (btn) btn.setAttribute('aria-expanded', 'false');
      });
    },

    applyTheme: function (theme, skipSave) {
      theme = theme === 'dark' ? 'dark' : 'light';
      this.store.theme = theme;
      document.documentElement.setAttribute('data-theme', theme);
      const btn = document.getElementById('btn-theme');
      if (btn) btn.title = theme === 'dark' ? 'Switch to light theme' : 'Switch to dark theme';
      if (!skipSave) this.scheduleSave();
    },

    getBoard: function (id) {
      return this.store.boards.find(function (b) { return b.id === id; }) || null;
    },

    currentBoard: function () {
      return this.getBoard(this.currentBoardId);
    },

    snapshotCurrent: function () {
      if (this.instance && this.currentBoardId) {
        const board = this.getBoard(this.currentBoardId);
        if (board) {
          try {
            board.state = this.instance.getState();
            board.updatedAt = new Date().toISOString();
          } catch (e) {
            console.warn('getState failed', e);
          }
        }
      }
    },

    refreshBoardSelect: function () {
      const sel = document.getElementById('board-select');
      const cur = this.currentBoardId;
      sel.innerHTML = '';
      this.store.boards.forEach(function (b) {
        const opt = document.createElement('option');
        opt.value = b.id;
        const tpl = TemplateRegistry.get(b.templateId);
        const tname = tpl ? tpl.name : b.templateId;
        opt.textContent = b.name + ' (' + tname + ')';
        if (b.id === cur) opt.selected = true;
        sel.appendChild(opt);
      });
      const board = this.getBoard(cur);
      const badge = document.getElementById('type-badge');
      if (board) {
        const tpl = TemplateRegistry.get(board.templateId);
        badge.textContent = tpl ? tpl.name : board.templateId;
      } else {
        badge.textContent = '—';
      }
    },

    openBoard: function (id, opts) {
      opts = opts || {};
      const board = this.getBoard(id);
      if (!board) {
        this.setStatus('Board not found', 'error');
        return;
      }
      if (id === this.currentBoardId && this.instance && !opts.force) return;

      this.snapshotCurrent();

      const root = document.getElementById('board-root');
      root.classList.add('switching');

      const self = this;
      const doMount = function () {
        if (self.instance) {
          try { self.instance.unmount(); } catch (e) { console.warn(e); }
          self.instance = null;
        }
        root.innerHTML = '';
        root.className = 'board-root';
        document.getElementById('template-tools').innerHTML = '';

        const template = TemplateRegistry.get(board.templateId);
        if (!template) {
          root.innerHTML = '<div class="empty-hint"><strong>Unknown template</strong><div>' + board.templateId + '</div></div>';
          self.currentBoardId = board.id;
          self.store.currentBoardId = board.id;
          self.refreshBoardSelect();
          root.classList.remove('switching');
          self.setStatus('Unknown template: ' + board.templateId, 'error');
          return;
        }

        const ctx = {
          onChange: function () { self.scheduleSave(); },
          setStatus: function (msg, kind) { self.setStatus(msg, kind); }
        };
        const instance = template.create(ctx);
        if (board.state) {
          try { instance.setState(board.state); } catch (e) { console.warn(e); }
        }
        instance.mount(root);
        if (typeof instance.renderTools === 'function') {
          instance.renderTools(document.getElementById('template-tools'));
        }
        self.instance = instance;
        self.currentBoardId = board.id;
        self.store.currentBoardId = board.id;
        self.refreshBoardSelect();
        requestAnimationFrame(function () {
          root.classList.remove('switching');
        });
        if (!opts.silent) self.setStatus('Opened “' + board.name + '”');
        self.scheduleSave();
      };

      setTimeout(doMount, 90);
    },

    promptNewBoard: async function () {
      const templates = TemplateRegistry.list();
      const result = await showModal({
        title: 'New board',
        subtitle: 'Choose a name and board type. Type is fixed for this board.',
        okLabel: 'Create',
        fields: [
          { name: 'name', label: 'Name', value: 'Untitled board' },
          {
            name: 'templateId',
            label: 'Type',
            type: 'template-picker',
            value: 'paint',
            options: templates.map(function (t) {
              return { id: t.id, name: t.name, description: t.description || '' };
            })
          }
        ]
      });
      if (!result) return;
      const name = (result.name || '').trim() || 'Untitled board';
      const templateId = result.templateId;
      if (!TemplateRegistry.get(templateId)) {
        this.setStatus('Invalid template', 'error');
        return;
      }
      const board = {
        id: uid('board'),
        name: name,
        templateId: templateId,
        state: {},
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString()
      };
      this.store.boards.push(board);
      this.openBoard(board.id);
      this.setStatus('Created “' + name + '”');
    },

    promptRename: async function () {
      const board = this.currentBoard();
      if (!board) return;
      const result = await showModal({
        title: 'Rename board',
        okLabel: 'Rename',
        fields: [{ name: 'name', label: 'Name', value: board.name }]
      });
      if (!result) return;
      const name = (result.name || '').trim();
      if (!name) return;
      board.name = name;
      board.updatedAt = new Date().toISOString();
      this.refreshBoardSelect();
      this.scheduleSave();
      this.setStatus('Renamed to “' + name + '”');
    },

    duplicateBoard: function () {
      this.snapshotCurrent();
      const board = this.currentBoard();
      if (!board) return;
      const copy = {
        id: uid('board'),
        name: board.name + ' copy',
        templateId: board.templateId,
        state: JSON.parse(JSON.stringify(board.state || {})),
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString()
      };
      this.store.boards.push(copy);
      this.openBoard(copy.id);
      this.setStatus('Duplicated board');
    },

    deleteBoard: async function () {
      const board = this.currentBoard();
      if (!board) return;
      if (this.store.boards.length <= 1) {
        this.setStatus('Cannot delete the only board', 'error');
        return;
      }
      const result = await showModal({
        title: 'Delete board?',
        subtitle: '“' + board.name + '” will be permanently removed from this browser’s storage. This cannot be undone.',
        okLabel: 'Delete',
        danger: true,
        fields: []
      });
      // showModal with no fields still needs OK click — if cancelled, result is null
      // Actually with empty fields, result is {} on OK and null on cancel
      if (result === null) return;

      const id = board.id;
      if (this.instance) {
        try { this.instance.unmount(); } catch (_) {}
        this.instance = null;
      }
      this.store.boards = this.store.boards.filter(function (b) { return b.id !== id; });
      this.currentBoardId = null;
      const next = this.store.boards[0];
      this.openBoard(next.id, { force: true });
      this.setStatus('Board deleted');
    },

    scheduleSave: function () {
      const self = this;
      if (this.saveTimer) clearTimeout(this.saveTimer);
      this.saveTimer = setTimeout(function () { self.flushSave(); }, 400);
    },

    flushSave: function () {
      if (this.saveTimer) {
        clearTimeout(this.saveTimer);
        this.saveTimer = null;
      }
      this.snapshotCurrent();
      const payload = {
        version: 2,
        theme: this.store.theme || 'light',
        currentBoardId: this.currentBoardId,
        boards: this.store.boards,
        savedAt: new Date().toISOString()
      };
      const ok = saveRaw(STORAGE_KEY, payload);
      this.store = payload;
      this.setStatus(ok ? 'Saved' : 'Save failed (storage full?)', ok ? 'saved' : 'error');
    },

    setStatus: function (msg, kind) {
      const el = document.getElementById('status');
      if (!el) return;
      el.textContent = msg || '';
      el.classList.remove('saved', 'error');
      if (kind === 'saved') el.classList.add('saved');
      if (kind === 'error') el.classList.add('error');
    },

    onGlobalKey: function (e) {
      const mod = e.ctrlKey || e.metaKey;
      if (!mod) return;
      // Don't steal keys from plain inputs except we handle undo ourselves for paint
      const tag = (e.target && e.target.tagName) || '';
      const isField = tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT';

      if (e.key === 'z' || e.key === 'Z') {
        if (isField && !e.target.isContentEditable) return;
        // For contenteditable wordpad, we still use our stack if available
        if (!this.instance) return;
        if (e.shiftKey) {
          if (typeof this.instance.redo === 'function' && this.instance.canRedo && this.instance.canRedo()) {
            e.preventDefault();
            this.instance.redo();
            this.scheduleSave();
            this.setStatus('Redo');
          }
        } else {
          if (typeof this.instance.undo === 'function' && this.instance.canUndo && this.instance.canUndo()) {
            e.preventDefault();
            this.instance.undo();
            this.scheduleSave();
            this.setStatus('Undo');
          }
        }
      }
      if ((e.key === 'y' || e.key === 'Y') && this.instance && typeof this.instance.redo === 'function') {
        if (isField && !e.target.isContentEditable) return;
        if (this.instance.canRedo && this.instance.canRedo()) {
          e.preventDefault();
          this.instance.redo();
          this.scheduleSave();
          this.setStatus('Redo');
        }
      }
    },

    exportBoardJson: function (all) {
      this.snapshotCurrent();
      let payload;
      if (all) {
        payload = {
          format: 'whiteboard-export',
          version: 2,
          exportedAt: new Date().toISOString(),
          boards: this.store.boards
        };
        downloadText('whiteboard-all-boards.json', JSON.stringify(payload, null, 2), 'application/json');
        this.setStatus('Exported all boards');
      } else {
        const board = this.currentBoard();
        if (!board) return;
        payload = {
          format: 'whiteboard-export',
          version: 2,
          exportedAt: new Date().toISOString(),
          boards: [board]
        };
        downloadText(safeName(board.name) + '.json', JSON.stringify(payload, null, 2), 'application/json');
        this.setStatus('Exported board JSON');
      }
    },

    importJsonFile: function (file) {
      const self = this;
      const reader = new FileReader();
      reader.onload = function () {
        try {
          const data = JSON.parse(reader.result);
          self.importData(data);
        } catch (e) {
          self.setStatus('Import failed: invalid JSON', 'error');
        }
      };
      reader.onerror = function () { self.setStatus('Import failed: read error', 'error'); };
      reader.readAsText(file);
    },

    importData: function (data) {
      let boards = [];
      if (data && data.format === 'whiteboard-export' && Array.isArray(data.boards)) {
        boards = data.boards;
      } else if (data && data.version === 2 && Array.isArray(data.boards)) {
        boards = data.boards;
      } else if (data && data.version === 1 && data.templates) {
        const m = migrateLegacy(data);
        boards = m ? m.boards : [];
      } else if (data && data.templateId && data.state) {
        boards = [data];
      } else {
        this.setStatus('Import failed: unrecognized format', 'error');
        return;
      }
      if (!boards.length) {
        this.setStatus('Import failed: no boards in file', 'error');
        return;
      }
      this.snapshotCurrent();
      let added = 0;
      const self = this;
      boards.forEach(function (b) {
        if (!b || !b.templateId) return;
        if (!TemplateRegistry.get(b.templateId)) return;
        self.store.boards.push({
          id: uid('board'),
          name: (b.name || 'Imported board') + '',
          templateId: b.templateId,
          state: b.state || {},
          createdAt: b.createdAt || new Date().toISOString(),
          updatedAt: new Date().toISOString()
        });
        added++;
      });
      if (!added) {
        this.setStatus('Import failed: no compatible boards', 'error');
        return;
      }
      const last = this.store.boards[this.store.boards.length - 1];
      this.openBoard(last.id, { force: true });
      this.setStatus('Imported ' + added + ' board' + (added === 1 ? '' : 's'));
    },

    exportPng: function () {
      this.snapshotCurrent();

        this.setStatus('PNG export not available for this board type', 'error');

      const dataUrl = this.instance.exportPng();
      if (!dataUrl) {
        this.setStatus('Nothing to export as PNG', 'error');
