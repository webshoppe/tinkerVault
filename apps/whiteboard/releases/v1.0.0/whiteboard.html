  const PaintTemplate = {
    id: 'paint',
    name: 'Paint',
    description: 'Freehand drawing canvas',
    kind: 'raster',
    create: function (ctx) {
      const COLORS = ['#1a1a1a', '#e03131', '#2f9e44', '#1971c2', '#f08c00', '#ffffff'];
      const SIZES = [
        { id: 's', label: 'S', width: 2 },
        { id: 'm', label: 'M', width: 6 },
        { id: 'l', label: 'L', width: 14 }
      ];
      let color = COLORS[0];
      let sizeId = 'm';
      let drawing = false;
      let lastX = 0, lastY = 0;
      let canvas = null, wrap = null, c2d = null;
      let imageDataUrl = null;
      let ro = null;
      let resizeTimer = null;
      let history = new HistoryStack(MAX_UNDO);
      let toolsHost = null;
      let skipHistory = false;
      let alive = false;

      function brushWidth() {
        const s = SIZES.find(function (x) { return x.id === sizeId; });
        return s ? s.width : 6;
      }

      function pointerPos(e) {
        if (!canvas) return { x: 0, y: 0 };
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / Math.max(1, rect.width);
        const scaleY = canvas.height / Math.max(1, rect.height);
        const src = e.touches && e.touches[0] ? e.touches[0] : e;
        return {
          x: (src.clientX - rect.left) * scaleX,
          y: (src.clientY - rect.top) * scaleY
        };
      }

      function snapshot() {
        if (!canvas || !alive) return;
        try { imageDataUrl = canvas.toDataURL('image/png'); } catch (err) { console.warn(err); }
      }

      function pushHistory() {
        if (skipHistory || !alive) return;
        snapshot();
        history.push(imageDataUrl);
        updateUndoUI();
      }

      function fillWhite() {
        if (!c2d || !canvas || !alive) return;
        c2d.save();
        c2d.setTransform(1, 0, 0, 1, 0, 0);
        c2d.fillStyle = '#ffffff';
        c2d.fillRect(0, 0, canvas.width, canvas.height);
        c2d.restore();
      }

      function drawDataUrl(url, then) {
        if (!alive || !c2d || !canvas) {
          if (then) then();
          return;
        }
        if (!url) {
          fillWhite();
          if (then) then();
          return;
        }
        const img = new Image();
        img.onload = function () {
          if (!alive || !c2d || !canvas) { if (then) then(); return; }
          fillWhite();
          c2d.drawImage(img, 0, 0, canvas.width, canvas.height);
          if (then) then();
        };
        img.onerror = function () { fillWhite(); if (then) then(); };
        img.src = url;
      }

      function applyHistoryUrl(url) {
        skipHistory = true;
        imageDataUrl = url;
        drawDataUrl(url, function () {
          skipHistory = false;
          updateUndoUI();
          if (alive) ctx.onChange();
        });
      }

      function startDraw(e) {
        if (!alive || !c2d) return;
        e.preventDefault();
        drawing = true;
        const p = pointerPos(e);
        lastX = p.x; lastY = p.y;
        c2d.beginPath();
        c2d.fillStyle = color;
        c2d.arc(lastX, lastY, brushWidth() / 2, 0, Math.PI * 2);
        c2d.fill();
      }

      function moveDraw(e) {
        if (!drawing || !alive || !c2d) return;
        e.preventDefault();
        const p = pointerPos(e);
        c2d.beginPath();
        c2d.strokeStyle = color;
        c2d.lineWidth = brushWidth();
        c2d.lineCap = 'round';
        c2d.lineJoin = 'round';
        c2d.moveTo(lastX, lastY);
        c2d.lineTo(p.x, p.y);
        c2d.stroke();
        lastX = p.x; lastY = p.y;
      }

      function endDraw(e) {
        if (!drawing) return;
        if (e) e.preventDefault();
        drawing = false;
        if (!alive || !c2d) return;
        pushHistory();
        ctx.onChange();
      }

      function clearCanvas() {
        if (!alive || !c2d) return;
        fillWhite();
        imageDataUrl = null;
        pushHistory();
        ctx.onChange();
        ctx.setStatus('Canvas cleared');
      }

      function resizeCanvasKeepContent() {
        if (!alive || !wrap || !canvas || !c2d) return;
        const dpr = window.devicePixelRatio || 1;
        const cssW = wrap.clientWidth;
        const cssH = wrap.clientHeight;
        if (cssW < 1 || cssH < 1) return;
        const prev = imageDataUrl || (canvas.width ? canvas.toDataURL('image/png') : null);
        canvas.width = Math.max(1, Math.floor(cssW * dpr));
        canvas.height = Math.max(1, Math.floor(cssH * dpr));
        drawDataUrl(prev, function () {
          snapshot();
        });
      }

      function updateToolUI() {
        if (!toolsHost) return;
        toolsHost.querySelectorAll('.swatch').forEach(function (b) {
          b.classList.toggle('active', b.dataset.color === color);
        });
        toolsHost.querySelectorAll('.brush-size-btn').forEach(function (b) {
          b.classList.toggle('active', b.dataset.size === sizeId);
        });
        updateUndoUI();
      }

      function updateUndoUI() {
        if (!toolsHost) return;
        const u = toolsHost.querySelector('[data-act="undo"]');
        const r = toolsHost.querySelector('[data-act="redo"]');
        if (u) u.disabled = !history.canUndo();
        if (r) r.disabled = !history.canRedo();
      }

      return {
        setState: function (state) {
          if (!state || typeof state !== 'object') return;
          if (typeof state.color === 'string') color = state.color;
          if (typeof state.sizeId === 'string') sizeId = state.sizeId;
          if (typeof state.imageDataUrl === 'string') imageDataUrl = state.imageDataUrl;
        },
        getState: function () {
          if (canvas && c2d) {
            try { imageDataUrl = canvas.toDataURL('image/png'); } catch (_) {}
          }
          return { color: color, sizeId: sizeId, imageDataUrl: imageDataUrl };
        },
        mount: function (container) {
          alive = true;
          container.classList.add('paint-root');
          wrap = document.createElement('div');
          wrap.className = 'paint-canvas-wrap';
          canvas = document.createElement('canvas');
          canvas.setAttribute('aria-label', 'Paint canvas');
          wrap.appendChild(canvas);
          container.appendChild(wrap);
          c2d = canvas.getContext('2d');
          resizeCanvasKeepContent();
          // Seed history after first paint
          setTimeout(function () {
            if (!alive) return;
            snapshot();
            if (history.index < 0) history.reset(imageDataUrl);
            updateUndoUI();
          }, 50);

          canvas.addEventListener('mousedown', startDraw);
          canvas.addEventListener('mousemove', moveDraw);
          window.addEventListener('mouseup', endDraw);
          canvas.addEventListener('mouseleave', endDraw);
          canvas.addEventListener('touchstart', startDraw, { passive: false });
          canvas.addEventListener('touchmove', moveDraw, { passive: false });
          canvas.addEventListener('touchend', endDraw, { passive: false });
          canvas.addEventListener('touchcancel', endDraw, { passive: false });

          ro = new ResizeObserver(function () {
            if (resizeTimer) clearTimeout(resizeTimer);
            resizeTimer = setTimeout(function () {
              resizeTimer = null;
              resizeCanvasKeepContent();
            }, 80);
          });
          ro.observe(wrap);
        },
        unmount: function () {
          alive = false;
          drawing = false;
          if (resizeTimer) { clearTimeout(resizeTimer); resizeTimer = null; }
          if (canvas && c2d) {
            try { imageDataUrl = canvas.toDataURL('image/png'); } catch (_) {}
          }
          if (ro) { ro.disconnect(); ro = null; }
          window.removeEventListener('mouseup', endDraw);
          canvas = wrap = c2d = toolsHost = null;
        },
        undo: function () {
          const url = history.undo();
          if (url !== null && url !== undefined) applyHistoryUrl(url);
        },
        redo: function () {
          const url = history.redo();
          if (url !== null && url !== undefined) applyHistoryUrl(url);
        },
        canUndo: function () { return history.canUndo(); },
        canRedo: function () { return history.canRedo(); },
        exportPng: function () {
          if (!canvas) return imageDataUrl;
          try { return canvas.toDataURL('image/png'); } catch (_) { return imageDataUrl; }
        },
        renderTools: function (toolsEl) {
          toolsHost = toolsEl;
          const group = document.createElement('div');
          group.className = 'toolbar-group';

          function addBtn(label, act, title) {
            const b = document.createElement('button');
            b.type = 'button';
            b.textContent = label;
            b.dataset.act = act;
            b.title = title || label;
            group.appendChild(b);
            return b;
          }
          addBtn('Undo', 'undo', 'Undo (Ctrl+Z)').addEventListener('click', function () {
            const url = history.undo();
            if (url !== null && url !== undefined) applyHistoryUrl(url);
          });
          addBtn('Redo', 'redo', 'Redo (Ctrl+Shift+Z)').addEventListener('click', function () {
            const url = history.redo();
            if (url !== null && url !== undefined) applyHistoryUrl(url);
          });

          const sep0 = document.createElement('div');
          sep0.className = 'toolbar-sep';
          group.appendChild(sep0);

          const colorLabel = document.createElement('span');
          colorLabel.className = 'label';
          colorLabel.textContent = 'Color';
          group.appendChild(colorLabel);
          COLORS.forEach(function (c) {
            const b = document.createElement('button');
            b.type = 'button';
            b.className = 'swatch' + (c === color ? ' active' : '');
            b.style.background = c;
            b.dataset.color = c;
            b.title = c;
            if (c === '#ffffff') b.style.boxShadow = 'inset 0 0 0 1px #ccc';
            b.addEventListener('click', function () {
              color = c;
              updateToolUI();
              ctx.onChange();
            });
            group.appendChild(b);
          });

          const sep = document.createElement('div');
          sep.className = 'toolbar-sep';
          group.appendChild(sep);

          const sizeLabel = document.createElement('span');
          sizeLabel.className = 'label';
          sizeLabel.textContent = 'Brush';
          group.appendChild(sizeLabel);
          SIZES.forEach(function (s) {
            const b = document.createElement('button');
            b.type = 'button';
            b.className = 'brush-size-btn' + (s.id === sizeId ? ' active' : '');
            b.dataset.size = s.id;
            b.textContent = s.label;
            b.addEventListener('click', function () {
              sizeId = s.id;
              updateToolUI();
              ctx.onChange();
            });
            group.appendChild(b);
          });

          const sep2 = document.createElement('div');
          sep2.className = 'toolbar-sep';
          group.appendChild(sep2);

          const clearBtn = document.createElement('button');
          clearBtn.type = 'button';
          clearBtn.className = 'danger';
          clearBtn.textContent = 'Clear';
          clearBtn.addEventListener('click', function () {
            if (confirm('Clear the entire canvas?')) clearCanvas();
          });
          group.appendChild(clearBtn);

          toolsEl.appendChild(group);
          updateToolUI();
        }
      };
    }
  };

  // =========================================================================
  // Template: Notepad
  // =========================================================================
  const NotepadTemplate = {
    id: 'notepad',
    name: 'Notepad',
    description: 'Sticky notes board',
    kind: 'other',
    create: function (ctx) {
      const NOTE_COLORS = ['yellow', 'pink', 'blue', 'green', 'orange'];
      let notes = [];
      let board = null, hint = null, nextId = 1;
      let drag = null, resize = null;

      function nid() { return 'n' + (nextId++) + '_' + Math.random().toString(36).slice(2, 7); }
      function updateHint() { if (hint) hint.classList.toggle('hidden', notes.length > 0); }
      function emitChange() { ctx.onChange(); }
      function noteById(id) { return notes.find(function (n) { return n.id === id; }); }

      function applyNoteEl(el, n) {
        el.style.left = n.x + 'px';
        el.style.top = n.y + 'px';
        el.style.width = n.w + 'px';
        el.style.height = n.h + 'px';
        el.className = 'sticky-note color-' + (n.color || 'yellow');
        el.dataset.id = n.id;
        const ta = el.querySelector('.note-body');
        if (ta && ta.value !== n.text && document.activeElement !== ta) ta.value = n.text;
      }

      function createNoteEl(n) {
        const el = document.createElement('div');
        el.className = 'sticky-note color-' + (n.color || 'yellow');
        el.dataset.id = n.id;
        el.style.left = n.x + 'px';
        el.style.top = n.y + 'px';
        el.style.width = n.w + 'px';
        el.style.height = n.h + 'px';

        const header = document.createElement('div');
        header.className = 'note-header';
        const grip = document.createElement('div');
        grip.className = 'grip';
        grip.textContent = '⋮⋮ drag';
        header.appendChild(grip);

        const colorBtn = document.createElement('button');
        colorBtn.type = 'button';
        colorBtn.title = 'Cycle color';
        colorBtn.textContent = '🎨';
        colorBtn.addEventListener('click', function (e) {
          e.stopPropagation();
          const note = noteById(n.id);
          if (!note) return;
          const idx = NOTE_COLORS.indexOf(note.color || 'yellow');
          note.color = NOTE_COLORS[(idx + 1) % NOTE_COLORS.length];
          applyNoteEl(el, note);
          emitChange();
        });
        header.appendChild(colorBtn);

        const delBtn = document.createElement('button');
        delBtn.type = 'button';
        delBtn.title = 'Delete note';
        delBtn.textContent = '✕';
        delBtn.addEventListener('click', function (e) {
          e.stopPropagation();
          deleteNote(n.id);
        });
        header.appendChild(delBtn);

        const body = document.createElement('textarea');
        body.className = 'note-body';
        body.value = n.text || '';
        body.placeholder = 'Type here…';
        body.addEventListener('input', function () {
          const note = noteById(n.id);
          if (!note) return;
          note.text = body.value;
          emitChange();
        });
        body.addEventListener('mousedown', function (e) { e.stopPropagation(); });

        const handle = document.createElement('div');
        handle.className = 'resize-handle';
        handle.title = 'Resize';

        header.addEventListener('pointerdown', function (e) {
          if (e.button !== 0 && e.pointerType === 'mouse') return;
          if (e.target.closest('button')) return;
          e.preventDefault();
          const note = noteById(n.id);
          if (!note) return;
          el.classList.add('dragging', 'selected');
          drag = { id: n.id, startX: e.clientX, startY: e.clientY, origX: note.x, origY: note.y };
          try { header.setPointerCapture(e.pointerId); } catch (_) {}
        });
        header.addEventListener('pointermove', function (e) {
          if (!drag || drag.id !== n.id) return;
          const note = noteById(n.id);
          if (!note) return;
          note.x = Math.max(0, drag.origX + (e.clientX - drag.startX));
          note.y = Math.max(0, drag.origY + (e.clientY - drag.startY));
          el.style.left = note.x + 'px';
          el.style.top = note.y + 'px';
        });
        header.addEventListener('pointerup', function () {
          if (!drag || drag.id !== n.id) return;
          el.classList.remove('dragging');
          drag = null;
          emitChange();
        });
        header.addEventListener('pointercancel', function () {
          if (!drag || drag.id !== n.id) return;
          el.classList.remove('dragging');
          drag = null;
        });

        handle.addEventListener('pointerdown', function (e) {
          if (e.button !== 0 && e.pointerType === 'mouse') return;
          e.preventDefault(); e.stopPropagation();
          const note = noteById(n.id);
          if (!note) return;
          el.classList.add('selected');
          resize = { id: n.id, startX: e.clientX, startY: e.clientY, startW: note.w, startH: note.h };
          try { handle.setPointerCapture(e.pointerId); } catch (_) {}
        });
        handle.addEventListener('pointermove', function (e) {
          if (!resize || resize.id !== n.id) return;
          const note = noteById(n.id);
          if (!note) return;
          note.w = Math.max(140, resize.startW + (e.clientX - resize.startX));
          note.h = Math.max(100, resize.startH + (e.clientY - resize.startY));
          el.style.width = note.w + 'px';
          el.style.height = note.h + 'px';
        });
        handle.addEventListener('pointerup', function () {
          if (!resize || resize.id !== n.id) return;
          resize = null;
          emitChange();
        });
        handle.addEventListener('pointercancel', function () {
          if (!resize || resize.id !== n.id) return;
          resize = null;
        });

        el.addEventListener('mousedown', function () {
          board.querySelectorAll('.sticky-note.selected').forEach(function (x) { x.classList.remove('selected'); });
          el.classList.add('selected');
        });

        el.appendChild(header);
        el.appendChild(body);
        el.appendChild(handle);
        return el;
      }

      function renderAll() {
        if (!board) return;
        const existing = new Map();
        board.querySelectorAll('.sticky-note').forEach(function (el) {
          existing.set(el.dataset.id, el);
        });
        const keep = new Set(notes.map(function (n) { return n.id; }));
        existing.forEach(function (el, id) {
          if (!keep.has(id)) el.remove();
        });
        notes.forEach(function (n) {
          let el = existing.get(n.id);
          if (!el) {
            el = createNoteEl(n);
            board.appendChild(el);
          } else applyNoteEl(el, n);
        });
        updateHint();
      }

      function addNote(partial) {
        const offset = notes.length * 24;
        const note = {
          id: nid(),
          x: (partial && partial.x != null) ? partial.x : 40 + (offset % 200),
          y: (partial && partial.y != null) ? partial.y : 40 + (offset % 160),
          w: (partial && partial.w) || 200,
          h: (partial && partial.h) || 180,
          text: (partial && partial.text) || '',
          color: (partial && partial.color) || 'yellow'
        };
        notes.push(note);
        if (board) {
          board.appendChild(createNoteEl(note));
          updateHint();
        }
        emitChange();
        ctx.setStatus('Note added');
      }

      function deleteNote(id) {
        notes = notes.filter(function (n) { return n.id !== id; });
        if (board) {
          const el = board.querySelector('.sticky-note[data-id="' + CSS.escape(id) + '"]');
          if (el) el.remove();
          updateHint();
        }
        emitChange();
        ctx.setStatus('Note deleted');
      }

      return {
        setState: function (state) {
          if (!state || typeof state !== 'object') return;
          if (Array.isArray(state.notes)) {
            notes = state.notes.map(function (n) {
              return {
                id: n.id || nid(),
                x: Number(n.x) || 0,
                y: Number(n.y) || 0,
                w: Math.max(140, Number(n.w) || 200),
                h: Math.max(100, Number(n.h) || 180),
                text: typeof n.text === 'string' ? n.text : '',
                color: NOTE_COLORS.includes(n.color) ? n.color : 'yellow'
              };
            });
            notes.forEach(function (n) {
              const m = String(n.id).match(/^n(\d+)/);
              if (m) nextId = Math.max(nextId, parseInt(m[1], 10) + 1);
            });
          }
        },
        getState: function () {
          return {
            notes: notes.map(function (n) {
              return { id: n.id, x: n.x, y: n.y, w: n.w, h: n.h, text: n.text, color: n.color };
            })
          };
        },
        mount: function (container) {
          container.classList.add('notepad-root');
          board = document.createElement('div');
          board.className = 'notepad-board';
          board.setAttribute('aria-label', 'Sticky notes board');
          hint = document.createElement('div');
          hint.className = 'empty-hint';
          hint.innerHTML = '<strong>No notes yet</strong><div>Click “Add note” in the toolbar</div>';
          board.appendChild(hint);
          container.appendChild(board);
          renderAll();
        },
        unmount: function () {
          board = hint = null;
          drag = resize = null;
        },
        renderTools: function (toolsEl) {
          const group = document.createElement('div');
          group.className = 'toolbar-group';
          const addBtn = document.createElement('button');
          addBtn.type = 'button';
          addBtn.textContent = '+ Add note';
          addBtn.addEventListener('click', function () { addNote(); });
          group.appendChild(addBtn);
          const clearBtn = document.createElement('button');
          clearBtn.type = 'button';
          clearBtn.className = 'danger';
          clearBtn.textContent = 'Delete all';
          clearBtn.addEventListener('click', function () {
            if (!notes.length) return;
            if (confirm('Delete all sticky notes?')) {
              notes = [];
              renderAll();
              emitChange();
              ctx.setStatus('All notes deleted');
            }
          });
          group.appendChild(clearBtn);
          const count = document.createElement('span');
          count.className = 'label';
          count.style.textTransform = 'none';
          count.style.marginLeft = '6px';
          const sync = function () {
            count.textContent = notes.length + (notes.length === 1 ? ' note' : ' notes');
          };
          sync();
          const iv = setInterval(function () {
            if (!count.isConnected) { clearInterval(iv); return; }
            sync();
          }, 400);
          group.appendChild(count);
          toolsEl.appendChild(group);
        }
      };
    }
  };

  // =========================================================================
  // Template: Annotate (snipping-tool-like)
  // =========================================================================
  const SnipTemplate = {
    id: 'snip',
    name: 'Annotate',
    description: 'Paste or drop an image, then mark it up',
    kind: 'raster',
    create: function (ctx) {
      const TOOLS = [
        { id: 'highlight', label: 'Highlight' },
        { id: 'arrow', label: 'Arrow' },
        { id: 'text', label: 'Text' },
        { id: 'blur', label: 'Blur/Redact' },
        { id: 'crop', label: 'Crop' }
      ];
      let tool = 'highlight';
      let strokeColor = '#e03131';
      let baseImageDataUrl = null; // original/current base
      let displayW = 0, displayH = 0; // canvas pixel size
      let canvas = null, wrap = null, stage = null, c2d = null, hint = null;
      let drawing = false;
      let startX = 0, startY = 0, lastX = 0, lastY = 0;
      let snapshotBeforeStroke = null;
      let history = new HistoryStack(MAX_UNDO);
      let toolsHost = null;
      let pasteHandler = null;
      let captureAvailable = typeof navigator !== 'undefined' &&
        navigator.mediaDevices && typeof navigator.mediaDevices.getDisplayMedia === 'function';

      function pointerPos(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / Math.max(1, rect.width);
        const scaleY = canvas.height / Math.max(1, rect.height);
        const src = e.touches && e.touches[0] ? e.touches[0] : e;
        return {
          x: (src.clientX - rect.left) * scaleX,
          y: (src.clientY - rect.top) * scaleY
        };
      }

      function updateHint() {
        if (!hint) return;
        hint.classList.toggle('hidden', !!baseImageDataUrl);
      }

      function pushHistory() {
        try {
          const url = canvas.toDataURL('image/png');
          baseImageDataUrl = url;
          history.push(url);
          updateUndoUI();
        } catch (e) { console.warn(e); }
      }

      function loadImageToCanvas(src, opts) {
        opts = opts || {};
        return new Promise(function (resolve, reject) {
          const img = new Image();
          img.onload = function () {
            const maxW = 1600;
            let w = img.naturalWidth || img.width;
            let h = img.naturalHeight || img.height;
            if (w > maxW) {
              h = Math.round(h * (maxW / w));
              w = maxW;
            }
            displayW = w;
            displayH = h;
            canvas.width = w;
            canvas.height = h;
            canvas.style.width = w + 'px';
            canvas.style.height = h + 'px';
            c2d.setTransform(1, 0, 0, 1, 0, 0);
            c2d.drawImage(img, 0, 0, w, h);
            wrap.classList.add('has-image');
            try { baseImageDataUrl = canvas.toDataURL('image/png'); } catch (_) {}
            if (!opts.skipHistory) {
              history.reset(baseImageDataUrl);
            }
            updateHint();
            updateUndoUI();
            resolve();
          };
          img.onerror = function () { reject(new Error('image load failed')); };
          img.src = src;
        });
      }

      function applyHistoryUrl(url) {
        if (!url) return;
        loadImageToCanvas(url, { skipHistory: true }).then(function () {
          baseImageDataUrl = url;
          ctx.onChange();
        });
      }

      function handleImageFile(file) {
        if (!file || !file.type || file.type.indexOf('image/') !== 0) {
          ctx.setStatus('Not an image file', 'error');
          return;
        }
        const reader = new FileReader();
        reader.onload = function () {
          loadImageToCanvas(reader.result).then(function () {
            ctx.onChange();
            ctx.setStatus('Image loaded');
          }).catch(function () {
            ctx.setStatus('Failed to load image', 'error');
          });
        };
        reader.readAsDataURL(file);
      }

      function onPaste(e) {
        const items = e.clipboardData && e.clipboardData.items;
        if (!items) return;
        for (let i = 0; i < items.length; i++) {
          if (items[i].type.indexOf('image/') === 0) {
            e.preventDefault();
            const file = items[i].getAsFile();
            if (file) handleImageFile(file);
            return;
          }
        }
      }

      function drawArrow(x1, y1, x2, y2) {
        const head = 14;
        const angle = Math.atan2(y2 - y1, x2 - x1);
        c2d.strokeStyle = strokeColor;
        c2d.fillStyle = strokeColor;
        c2d.lineWidth = 3;
        c2d.lineCap = 'round';
        c2d.beginPath();
        c2d.moveTo(x1, y1);
        c2d.lineTo(x2, y2);
        c2d.stroke();
        c2d.beginPath();
        c2d.moveTo(x2, y2);
        c2d.lineTo(x2 - head * Math.cos(angle - 0.4), y2 - head * Math.sin(angle - 0.4));
        c2d.lineTo(x2 - head * Math.cos(angle + 0.4), y2 - head * Math.sin(angle + 0.4));
        c2d.closePath();
        c2d.fill();
      }

      function redactRect(x, y, w, h) {
        // Pixelate / solid redact for reliable offline redaction
        const sx = Math.max(0, Math.floor(Math.min(x, x + w)));
        const sy = Math.max(0, Math.floor(Math.min(y, y + h)));
        const sw = Math.min(canvas.width - sx, Math.floor(Math.abs(w)));
        const sh = Math.min(canvas.height - sy, Math.floor(Math.abs(h)));
        if (sw < 2 || sh < 2) return;
        try {
          const sample = c2d.getImageData(sx, sy, sw, sh);
          const block = 12;
          for (let by = 0; by < sh; by += block) {
            for (let bx = 0; bx < sw; bx += block) {
              const i = ((by * sw) + bx) * 4;
              const r = sample.data[i], g = sample.data[i + 1], b = sample.data[i + 2];
              c2d.fillStyle = 'rgb(' + r + ',' + g + ',' + b + ')';
              // Darken for redact feel
              c2d.fillStyle = '#2b2b2b';
              c2d.fillRect(sx + bx, sy + by, Math.min(block, sw - bx), Math.min(block, sh - by));
            }
          }
          // Extra solid overlay for true redaction
          c2d.fillStyle = 'rgba(20,20,20,0.92)';
          c2d.fillRect(sx, sy, sw, sh);
        } catch (err) {
          c2d.fillStyle = '#1a1a1a';
          c2d.fillRect(sx, sy, sw, sh);
        }
      }

      function restoreSnapshot() {
        if (!snapshotBeforeStroke) return;
        const img = new Image();
        img.onload = function () {
          c2d.clearRect(0, 0, canvas.width, canvas.height);
          c2d.drawImage(img, 0, 0);
        };
        // sync path: use putImageData if we stored ImageData
      }

      function startStroke(e) {
        if (!baseImageDataUrl) return;
        e.preventDefault();
        const p = pointerPos(e);
        drawing = true;
        startX = lastX = p.x;
        startY = lastY = p.y;
        try { snapshotBeforeStroke = c2d.getImageData(0, 0, canvas.width, canvas.height); } catch (_) {
          snapshotBeforeStroke = null;
        }

        if (tool === 'text') {
          drawing = false;
          const text = prompt('Label text:');
          if (text) {
            c2d.font = 'bold 18px system-ui, sans-serif';
            c2d.fillStyle = strokeColor;
            c2d.strokeStyle = 'rgba(255,255,255,0.85)';
            c2d.lineWidth = 3;
            c2d.strokeText(text, p.x, p.y);
            c2d.fillText(text, p.x, p.y);
            pushHistory();
            ctx.onChange();
          }
          return;
        }
      }

      function moveStroke(e) {
        if (!drawing || !baseImageDataUrl) return;
        e.preventDefault();
        const p = pointerPos(e);

        if (tool === 'highlight') {
          c2d.strokeStyle = 'rgba(255, 224, 50, 0.45)';
          c2d.lineWidth = 18;
          c2d.lineCap = 'round';
          c2d.lineJoin = 'round';
          c2d.beginPath();
          c2d.moveTo(lastX, lastY);
          c2d.lineTo(p.x, p.y);
          c2d.stroke();
          lastX = p.x; lastY = p.y;
          return;
        }

        // Preview tools: restore and redraw
        if (snapshotBeforeStroke) {
          c2d.putImageData(snapshotBeforeStroke, 0, 0);
        }
        if (tool === 'arrow') {
          drawArrow(startX, startY, p.x, p.y);
        } else if (tool === 'blur' || tool === 'crop') {
          const x = Math.min(startX, p.x), y = Math.min(startY, p.y);
          const w = Math.abs(p.x - startX), h = Math.abs(p.y - startY);
          c2d.strokeStyle = tool === 'crop' ? '#4a7cff' : '#e03131';
          c2d.lineWidth = 2;
          c2d.setLineDash([6, 4]);
          c2d.strokeRect(x, y, w, h);
          c2d.setLineDash([]);
          if (tool === 'blur') {
            c2d.fillStyle = 'rgba(0,0,0,0.25)';
            c2d.fillRect(x, y, w, h);
          }
        }
        lastX = p.x; lastY = p.y;
      }

      function endStroke(e) {
        if (!drawing) return;
        if (e) e.preventDefault();
        drawing = false;
        const p = e ? pointerPos(e) : { x: lastX, y: lastY };

        if (tool === 'highlight') {
          pushHistory();
          ctx.onChange();
          return;
        }

        if (snapshotBeforeStroke) c2d.putImageData(snapshotBeforeStroke, 0, 0);

        if (tool === 'arrow') {
          drawArrow(startX, startY, p.x, p.y);
          pushHistory();
          ctx.onChange();
        } else if (tool === 'blur') {
          redactRect(startX, startY, p.x - startX, p.y - startY);
          pushHistory();
          ctx.onChange();
          ctx.setStatus('Region redacted');
        } else if (tool === 'crop') {
          const x = Math.max(0, Math.floor(Math.min(startX, p.x)));
          const y = Math.max(0, Math.floor(Math.min(startY, p.y)));
          const w = Math.min(canvas.width - x, Math.floor(Math.abs(p.x - startX)));
          const h = Math.min(canvas.height - y, Math.floor(Math.abs(p.y - startY)));
          if (w > 4 && h > 4) {
            try {
              const cropped = c2d.getImageData(x, y, w, h);
              canvas.width = w;
              canvas.height = h;
              canvas.style.width = w + 'px';
              canvas.style.height = h + 'px';
              c2d.putImageData(cropped, 0, 0);
              pushHistory();
              ctx.onChange();
              ctx.setStatus('Cropped');
            } catch (err) {
              ctx.setStatus('Crop failed', 'error');
            }
          }
        }
        snapshotBeforeStroke = null;
      }

      function tryCapture() {
        if (!captureAvailable) {
          ctx.setStatus('Screen capture API not available here — use paste or drop', 'error');
          return;
        }
        // getDisplayMedia is often blocked or restricted under file://
        navigator.mediaDevices.getDisplayMedia({ video: true, audio: false }).then(function (stream) {
          const video = document.createElement('video');
          video.srcObject = stream;
          video.muted = true;
          video.playsInline = true;
          video.onloadedmetadata = function () {
            video.play().then(function () {
              const w = video.videoWidth || 1280;
              const h = video.videoHeight || 720;
              const tmp = document.createElement('canvas');
              tmp.width = w;
              tmp.height = h;
              tmp.getContext('2d').drawImage(video, 0, 0, w, h);
              stream.getTracks().forEach(function (t) { t.stop(); });
              const url = tmp.toDataURL('image/png');
              loadImageToCanvas(url).then(function () {
                ctx.onChange();
                ctx.setStatus('Screen captured');
              });
            }).catch(function () {
              stream.getTracks().forEach(function (t) { t.stop(); });
              ctx.setStatus('Capture play failed — use paste/drop', 'error');
            });
          };
        }).catch(function (err) {
          const msg = (err && err.name) ? err.name : 'error';
          ctx.setStatus('Capture unavailable (' + msg + ') — paste or drop an image instead', 'error');
        });
      }

      function updateToolUI() {
        if (!toolsHost) return;
        toolsHost.querySelectorAll('[data-tool]').forEach(function (b) {
          b.classList.toggle('active', b.dataset.tool === tool);
        });
        toolsHost.querySelectorAll('.swatch').forEach(function (b) {
          b.classList.toggle('active', b.dataset.color === strokeColor);
        });
        updateUndoUI();
      }

      function updateUndoUI() {
        if (!toolsHost) return;
        const u = toolsHost.querySelector('[data-act="undo"]');
        const r = toolsHost.querySelector('[data-act="redo"]');
        if (u) u.disabled = !history.canUndo();
        if (r) r.disabled = !history.canRedo();
      }

      return {
        setState: function (state) {
          if (!state || typeof state !== 'object') return;
          if (typeof state.tool === 'string') tool = state.tool;
          if (typeof state.strokeColor === 'string') strokeColor = state.strokeColor;
          if (typeof state.imageDataUrl === 'string') baseImageDataUrl = state.imageDataUrl;
        },
        getState: function () {
          if (canvas && baseImageDataUrl) {
            try { baseImageDataUrl = canvas.toDataURL('image/png'); } catch (_) {}
          }
          return {
            tool: tool,
            strokeColor: strokeColor,
            imageDataUrl: baseImageDataUrl
          };
        },
        mount: function (container) {
          container.classList.add('snip-root');
          stage = document.createElement('div');
          stage.className = 'snip-stage';
          wrap = document.createElement('div');
          wrap.className = 'snip-canvas-wrap';
          canvas = document.createElement('canvas');
          canvas.width = 640;
          canvas.height = 400;
          canvas.setAttribute('aria-label', 'Annotation canvas');
          wrap.appendChild(canvas);
          stage.appendChild(wrap);

          hint = document.createElement('div');
          hint.className = 'empty-hint';
          hint.innerHTML = '<strong>Paste or drop an image to annotate</strong>' +
            '<div>Press <kbd>Ctrl</kbd>+<kbd>V</kbd> to paste a screenshot, or drag an image file here</div>';
          stage.appendChild(hint);

          container.appendChild(stage);
          c2d = canvas.getContext('2d');

          if (baseImageDataUrl) {
            loadImageToCanvas(baseImageDataUrl).catch(function () {});
          } else {
            updateHint();
          }

          canvas.addEventListener('mousedown', startStroke);
          canvas.addEventListener('mousemove', moveStroke);
          window.addEventListener('mouseup', endStroke);
          canvas.addEventListener('touchstart', startStroke, { passive: false });
          canvas.addEventListener('touchmove', moveStroke, { passive: false });
          canvas.addEventListener('touchend', endStroke, { passive: false });

          pasteHandler = onPaste;
          window.addEventListener('paste', pasteHandler);

          stage.addEventListener('dragover', function (e) {
            e.preventDefault();
            stage.classList.add('drop-active');
          });
          stage.addEventListener('dragleave', function () {
            stage.classList.remove('drop-active');
          });
          stage.addEventListener('drop', function (e) {
            e.preventDefault();
            stage.classList.remove('drop-active');

        unmount: function () {

          }
          window.removeEventListener('mouseup', endStroke);
          if (pasteHandler) window.removeEventListener('paste', pasteHandler);
          pasteHandler = null;
          canvas = wrap = stage = c2d = hint = toolsHost = null;
        },
        undo: function () {
          const url = history.undo();
          if (url) applyHistoryUrl(url);
        },
        redo: function () {
          const url = history.redo();
          if (url) applyHistoryUrl(url);
        },
        canUndo: function () { return history.canUndo(); },
        canRedo: function () { return history.canRedo(); },
        exportPng: function () {
          if (!baseImageDataUrl && !canvas) return null;
          if (canvas && baseImageDataUrl) {
            try { return canvas.toDataURL('image/png'); } catch (_) { return baseImageDataUrl; }
          }
          return baseImageDataUrl;
        },
        renderTools: function (toolsEl) {
          toolsHost = toolsEl;
          const group = document.createElement('div');
          group.className = 'toolbar-group';

          const undoBtn = document.createElement('button');
          undoBtn.type = 'button';
          undoBtn.dataset.act = 'undo';
          undoBtn.textContent = 'Undo';
          undoBtn.addEventListener('click', function () {
            const url = history.undo();
            if (url) applyHistoryUrl(url);
          });
          group.appendChild(undoBtn);
          const redoBtn = document.createElement('button');
          redoBtn.type = 'button';
          redoBtn.dataset.act = 'redo';
          redoBtn.textContent = 'Redo';
          redoBtn.addEventListener('click', function () {
            const url = history.redo();
            if (url) applyHistoryUrl(url);
          });
          group.appendChild(redoBtn);

          const sep0 = document.createElement('div');
          sep0.className = 'toolbar-sep';
          group.appendChild(sep0);

          TOOLS.forEach(function (t) {
            const b = document.createElement('button');
            b.type = 'button';
            b.dataset.tool = t.id;
            b.textContent = t.label;
            b.className = t.id === tool ? 'active' : '';
            b.addEventListener('click', function () {
              tool = t.id;
              updateToolUI();
              ctx.onChange();
            });
            group.appendChild(b);
          });

          const sep = document.createElement('div');
          sep.className = 'toolbar-sep';
          group.appendChild(sep);

          ['#e03131', '#f08c00', '#2f9e44', '#1971c2', '#1a1a1a'].forEach(function (c) {
            const b = document.createElement('button');
            b.type = 'button';
            b.className = 'swatch' + (c === strokeColor ? ' active' : '');
            b.style.background = c;
            b.dataset.color = c;
            b.addEventListener('click', function () {
              strokeColor = c;
              updateToolUI();
            });
            group.appendChild(b);
          });

          const sep2 = document.createElement('div');
          sep2.className = 'toolbar-sep';
          group.appendChild(sep2);

          const openBtn = document.createElement('button');
          openBtn.type = 'button';
          openBtn.textContent = 'Open image…';
          openBtn.addEventListener('click', function () {
            const input = document.getElementById('image-file');
            const handler = function (e) {
              const file = e.target.files && e.target.files[0];
              e.target.value = '';
              input.removeEventListener('change', handler);
              if (file) handleImageFile(file);
            };
            input.addEventListener('change', handler);
            input.click();
          });
          group.appendChild(openBtn);

          const captureBtn = document.createElement('button');
          captureBtn.type = 'button';
          captureBtn.textContent = 'Capture screen…';
          captureBtn.title = captureAvailable
            ? 'Uses getDisplayMedia if the browser allows it from this page'
            : 'Screen capture API not available in this browser';
          if (!captureAvailable) captureBtn.disabled = true;
          captureBtn.addEventListener('click', tryCapture);
          group.appendChild(captureBtn);

          const clearBtn = document.createElement('button');
          clearBtn.type = 'button';
          clearBtn.className = 'danger';
          clearBtn.textContent = 'Clear image';
          clearBtn.addEventListener('click', function () {
            if (!baseImageDataUrl) return;
            if (!confirm('Remove the current image and annotations?')) return;
            baseImageDataUrl = null;
            canvas.width = 640;
            canvas.height = 400;
            canvas.style.width = '';
            canvas.style.height = '';
            c2d.clearRect(0, 0, canvas.width, canvas.height);
            wrap.classList.remove('has-image');
            history.reset(null);
            updateHint();
            updateUndoUI();
            ctx.onChange();
          });
          group.appendChild(clearBtn);

          toolsEl.appendChild(group);
          updateToolUI();
        }
      };
    }
  };

  // =========================================================================
  // Template: Wordpad
  // =========================================================================
  const WordpadTemplate = {
    id: 'wordpad',
    name: 'Wordpad',
    description: 'Rich text document',
    kind: 'text',
    create: function (ctx) {
      let html = '<p></p>';
      let editor = null;
      let history = new HistoryStack(MAX_UNDO);
      let toolsHost = null;
      let applying = false;
      let debounceTimer = null;

      function currentHtml() {
        return editor ? editor.innerHTML : html;
      }

      function pushHistory() {
        if (applying) return;
        const snap = currentHtml();
        const cur = history.current();
        if (cur === snap) return;
        history.push(snap);
        updateUndoUI();
      }

      function scheduleHistory() {
        if (debounceTimer) clearTimeout(debounceTimer);
        debounceTimer = setTimeout(function () {
          pushHistory();
          html = currentHtml();
          ctx.onChange();
        }, 350);
      }

      function setHtml(h) {
        applying = true;
        html = h || '<p></p>';
        if (editor) editor.innerHTML = html;
        applying = false;
      }

      function cmd(command, value) {
        if (!editor) return;
        editor.focus();
        try {
          document.execCommand(command, false, value);
        } catch (e) {
          console.warn('execCommand failed', command, e);
        }
        scheduleHistory();
      }

      function updateUndoUI() {
        if (!toolsHost) return;
        const u = toolsHost.querySelector('[data-act="undo"]');
        const r = toolsHost.querySelector('[data-act="redo"]');
        if (u) u.disabled = !history.canUndo();
        if (r) r.disabled = !history.canRedo();
      }

      function htmlToPlain(h) {
        const d = document.createElement('div');
        d.innerHTML = h || '';
        // Prefer line breaks from blocks
        d.querySelectorAll('br').forEach(function (br) {
          br.replaceWith('\n');
        });
        d.querySelectorAll('p, div, h1, h2, h3, li').forEach(function (el) {
          el.appendChild(document.createTextNode('\n'));
        });
        return (d.textContent || '').replace(/\n{3,}/g, '\n\n').trim();
      }

      return {
        setState: function (state) {
          if (!state || typeof state !== 'object') return;
          if (typeof state.html === 'string') html = state.html;
        },
        getState: function () {
          if (editor) html = editor.innerHTML;
          return { html: html };
        },
        mount: function (container) {
          container.classList.add('wordpad-root');
          const wrap = document.createElement('div');
          wrap.className = 'wordpad-editor-wrap';
          editor = document.createElement('div');
          editor.className = 'wordpad-editor';
          editor.contentEditable = 'true';
          editor.setAttribute('role', 'textbox');
          editor.setAttribute('aria-multiline', 'true');
          editor.setAttribute('aria-label', 'Document');
          editor.dataset.placeholder = 'Start writing…';
          editor.innerHTML = html || '<p></p>';
          editor.addEventListener('input', scheduleHistory);
          editor.addEventListener('keyup', function (e) {
            // keep tools in sync lightly
          });
          wrap.appendChild(editor);
          container.appendChild(wrap);
          history.reset(editor.innerHTML);
          updateUndoUI();
        },
        unmount: function () {
          if (editor) html = editor.innerHTML;
          if (debounceTimer) clearTimeout(debounceTimer);
          editor = toolsHost = null;
        },
        undo: function () {
          const snap = history.undo();
          if (snap == null) return;
          setHtml(snap);
          updateUndoUI();
          ctx.onChange();
        },
        redo: function () {
          const snap = history.redo();
          if (snap == null) return;
          setHtml(snap);
          updateUndoUI();
          ctx.onChange();
        },
        canUndo: function () { return history.canUndo(); },
        canRedo: function () { return history.canRedo(); },
        exportText: function () {
          const h = editor ? editor.innerHTML : html;
          return htmlToPlain(h);
        },
        renderTools: function (toolsEl) {
          toolsHost = toolsEl;
          const group = document.createElement('div');
          group.className = 'toolbar-group';

          function mk(label, title, fn) {
            const b = document.createElement('button');
            b.type = 'button';
            b.textContent = label;
            b.title = title;
            b.addEventListener('click', fn);
            group.appendChild(b);
            return b;
          }

          mk('Undo', 'Undo (Ctrl+Z)', function () {
            const snap = history.undo();
            if (snap == null) return;
            setHtml(snap);
            updateUndoUI();
            ctx.onChange();
          }).dataset.act = 'undo';
          mk('Redo', 'Redo (Ctrl+Shift+Z)', function () {
            const snap = history.redo();
            if (snap == null) return;
            setHtml(snap);
            updateUndoUI();
            ctx.onChange();
          }).dataset.act = 'redo';

          const sep0 = document.createElement('div');
          sep0.className = 'toolbar-sep';
          group.appendChild(sep0);

          mk('B', 'Bold', function () { cmd('bold'); }).style.fontWeight = '700';
          mk('I', 'Italic', function () { cmd('italic'); }).style.fontStyle = 'italic';
          mk('U', 'Underline', function () { cmd('underline'); }).style.textDecoration = 'underline';

          const sep = document.createElement('div');
          sep.className = 'toolbar-sep';
          group.appendChild(sep);

          mk('H1', 'Heading 1', function () { cmd('formatBlock', 'h1'); });
          mk('H2', 'Heading 2', function () { cmd('formatBlock', 'h2'); });
          mk('P', 'Paragraph', function () { cmd('formatBlock', 'p'); });
          mk('• List', 'Bullet list', function () { cmd('insertUnorderedList'); });
          mk('1. List', 'Numbered list', function () { cmd('insertOrderedList'); });

          const sep2 = document.createElement('div');
          sep2.className = 'toolbar-sep';
          group.appendChild(sep2);

          const colorLabel = document.createElement('span');
          colorLabel.className = 'label';
          colorLabel.textContent = 'Text';
          group.appendChild(colorLabel);
          ['#1a1a1a', '#e03131', '#1971c2', '#2f9e44', '#f08c00'].forEach(function (c) {
            const b = document.createElement('button');
            b.type = 'button';
            b.className = 'swatch';
            b.style.background = c;
            b.title = 'Text color ' + c;
            b.addEventListener('click', function () { cmd('foreColor', c); });
            group.appendChild(b);
          });

          const hlLabel = document.createElement('span');
          hlLabel.className = 'label';
          hlLabel.textContent = 'HL';
          hlLabel.style.marginLeft = '4px';
          group.appendChild(hlLabel);
          ['#fff59d', '#ffcdd2', '#bbdefb', '#c8e6c9'].forEach(function (c) {
            const b = document.createElement('button');
            b.type = 'button';
            b.className = 'swatch';
            b.style.background = c;
            b.title = 'Highlight ' + c;
            b.addEventListener('click', function () {
              // hiliteColor / backColor depending on browser
              try { document.execCommand('styleWithCSS', false, true); } catch (_) {}
              if (!document.execCommand('hiliteColor', false, c)) {
                cmd('backColor', c);
              } else {
                scheduleHistory();
              }
            });
            group.appendChild(b);
          });

          toolsEl.appendChild(group);
          // Fix act attributes on undo/redo
          const buttons = group.querySelectorAll('button');
          if (buttons[0]) buttons[0].dataset.act = 'undo';
          if (buttons[1]) buttons[1].dataset.act = 'redo';
          updateUndoUI();
        }
      };
    }
  };

  // =========================================================================
  // Boot
  // =========================================================================
  TemplateRegistry.register(PaintTemplate);
  TemplateRegistry.register(NotepadTemplate);
  TemplateRegistry.register(SnipTemplate);
  TemplateRegistry.register(WordpadTemplate);

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function () { App.init(); });
  } else {
    App.init();
  }

  window.__whiteboard = {
    App: App,
    TemplateRegistry: TemplateRegistry,
    STORAGE_KEY: STORAGE_KEY,
    STORAGE_KEY_LEGACY: STORAGE_KEY_LEGACY,
    VERSION: APP_VERSION
  };
})();
  </script>
</body>
</html>
