          const group = document.createElement('div');
          group.className = 'toolbar-group';

          const undoBtn = document.createElement('button');
          undoBtn.type = 'button';
          undoBtn.dataset.act = 'undo';
          undoBtn.textContent = 'Undo';
          undoBtn.addEventListener('click', function () {
            const url = history.undo();
            if (url) applyHistoryUrl(url);
          });
          group.appendChild(undoBtn);
          const redoBtn = document.createElement('button');
          redoBtn.type = 'button';
          redoBtn.dataset.act = 'redo';
          redoBtn.textContent = 'Redo';
          redoBtn.addEventListener('click', function () {
            const url = history.redo();
            if (url) applyHistoryUrl(url);
          });
          group.appendChild(redoBtn);

          const sep0 = document.createElement('div');
          sep0.className = 'toolbar-sep';
          group.appendChild(sep0);

          TOOLS.forEach(function (t) {
            const b = document.createElement('button');
            b.type = 'button';
            b.dataset.tool = t.id;
            b.textContent = t.label;
            b.className = t.id === tool ? 'active' : '';
            b.addEventListener('click', function () {
              tool = t.id;
              updateToolUI();
              ctx.onChange();
            });
            group.appendChild(b);
          });

          const sep = document.createElement('div');
          sep.className = 'toolbar-sep';
          group.appendChild(sep);

          ['#e03131', '#f08c00', '#2f9e44', '#1971c2', '#1a1a1a'].forEach(function (c) {
            const b = document.createElement('button');
            b.type = 'button';
            b.className = 'swatch' + (c === strokeColor ? ' active' : '');
            b.style.background = c;
            b.dataset.color = c;
            b.addEventListener('click', function () {
              strokeColor = c;
              updateToolUI();
            });
            group.appendChild(b);
          });

          const sep2 = document.createElement('div');
          sep2.className = 'toolbar-sep';
          group.appendChild(sep2);

          const openBtn = document.createElement('button');
          openBtn.type = 'button';
          openBtn.textContent = 'Open image…';
          openBtn.addEventListener('click', function () {
            const input = document.getElementById('image-file');
            const handler = function (e) {
              const file = e.target.files && e.target.files[0];
              e.target.value = '';
              input.removeEventListener('change', handler);
              if (file) handleImageFile(file);
            };
            input.addEventListener('change', handler);
            input.click();
          });
          group.appendChild(openBtn);

          const captureBtn = document.createElement('button');
          captureBtn.type = 'button';
          captureBtn.textContent = 'Capture screen…';
          captureBtn.title = captureAvailable
            ? 'Uses getDisplayMedia if the browser allows it from this page'
            : 'Screen capture API not available in this browser';
          if (!captureAvailable) captureBtn.disabled = true;
          captureBtn.addEventListener('click', tryCapture);
          group.appendChild(captureBtn);

          const clearBtn = document.createElement('button');
          clearBtn.type = 'button';
          clearBtn.className = 'danger';
          clearBtn.textContent = 'Clear image';
          clearBtn.addEventListener('click', function () {
            if (!baseImageDataUrl) return;
            if (!confirm('Remove the current image and annotations?')) return;
            baseImageDataUrl = null;
            textLayers = [];
            canvas.width = 640;
            canvas.height = 400;
            canvas.style.width = '';
            canvas.style.height = '';
            c2d.clearRect(0, 0, canvas.width, canvas.height);
            wrap.classList.remove('has-image');
            history.reset(null);
            updateHint();
            updateUndoUI();
            ctx.onChange();
          });
          group.appendChild(clearBtn);

          toolsEl.appendChild(group);
          updateToolUI();
        }
      };
    }
  };

  // =========================================================================
  // Template: Wordpad
  // =========================================================================
  const WordpadTemplate = {
    id: 'wordpad',
    name: 'Wordpad',
    description: 'Rich text document',
    kind: 'text',
    create: function (ctx) {
      let html = '<p></p>';
      let editor = null;
      let history = new HistoryStack(MAX_UNDO);
      let toolsHost = null;
      let applying = false;
      let debounceTimer = null;

      function currentHtml() {
        return editor ? editor.innerHTML : html;
      }

      function pushHistory() {
        if (applying) return;
        const snap = currentHtml();
        const cur = history.current();
        if (cur === snap) return;
        history.push(snap);
        updateUndoUI();
      }

      function scheduleHistory() {
        if (debounceTimer) clearTimeout(debounceTimer);
        debounceTimer = setTimeout(function () {
          pushHistory();
          html = currentHtml();
          ctx.onChange();
        }, 350);
      }

      function setHtml(h) {
        applying = true;
        html = h || '<p></p>';
        if (editor) editor.innerHTML = html;
        applying = false;
      }

      function cmd(command, value) {
        if (!editor) return;
        editor.focus();
        try {
          document.execCommand(command, false, value);
        } catch (e) {
          console.warn('execCommand failed', command, e);
        }
        scheduleHistory();
      }

      function updateUndoUI() {
        if (!toolsHost) return;
        const u = toolsHost.querySelector('[data-act="undo"]');
        const r = toolsHost.querySelector('[data-act="redo"]');
        if (u) u.disabled = !history.canUndo();
        if (r) r.disabled = !history.canRedo();
      }

      function htmlToPlain(h) {
        const d = document.createElement('div');
        d.innerHTML = h || '';
        // Prefer line breaks from blocks
        d.querySelectorAll('br').forEach(function (br) {
          br.replaceWith('\n');
        });
        d.querySelectorAll('p, div, h1, h2, h3, li').forEach(function (el) {
          el.appendChild(document.createTextNode('\n'));
        });
        return (d.textContent || '').replace(/\n{3,}/g, '\n\n').trim();
      }

      return {
        setState: function (state) {
          if (!state || typeof state !== 'object') return;
          if (typeof state.html === 'string') html = state.html;
        },
        getState: function () {
          if (editor) html = editor.innerHTML;
          return { html: html };
        },
        mount: function (container) {
          container.classList.add('wordpad-root');
          const wrap = document.createElement('div');
          wrap.className = 'wordpad-editor-wrap';
          editor = document.createElement('div');
          editor.className = 'wordpad-editor';
          editor.contentEditable = 'true';
          editor.setAttribute('role', 'textbox');
          editor.setAttribute('aria-multiline', 'true');
          editor.setAttribute('aria-label', 'Document');
          editor.dataset.placeholder = 'Start writing…';
          editor.innerHTML = html || '<p></p>';
          editor.addEventListener('input', scheduleHistory);
          editor.addEventListener('keyup', function (e) {
            // keep tools in sync lightly
          });
          wrap.appendChild(editor);
          container.appendChild(wrap);
          history.reset(editor.innerHTML);
          updateUndoUI();
        },
        unmount: function () {
          if (editor) html = editor.innerHTML;
          if (debounceTimer) clearTimeout(debounceTimer);
          editor = toolsHost = null;
        },
        undo: function () {
          const snap = history.undo();
          if (snap == null) return;
          setHtml(snap);
          updateUndoUI();
          ctx.onChange();
        },
        redo: function () {
          const snap = history.redo();
          if (snap == null) return;
          setHtml(snap);
          updateUndoUI();
          ctx.onChange();
        },
        canUndo: function () { return history.canUndo(); },
        canRedo: function () { return history.canRedo(); },
        exportText: function () {
          const h = editor ? editor.innerHTML : html;
          return htmlToPlain(h);
        },
        renderTools: function (toolsEl) {
          toolsHost = toolsEl;
          const group = document.createElement('div');
          group.className = 'toolbar-group';

          function mk(label, title, fn) {
            const b = document.createElement('button');
            b.type = 'button';
            b.textContent = label;
            b.title = title;
            b.addEventListener('click', fn);
            group.appendChild(b);
            return b;
          }

          mk('Undo', 'Undo (Ctrl+Z)', function () {
            const snap = history.undo();
            if (snap == null) return;
            setHtml(snap);
            updateUndoUI();
            ctx.onChange();
          }).dataset.act = 'undo';
          mk('Redo', 'Redo (Ctrl+Shift+Z)', function () {
            const snap = history.redo();
            if (snap == null) return;
            setHtml(snap);
            updateUndoUI();
            ctx.onChange();
          }).dataset.act = 'redo';

          const sep0 = document.createElement('div');
          sep0.className = 'toolbar-sep';
          group.appendChild(sep0);

          mk('B', 'Bold', function () { cmd('bold'); }).style.fontWeight = '700';
          mk('I', 'Italic', function () { cmd('italic'); }).style.fontStyle = 'italic';
          mk('U', 'Underline', function () { cmd('underline'); }).style.textDecoration = 'underline';

          const sep = document.createElement('div');
          sep.className = 'toolbar-sep';
          group.appendChild(sep);

          mk('H1', 'Heading 1', function () { cmd('formatBlock', 'h1'); });
          mk('H2', 'Heading 2', function () { cmd('formatBlock', 'h2'); });
          mk('P', 'Paragraph', function () { cmd('formatBlock', 'p'); });
          mk('• List', 'Bullet list', function () { cmd('insertUnorderedList'); });
          mk('1. List', 'Numbered list', function () { cmd('insertOrderedList'); });

          const sep2 = document.createElement('div');
          sep2.className = 'toolbar-sep';
          group.appendChild(sep2);

          const colorLabel = document.createElement('span');
          colorLabel.className = 'label';
          colorLabel.textContent = 'Text';
          group.appendChild(colorLabel);
          ['#1a1a1a', '#e03131', '#1971c2', '#2f9e44', '#f08c00'].forEach(function (c) {
            const b = document.createElement('button');
            b.type = 'button';
            b.className = 'swatch';
            b.style.background = c;
            b.title = 'Text color ' + c;
            b.addEventListener('click', function () { cmd('foreColor', c); });
            group.appendChild(b);
          });

          const hlLabel = document.createElement('span');
          hlLabel.className = 'label';
          hlLabel.textContent = 'HL';
          hlLabel.style.marginLeft = '4px';
          group.appendChild(hlLabel);
          ['#fff59d', '#ffcdd2', '#bbdefb', '#c8e6c9'].forEach(function (c) {
            const b = document.createElement('button');
            b.type = 'button';
            b.className = 'swatch';
            b.style.background = c;
            b.title = 'Highlight ' + c;
            b.addEventListener('click', function () {
              // hiliteColor / backColor depending on browser
              try { document.execCommand('styleWithCSS', false, true); } catch (_) {}
              if (!document.execCommand('hiliteColor', false, c)) {
                cmd('backColor', c);
              } else {
                scheduleHistory();
              }
            });
            group.appendChild(b);
          });

          toolsEl.appendChild(group);
          // Fix act attributes on undo/redo
          const buttons = group.querySelectorAll('button');
          if (buttons[0]) buttons[0].dataset.act = 'undo';
          if (buttons[1]) buttons[1].dataset.act = 'redo';
          updateUndoUI();
        }
      };
    }
  };

  // =========================================================================
  // Template: Kanban
  // =========================================================================
  const KanbanTemplate = {
    id: 'kanban',
    name: 'Kanban',
    description: 'Columns and cards with drag-and-drop',
    kind: 'other',
    create: function (ctx) {
      let columns = [];
      let cards = {};
      let root = null;
      let boardEl = null;
      /** Pointer-based drag session (not HTML5 DnD — Firefox refuses drag from cards with textareas). */
      let pointerDrag = null;
      let tagFilter = null;

      function rules() {
        return (ctx.getAutoColorRules && ctx.getAutoColorRules()) || defaultAutoColorRules();
      }

      function applyAutoColor(card) {
        if (!card) return;
        const resolved = resolveAutoColor(card.text || '', rules());
        const newKey = resolved ? resolved.triggerKey : null;
        if (card.colorAuto === false) {
          if (card.lockedTriggerKey !== newKey) {
            card.colorAuto = true;
            card.lockedTriggerKey = null;
          } else {
            return;
          }
        }
        if (resolved && NOTE_COLORS.indexOf(resolved.color) >= 0) {
          card.color = resolved.color;
          card.lastAutoTrigger = resolved.triggerKey;
        }
      }

      function emitChange() { ctx.onChange(); }

      function colById(id) {
        return columns.find(function (c) { return c.id === id; }) || null;
      }

      function findColForCard(cardId) {
        for (let i = 0; i < columns.length; i++) {
          if (columns[i].cardIds.indexOf(cardId) >= 0) return columns[i];
        }
        return null;
      }

      function clearDropIndicators() {
        if (!boardEl) return;
        boardEl.querySelectorAll('.kanban-card.drop-before, .kanban-card.drop-after, .kanban-col.drag-over')
          .forEach(function (n) {
            n.classList.remove('drop-before', 'drop-after', 'drag-over');
          });
      }

      function endPointerDrag(commit) {
        if (!pointerDrag) return;
        const session = pointerDrag;
        pointerDrag = null;
        window.removeEventListener('pointermove', onPointerDragMove);
        window.removeEventListener('pointerup', onPointerDragUp);
        window.removeEventListener('pointercancel', onPointerDragUp);
        if (session.ghost && session.ghost.parentNode) session.ghost.parentNode.removeChild(session.ghost);
        if (session.sourceEl) session.sourceEl.classList.remove('dragging');
        clearDropIndicators();
        if (commit && session.pending && session.pending.colId && session.cardId) {
          moveCard(
            session.cardId,
            session.pending.colId,
            session.pending.beforeCardId || null,
            !!session.pending.placeBefore
          );
          ctx.setStatus('Card moved');
        }
      }

      function hitTestDrop(clientX, clientY) {
        const stack = document.elementsFromPoint(clientX, clientY) || [];
        let cardEl = null;
        let colEl = null;
        for (let i = 0; i < stack.length; i++) {
          const n = stack[i];
          if (!n || !n.classList) continue;
          if (n.classList.contains('kanban-card-ghost')) continue;
          if (!cardEl && n.classList.contains('kanban-card')) {
            if (!pointerDrag || n.dataset.id !== pointerDrag.cardId) cardEl = n;
          }
          if (!colEl && n.classList.contains('kanban-col')) colEl = n;
          if (!colEl && n.closest) {
            const c = n.closest('.kanban-col');
            if (c) colEl = c;
          }
        }
        return { cardEl: cardEl, colEl: colEl };
      }

      function onPointerDragMove(e) {
        if (!pointerDrag) return;
        e.preventDefault();
        const g = pointerDrag.ghost;
        if (g) {
          g.style.left = (e.clientX - pointerDrag.grabOffsetX) + 'px';
          g.style.top = (e.clientY - pointerDrag.grabOffsetY) + 'px';
        }
        clearDropIndicators();
        const hit = hitTestDrop(e.clientX, e.clientY);
        if (hit.cardEl) {
          const rect = hit.cardEl.getBoundingClientRect();
          const before = (e.clientY - rect.top) < rect.height / 2;
          hit.cardEl.classList.add(before ? 'drop-before' : 'drop-after');
          const col = hit.cardEl.closest('.kanban-col');
          if (col) col.classList.add('drag-over');
          pointerDrag.pending = {
            colId: col ? col.dataset.id : null,
            beforeCardId: hit.cardEl.dataset.id,
            placeBefore: before
          };
        } else if (hit.colEl) {
          hit.colEl.classList.add('drag-over');
          pointerDrag.pending = {
            colId: hit.colEl.dataset.id,
            beforeCardId: null,
            placeBefore: false
          };
        } else {
          pointerDrag.pending = null;
        }
      }

      function onPointerDragUp(e) {
        if (!pointerDrag) return;
        if (e) {
          // Final hit-test at release point
          onPointerDragMove(e);
        }
        endPointerDrag(true);
      }

      /**
       * Start a pointer drag of a card. Uses grip/toolbar (not textarea) so Firefox works.
       * HTML5 DnD is intentionally not used: form controls inside draggable parents
       * prevent dragstart in Firefox when the user grabs the card body.
       */
      function startCardPointerDrag(e, card, el) {
        if (pointerDrag) return;
        if (e.button != null && e.button !== 0) return;
        // Never start drag from form controls / action buttons
        if (e.target.closest && e.target.closest('button, textarea, input, a, label')) return;
        e.preventDefault();
        e.stopPropagation();
        try { el.setPointerCapture(e.pointerId); } catch (_) {}

        const rect = el.getBoundingClientRect();
        const ghost = el.cloneNode(true);
        ghost.classList.add('kanban-card-ghost');
        ghost.classList.remove('dragging', 'drop-before', 'drop-after', 'search-hit');
        ghost.removeAttribute('data-id');
        ghost.style.width = rect.width + 'px';
        ghost.style.left = rect.left + 'px';
        ghost.style.top = rect.top + 'px';
        // Disable nested interactions on ghost
        ghost.querySelectorAll('textarea, button, input').forEach(function (n) {
          n.disabled = true;
          n.tabIndex = -1;
        });
        document.body.appendChild(ghost);

        el.classList.add('dragging');
        pointerDrag = {
          cardId: card.id,
          ghost: ghost,
          sourceEl: el,
          grabOffsetX: e.clientX - rect.left,
          grabOffsetY: e.clientY - rect.top,
          pending: null
        };
        window.addEventListener('pointermove', onPointerDragMove, { passive: false });
        window.addEventListener('pointerup', onPointerDragUp);
        window.addEventListener('pointercancel', onPointerDragUp);
      }

      function cardMatchesTag(card, tag) {
        if (!tag) return true;
        return extractTags(card.text || '').indexOf(tag) !== -1;
      }

      function updateColCount(colEl, col) {
        const badge = colEl.querySelector('.kanban-col-count');
        if (badge) badge.textContent = String(col.cardIds.length);
      }

      function renderChecklistOnCard(host, card, ta) {
        if (!host) return;
        const hasCl = hasChecklistLines(card.text || '');
        if (!hasCl) {
          host.classList.add('hidden');
          if (ta) ta.classList.remove('hidden');
          return;
        }
        // Show checklist when not focused on textarea
        if (ta && document.activeElement === ta) {
          host.classList.add('hidden');
          ta.classList.remove('hidden');
          return;
        }
        host.classList.remove('hidden');
        if (ta) ta.classList.add('hidden');
        host.innerHTML = '';
        const lines = String(card.text || '').split('\n');
        lines.forEach(function (line, idx) {
          const parsed = parseChecklistLine(line);
          const row = document.createElement('div');
          if (parsed.type === 'check') {
            row.className = 'cl-line' + (parsed.checked ? ' checked' : '');
            const cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.checked = !!parsed.checked;
            cb.addEventListener('click', function (e) { e.stopPropagation(); });
            cb.addEventListener('change', function (e) {
              e.stopPropagation();
              card.text = toggleChecklistAtLine(card.text || '', idx);
              applyAutoColor(card);
              renderAll();
              emitChange();
            });
            const span = document.createElement('span');
            span.className = 'cl-text';
            span.textContent = parsed.content;
            row.appendChild(cb);
            row.appendChild(span);
          } else {
            row.className = 'cl-line plain';
            row.textContent = line;
          }
          host.appendChild(row);
        });
      }

      function createCardEl(card, col) {
        const el = document.createElement('div');
        const color = NOTE_COLORS.indexOf(card.color) >= 0 ? card.color : 'yellow';
        el.className = 'kanban-card color-' + color;
        el.dataset.id = card.id;
        // Not HTML5-draggable: Firefox will not drag elements that contain textareas
        // when the user grabs the body. Pointer drag is attached to the toolbar/grip.
        el.classList.toggle('tag-filtered-out', !!(tagFilter && !cardMatchesTag(card, tagFilter)));

        const bar = document.createElement('div');
        bar.className = 'kanban-card-toolbar';
        bar.title = 'Drag to move card between columns';
        const grip = document.createElement('div');
        grip.className = 'grip';
        grip.textContent = '⋮⋮ drag';
        grip.title = 'Drag card';
        bar.appendChild(grip);

        const colorBtn = document.createElement('button');
        colorBtn.type = 'button';
        colorBtn.title = 'Cycle color';
        colorBtn.textContent = '🎨';
        colorBtn.addEventListener('click', function (e) {
          e.stopPropagation();
          const idx = NOTE_COLORS.indexOf(card.color || 'yellow');
          card.color = NOTE_COLORS[(idx + 1) % NOTE_COLORS.length];
          card.colorAuto = false;
          const resolved = resolveAutoColor(card.text || '', rules());
          card.lockedTriggerKey = resolved ? resolved.triggerKey : null;
          card.lastAutoTrigger = null;
          renderAll();
          emitChange();
        });
        bar.appendChild(colorBtn);

        const delBtn = document.createElement('button');
        delBtn.type = 'button';
        delBtn.title = 'Delete card';
        delBtn.textContent = '✕';
        delBtn.addEventListener('click', function (e) {
          e.stopPropagation();
          if (!confirm('Delete this card?')) return;
          const c = findColForCard(card.id);
          if (c) c.cardIds = c.cardIds.filter(function (id) { return id !== card.id; });
          delete cards[card.id];
          renderAll();
          emitChange();
          ctx.setStatus('Card deleted');
        });
        bar.appendChild(delBtn);
        el.appendChild(bar);

        // Pointer drag from toolbar/grip (and checklist chrome) — not from textarea
        bar.addEventListener('pointerdown', function (e) {
          startCardPointerDrag(e, card, el);
        });

        const ta = document.createElement('textarea');
        ta.value = card.text || '';
        ta.placeholder = 'Card text…  TODO  #tag  - checklist';
        ta.addEventListener('pointerdown', function (e) { e.stopPropagation(); });
        ta.addEventListener('mousedown', function (e) { e.stopPropagation(); });
        ta.addEventListener('input', function () {
          card.text = ta.value;
          applyAutoColor(card);
          NOTE_COLORS.forEach(function (c) { el.classList.remove('color-' + c); });
          el.classList.add('color-' + (NOTE_COLORS.indexOf(card.color) >= 0 ? card.color : 'yellow'));
          emitChange();
        });
        ta.addEventListener('blur', function () {
          card.text = ta.value;
          applyAutoColor(card);
          renderChecklistOnCard(cl, card, ta);
          NOTE_COLORS.forEach(function (c) { el.classList.remove('color-' + c); });
          el.classList.add('color-' + (NOTE_COLORS.indexOf(card.color) >= 0 ? card.color : 'yellow'));
          emitChange();
        });
        ta.addEventListener('focus', function () {
          cl.classList.add('hidden');
          ta.classList.remove('hidden');
        });

        const cl = document.createElement('div');
        cl.className = 'card-checklist hidden';
        cl.addEventListener('click', function (e) {
          if (e.target && e.target.matches('input[type="checkbox"]')) return;
          cl.classList.add('hidden');
          ta.classList.remove('hidden');
          ta.focus();
        });
        // Allow dragging from checklist chrome (not checkbox)
        cl.addEventListener('pointerdown', function (e) {
          if (e.target && e.target.matches && e.target.matches('input[type="checkbox"]')) return;
          startCardPointerDrag(e, card, el);
        });

        el.appendChild(ta);
        el.appendChild(cl);
        renderChecklistOnCard(cl, card, ta);

        return el;
      }

      function moveCard(cardId, toColId, beforeCardId, placeBefore) {
        if (!cards[cardId]) return false;
        // Remove from current column
        columns.forEach(function (c) {
          c.cardIds = c.cardIds.filter(function (id) { return id !== cardId; });
        });
        const toCol = colById(toColId);
        if (!toCol) return false;
        if (beforeCardId) {
          let idx = toCol.cardIds.indexOf(beforeCardId);
          if (idx < 0) {
            toCol.cardIds.push(cardId);
          } else {
            if (!placeBefore) idx += 1;
            toCol.cardIds.splice(idx, 0, cardId);
          }
        } else {
          toCol.cardIds.push(cardId);
        }
        renderAll();
        emitChange();
        return true;
      }

      function createColumnEl(col) {
        const colEl = document.createElement('div');
        colEl.className = 'kanban-col';
        colEl.dataset.id = col.id;

        const header = document.createElement('div');
        header.className = 'kanban-col-header';
        const title = document.createElement('input');
        title.type = 'text';
        title.className = 'kanban-col-title';
        title.value = col.name;
        title.title = 'Rename column';
        title.addEventListener('change', function () {
          col.name = title.value.trim() || col.name;
          title.value = col.name;
          emitChange();
        });
        title.addEventListener('keydown', function (e) {
          if (e.key === 'Enter') { e.preventDefault(); title.blur(); }
        });
        header.appendChild(title);

        const count = document.createElement('span');
        count.className = 'kanban-col-count';
        count.textContent = String(col.cardIds.length);
        count.title = 'Cards in column (WIP)';
        header.appendChild(count);

        const delCol = document.createElement('button');
        delCol.type = 'button';
        delCol.className = 'danger';
        delCol.title = 'Delete column';
        delCol.textContent = '✕';
        delCol.addEventListener('click', function () {
          if (columns.length <= 1) {
            ctx.setStatus('Keep at least one column', 'error');
            return;
          }
          if (!confirm('Delete column “' + col.name + '”? Cards move to the first remaining column.')) return;
          const moveTo = columns.find(function (c) { return c.id !== col.id; });
          if (moveTo) {
            col.cardIds.forEach(function (id) {
              if (moveTo.cardIds.indexOf(id) < 0) moveTo.cardIds.push(id);
            });
          }
          columns = columns.filter(function (c) { return c.id !== col.id; });
          renderAll();
          emitChange();
        });
        header.appendChild(delCol);
        colEl.appendChild(header);

        const list = document.createElement('div');
        list.className = 'kanban-cards';
        col.cardIds.forEach(function (cid) {
          const card = cards[cid];
          if (card) list.appendChild(createCardEl(card, col));
        });
        // Drop target for empty column / padding area (pointer drag uses hit-test on this)
        colEl.appendChild(list);

        const footer = document.createElement('div');
        footer.className = 'kanban-col-footer';
        const addBtn = document.createElement('button');
        addBtn.type = 'button';
        addBtn.className = 'kanban-add-card';
        addBtn.textContent = '+ Add card';
        addBtn.addEventListener('click', function () {
          addCard(col.id, '');
        });
        footer.appendChild(addBtn);
        colEl.appendChild(footer);

        return colEl;
      }

      function addCard(columnId, text) {
        const col = colById(columnId) || columns[0];
        if (!col) return;
        const cardId = uid('card');
        const card = {
          id: cardId,
          text: text || '',
          color: 'yellow',
          colorAuto: true,
          lockedTriggerKey: null,
          lastAutoTrigger: null
        };
        applyAutoColor(card);
        cards[cardId] = card;
        col.cardIds.push(cardId);
        renderAll();
        emitChange();
        // Focus new card
        setTimeout(function () {
          const el = boardEl && boardEl.querySelector('.kanban-card[data-id="' + CSS.escape(cardId) + '"] textarea');
          if (el) {
            el.classList.remove('hidden');
            el.focus();
          }
        }, 30);
      }

      function addColumn(name) {
        columns.push({
          id: uid('col'),
          name: name || ('Column ' + (columns.length + 1)),
          cardIds: []
        });
        renderAll();
        emitChange();
        ctx.setStatus('Column added');
      }

      function renderAll() {
        if (!boardEl) return;
        boardEl.innerHTML = '';
        columns.forEach(function (col) {
          // Re-apply auto colors
          col.cardIds.forEach(function (cid) {
            if (cards[cid]) applyAutoColor(cards[cid]);
          });
          boardEl.appendChild(createColumnEl(col));
        });
      }

      return {
        setState: function (state) {
          const norm = normalizeKanbanState(state || {});
          columns = norm.columns;
          cards = norm.cards;
          Object.keys(cards).forEach(function (id) { applyAutoColor(cards[id]); });
          if (boardEl) renderAll();
        },
        getState: function () {
          return {
            columns: columns.map(function (c) {
              return { id: c.id, name: c.name, cardIds: c.cardIds.slice() };
            }),
            cards: (function () {
              const out = {};
              Object.keys(cards).forEach(function (id) {
                const c = cards[id];
                out[id] = {
                  id: c.id,
                  text: c.text,
                  color: c.color,
                  colorAuto: c.colorAuto !== false,
                  lockedTriggerKey: c.lockedTriggerKey || null,
                  lastAutoTrigger: c.lastAutoTrigger || null
                };
              });
              return out;
            })()
          };
        },
        mount: function (container) {
          container.classList.add('kanban-root');
          root = container;
          boardEl = document.createElement('div');
          boardEl.className = 'kanban-board';
          boardEl.setAttribute('aria-label', 'Kanban board');
          container.appendChild(boardEl);
          if (!columns.length) {
            const d = defaultKanbanState();
            columns = d.columns;
            cards = d.cards;
          }
          if (ctx.getTagFilter) tagFilter = ctx.getTagFilter();
          renderAll();
        },
        unmount: function () {
          endPointerDrag(false);
          root = boardEl = null;
        },
        renderAll: function () { renderAll(); },
        addColumn: function (name) { addColumn(name); },
        addCard: function (columnId, text) { addCard(columnId, text); },
        /** Public for tests / API — prefer UI drag; this mutates state and re-renders. */
        moveCard: function (cardId, toColId, beforeCardId, placeBefore) {
          return moveCard(cardId, toColId, beforeCardId, placeBefore);
        },
        applyTagFilter: function (tag) {
          tagFilter = tag || null;
          if (!boardEl) return;
          boardEl.querySelectorAll('.kanban-card').forEach(function (el) {
            const card = cards[el.dataset.id];
            if (!card) return;
            el.classList.toggle('tag-filtered-out', !!(tagFilter && !cardMatchesTag(card, tagFilter)));
          });
        },
        reapplyAutoColors: function () {
          Object.keys(cards).forEach(function (id) {
            if (cards[id].colorAuto !== false) {
              cards[id].lastAutoTrigger = null;
              applyAutoColor(cards[id]);
            }
          });
          renderAll();
          emitChange();
        },
        renderTools: function (toolsEl) {
          const group = document.createElement('div');
          group.className = 'toolbar-group';
          const addCol = document.createElement('button');
          addCol.type = 'button';
          addCol.textContent = '+ Column';
          addCol.addEventListener('click', function () { addColumn(); });
          group.appendChild(addCol);
          const addCardBtn = document.createElement('button');
          addCardBtn.type = 'button';
          addCardBtn.textContent = '+ Card';
          addCardBtn.title = 'Add card to first column';
          addCardBtn.addEventListener('click', function () {
            if (columns[0]) addCard(columns[0].id, '');
          });
          group.appendChild(addCardBtn);
          const info = document.createElement('span');
          info.className = 'label';
          info.style.textTransform = 'none';
          info.style.marginLeft = '6px';
          const sync = function () {
            let n = 0;
            columns.forEach(function (c) { n += c.cardIds.length; });
            info.textContent = columns.length + ' cols · ' + n + ' cards';
          };
          sync();
          const iv = setInterval(function () {
            if (!info.isConnected) { clearInterval(iv); return; }
            sync();
          }, 400);
          group.appendChild(info);
          toolsEl.appendChild(group);
        }
      };
    }
  };
