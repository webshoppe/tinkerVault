        if (resolved && NOTE_COLORS.indexOf(resolved.color) >= 0) {
          card.color = resolved.color;
          card.lastAutoTrigger = resolved.triggerKey;
        }
      }
      st.cards[cardId] = card;
      col.cardIds.push(cardId);
      board.updatedAt = new Date().toISOString();
      if (opts.open) {
        this.openBoard(board.id, { force: true });
      } else if (this.currentBoardId === board.id && this.instance && typeof this.instance.setState === 'function') {
        this.instance.setState(st);
        if (typeof this.instance.renderAll === 'function') this.instance.renderAll();
      }
      this.scheduleSave();
      this.refreshTagBar();
      return { board: board, cardId: cardId, columnId: col.id };
    },

    /**
     * From a sticky note: pick/create Kanban + column, add card (non-destructive).
     */
    promptSendStickyToKanban: async function (note) {
      if (!note) return;
      this.snapshotCurrent();
      const text = typeof note.text === 'string' ? note.text : '';
      let kanbans = this.listKanbanBoards();

      if (!kanbans.length) {
        const created = this.createBoard({
          name: 'Kanban',
          templateId: 'kanban',
          state: defaultKanbanState(),
          open: false,
          silent: true
        });
        if (!created) {
          this.setStatus('Could not create Kanban board', 'error');
          return;
        }
        kanbans = [created];
        this.setStatus('Created Kanban board for sticky');
      }

      const boardOptions = kanbans.map(function (b) {
        return { id: b.id, name: b.name };
      });
      const fields = [];
      if (kanbans.length > 1) {
        fields.push({
          name: 'boardId',
          label: 'Kanban board',
          type: 'select',
          value: boardOptions[0] && boardOptions[0].id,
          options: boardOptions
        });
      }
      // Column options from the board we will use (single board, or first when multi until pick)
      const primary = this.ensureKanbanState(kanbans[0]);
      const colOptions = (primary.columns || []).map(function (c) {
        return { id: c.id, name: c.name };
      });
      if (kanbans.length === 1 && colOptions.length) {
        fields.push({
          name: 'columnId',
          label: 'Column',
          type: 'select',
          value: colOptions[0].id,
          options: colOptions
        });
      }

      const result = await showModal({
        title: 'Send sticky to Kanban',
        subtitle: kanbans.length > 1
          ? 'Creates a new card on the chosen board (first column). The sticky is not changed or deleted.'
          : 'Creates a new card from this sticky’s text. The sticky is not changed or deleted.',
        okLabel: 'Send to Kanban',
        fields: fields
      });
      if (!result) return;

      const targetId = (result.boardId) || (kanbans[0] && kanbans[0].id);
      let targetBoard = this.getBoard(targetId);
      if (!targetBoard || targetBoard.templateId !== 'kanban') {
        this.setStatus('Kanban board not found', 'error');
        return;
      }
      const st = this.ensureKanbanState(targetBoard);
      let columnId = result.columnId;
      if (!columnId || !st.columns.find(function (c) { return c.id === columnId; })) {
        columnId = st.columns[0] && st.columns[0].id;
      }
      const added = this.addCardToKanbanBoard(targetBoard.id, text, {
        columnId: columnId,
        color: note.color,
        colorAuto: note.colorAuto !== false,
        lockedTriggerKey: note.lockedTriggerKey || null,
        lastAutoTrigger: note.lastAutoTrigger || null,
        open: true
      });
      if (added) {
        this.setStatus('Card added to “' + targetBoard.name + '” (sticky unchanged)');
      }
    },

    /**
     * Promote entire current Notepad board → new Kanban (all stickies → first column cards).
     * Original board untouched.
     */
    promoteNotepadBoardToKanban: function () {
      this.snapshotCurrent();
      const src = this.currentBoard();
      if (!src || src.templateId !== 'notepad') {
        this.setStatus('Open a Sticky Notes board first', 'error');
        return;
      }
      const notes = (src.state && Array.isArray(src.state.notes)) ? src.state.notes : [];
      if (!notes.length) {
        this.setStatus('No sticky notes to promote', 'error');
        return;
      }
      const st = defaultKanbanState();
      const firstCol = st.columns[0];
      notes.forEach(function (n) {
        if (!n) return;
        const cardId = uid('card');
        const card = {
          id: cardId,
          text: typeof n.text === 'string' ? n.text : '',
          color: NOTE_COLORS.indexOf(n.color) >= 0 ? n.color : 'yellow',
          colorAuto: n.colorAuto !== false,
          lockedTriggerKey: n.lockedTriggerKey || null,
          lastAutoTrigger: n.lastAutoTrigger || null
        };
        st.cards[cardId] = card;
        firstCol.cardIds.push(cardId);
      });
      const board = this.createBoard({
        name: (src.name || 'Notes') + ' Kanban',
        templateId: 'kanban',
        state: st,
        open: true
      });
      if (board) {
        this.setStatus('Created Kanban with ' + firstCol.cardIds.length + ' cards (original board unchanged)');
      }
    },

    // ----- Tags -----
    collectBoardTags: function (board) {
      if (!board) return [];
      const tags = [];
      const seen = Object.create(null);
      function addFrom(text) {
        extractTags(text).forEach(function (t) {
          if (!seen[t]) { seen[t] = true; tags.push(t); }
        });
      }
      const st = board.state || {};
      if (board.templateId === 'notepad' && Array.isArray(st.notes)) {
        st.notes.forEach(function (n) { addFrom(n && n.text); });
      } else if (board.templateId === 'wordpad') {
        addFrom(stripHtmlToPlainLocal(st.html || ''));
      } else if (board.templateId === 'snip' && Array.isArray(st.textLayers)) {
        st.textLayers.forEach(function (l) { addFrom(l && l.text); });
      } else if (board.templateId === 'kanban' && st.cards && typeof st.cards === 'object') {
        Object.keys(st.cards).forEach(function (cid) {
          addFrom(st.cards[cid] && st.cards[cid].text);
        });
      }
      // Also snapshot live instance if same board
      if (this.instance && this.currentBoardId === board.id && typeof this.instance.getState === 'function') {
        try {
          const live = this.instance.getState();
          if (board.templateId === 'notepad' && Array.isArray(live.notes)) {
            live.notes.forEach(function (n) { addFrom(n && n.text); });
          } else if (board.templateId === 'wordpad') {
            addFrom(stripHtmlToPlainLocal(live.html || ''));
          } else if (board.templateId === 'snip' && Array.isArray(live.textLayers)) {
            live.textLayers.forEach(function (l) { addFrom(l && l.text); });
          } else if (board.templateId === 'kanban' && live.cards && typeof live.cards === 'object') {
            Object.keys(live.cards).forEach(function (cid) {
              addFrom(live.cards[cid] && live.cards[cid].text);
            });
          }
        } catch (_) {}
      }
      tags.sort();
      return tags;
    },

    refreshTagBar: function () {
      const bar = document.getElementById('tag-bar');
      const chips = document.getElementById('tag-bar-chips');
      const clearBtn = document.getElementById('tag-bar-clear');
      if (!bar || !chips) return;
      this.snapshotCurrent();
      const board = this.currentBoard();
      const tags = board ? this.collectBoardTags(board) : [];
      chips.innerHTML = '';
      if (!tags.length) {
        bar.classList.remove('visible');
        if (this.activeTagFilter) this.setTagFilter(null, true);
        return;
      }
      bar.classList.add('visible');
      const self = this;
      tags.forEach(function (tag) {
        const b = document.createElement('button');
        b.type = 'button';
        b.className = 'tag-chip' + (self.activeTagFilter === tag ? ' active' : '');
        b.textContent = '#' + tag;
        b.title = self.activeTagFilter === tag ? 'Clear filter' : 'Filter by #' + tag;
        b.addEventListener('click', function () {
          if (self.activeTagFilter === tag) self.setTagFilter(null);
          else self.setTagFilter(tag);
        });
        chips.appendChild(b);
      });
      if (clearBtn) {
        clearBtn.hidden = !this.activeTagFilter;
      }
    },

    setTagFilter: function (tag, silent) {
      this.activeTagFilter = tag || null;
      if (this.instance && typeof this.instance.applyTagFilter === 'function') {
        this.instance.applyTagFilter(this.activeTagFilter);
      }
      this.refreshTagBar();
      if (!silent) {
        this.setStatus(this.activeTagFilter
          ? 'Filtered by #' + this.activeTagFilter
          : 'Tag filter cleared');
      }
    },

    // ----- Settings (auto-color map) -----
    showSettings: function () {
      const self = this;
      if (!this.store.settings) this.store.settings = defaultSettings();
      const rules = (this.store.settings.autoColorRules || defaultAutoColorRules()).slice();

      return new Promise(function (resolve) {
        const backdrop = document.createElement('div');
        backdrop.className = 'modal-backdrop';
        backdrop.setAttribute('role', 'dialog');
        backdrop.setAttribute('aria-modal', 'true');
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.style.width = 'min(520px, 100%)';

        const h2 = document.createElement('h2');
        h2.textContent = 'Auto-color settings';
        modal.appendChild(h2);
        const sub = document.createElement('p');
        sub.className = 'sub';
        sub.textContent = 'Sticky notes change color from keywords in their text. Manual color picks pause auto-color until the trigger text changes.';
        modal.appendChild(sub);

        const form = document.createElement('div');
        form.className = 'settings-rules';

        function ruleRow(rule) {
          const row = document.createElement('div');
          row.className = 'rule-row';
          row.dataset.ruleId = rule.id;
          const lab = document.createElement('label');
          lab.textContent = rule.label || rule.id;
          row.appendChild(lab);
          if (rule.mode === 'questions') {
            const info = document.createElement('div');
            info.style.fontSize = '12px';
            info.style.color = 'var(--text-muted)';
            info.innerHTML = 'Color: <strong>' + (rule.color || 'yellow') + '</strong> — when text has more <code>?</code> than <code>.</code>/<code>!</code> (and ≥2 <code>?</code>)';
            const colorSel = document.createElement('select');
            NOTE_COLORS.forEach(function (c) {
              const o = document.createElement('option');
              o.value = c; o.textContent = c;
              if (c === rule.color) o.selected = true;
              colorSel.appendChild(o);
            });
            colorSel.addEventListener('change', function () { rule.color = colorSel.value; });
            const wrap = document.createElement('div');
            wrap.appendChild(info);
            wrap.appendChild(colorSel);
            row.appendChild(wrap);
          } else {
            const wrap = document.createElement('div');
            const colorSel = document.createElement('select');
            NOTE_COLORS.forEach(function (c) {
              const o = document.createElement('option');
              o.value = c; o.textContent = c;
              if (c === rule.color) o.selected = true;
              colorSel.appendChild(o);
            });
            colorSel.addEventListener('change', function () { rule.color = colorSel.value; });
            const inp = document.createElement('input');
            inp.type = 'text';
            inp.value = (rule.keywords || []).join(', ');
            inp.placeholder = 'Keywords, comma-separated';
            inp.addEventListener('input', function () {
              rule.keywords = inp.value.split(',').map(function (s) { return s.trim(); }).filter(Boolean);
            });
            wrap.appendChild(colorSel);
            wrap.style.display = 'grid';
            wrap.style.gridTemplateColumns = '100px 1fr';
            wrap.style.gap = '8px';
            wrap.appendChild(inp);
            // reorder: color then keywords - already appended color first
            row.appendChild(wrap);
          }
          form.appendChild(row);
        }

        rules.forEach(ruleRow);

        const hint = document.createElement('div');
        hint.className = 'hint';
        hint.textContent = 'Rule order matters: the first matching rule wins. Default order is urgent → done → questions.';
        form.appendChild(hint);
        modal.appendChild(form);

        const actions = document.createElement('div');

    fuzzyScore: function (query, text) {
      query = String(query || '').toLowerCase().trim();
      text = String(text || '').toLowerCase();
      if (!query) return 1;
      if (text.indexOf(query) !== -1) return 100 - text.indexOf(query);
      // subsequence
      let ti = 0, score = 0, streak = 0;
      for (let qi = 0; qi < query.length; qi++) {
        const ch = query.charAt(qi);
        let found = false;
        while (ti < text.length) {
          if (text.charAt(ti) === ch) {
            score += 1 + streak;
            streak++;
            ti++;
            found = true;
            break;
          }
          streak = 0;
          ti++;
        }
        if (!found) return 0;
      }
      return score;
    },

    openCommandPalette: function () {
      const self = this;
      // Close if already open
      if (document.querySelector('.cmd-backdrop')) return;

      const backdrop = document.createElement('div');
      backdrop.className = 'cmd-backdrop';
      backdrop.setAttribute('role', 'dialog');
      backdrop.setAttribute('aria-modal', 'true');
      backdrop.setAttribute('aria-label', 'Command palette');

      const panel = document.createElement('div');
      panel.className = 'cmd-palette';
      panel.innerHTML =
        '<div class="cmd-input-wrap">' +
        '<input type="search" id="cmd-input" placeholder="Type a command or board name…" autocomplete="off" spellcheck="false" />' +
        '<div class="cmd-hint">Command palette · boards &amp; actions · <kbd>Ctrl</kbd>+<kbd>/</kbd> · Esc to close · content search is <kbd>Ctrl</kbd>+<kbd>K</kbd></div>' +
        '</div>' +
        '<div class="cmd-list" id="cmd-list" role="listbox"></div>';
      backdrop.appendChild(panel);
      document.body.appendChild(backdrop);

      const input = panel.querySelector('#cmd-input');
      const listEl = panel.querySelector('#cmd-list');
      let activeIndex = 0;
      let filtered = [];

      function render() {
        const q = input.value;
        const all = self.listCommands();
        filtered = all.map(function (c) {
          const hay = (c.title + ' ' + (c.sub || '') + ' ' + (c.keywords || '') + ' ' + (c.group || ''));
          return { cmd: c, score: self.fuzzyScore(q, hay) };
        }).filter(function (x) { return !q.trim() || x.score > 0; });
        filtered.sort(function (a, b) {
          if (b.score !== a.score) return b.score - a.score;
          if (a.cmd.group !== b.cmd.group) return String(a.cmd.group).localeCompare(b.cmd.group);
          return a.cmd.title.localeCompare(b.cmd.title);
        });
        if (activeIndex >= filtered.length) activeIndex = Math.max(0, filtered.length - 1);

        listEl.innerHTML = '';
        if (!filtered.length) {
          listEl.innerHTML = '<div class="cmd-empty">No matching commands</div>';
          return;
        }
        let lastGroup = null;
        filtered.forEach(function (item, i) {
          const c = item.cmd;
          if (c.group !== lastGroup) {
            lastGroup = c.group;
            const sec = document.createElement('div');
            sec.className = 'cmd-section';
            sec.textContent = c.group;
            listEl.appendChild(sec);
          }
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'cmd-item' + (i === activeIndex ? ' active' : '');
          btn.setAttribute('role', 'option');
          btn.innerHTML =
            '<span class="cmd-icon"></span>' +
            '<span class="cmd-label"><div class="cmd-title"></div><div class="cmd-sub"></div></span>' +
            (c.shortcut ? '<kbd></kbd>' : '');
          btn.querySelector('.cmd-icon').textContent = c.icon || '•';
          btn.querySelector('.cmd-title').textContent = c.title;
          btn.querySelector('.cmd-sub').textContent = c.sub || '';
          if (c.shortcut) btn.querySelector('kbd').textContent = c.shortcut;
          btn.addEventListener('click', function () { runAt(i); });
          btn.addEventListener('mouseenter', function () {
            activeIndex = i;
            listEl.querySelectorAll('.cmd-item').forEach(function (el, j) {
              el.classList.toggle('active', j === activeIndex);
            });
          });
          listEl.appendChild(btn);
        });
        const active = listEl.querySelector('.cmd-item.active');
        if (active && active.scrollIntoView) active.scrollIntoView({ block: 'nearest' });
      }

      function runAt(i) {
        const item = filtered[i];
        close();
        if (item && item.cmd && typeof item.cmd.run === 'function') {
          try { item.cmd.run(); } catch (err) { console.warn(err); }
        }
      }

      function close() {
        document.removeEventListener('keydown', onKey, true);
        backdrop.remove();
      }

      function onKey(e) {
        if (e.key === 'Escape') {
          e.preventDefault();
          e.stopPropagation();
          close();
          return;
        }
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          activeIndex = Math.min(filtered.length - 1, activeIndex + 1);
          render();
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          activeIndex = Math.max(0, activeIndex - 1);
          render();
        } else if (e.key === 'Enter') {
          e.preventDefault();
          runAt(activeIndex);
        }
      }

      input.addEventListener('input', function () {
        activeIndex = 0;
        render();
      });
      backdrop.addEventListener('click', function (e) {
        if (e.target === backdrop) close();
      });
      document.addEventListener('keydown', onKey, true);
      render();
      setTimeout(function () { input.focus(); }, 20);
    },

  // =========================================================================
  // Template: Paint
  // =========================================================================
  const PaintTemplate = {
    id: 'paint',
    name: 'Paint',
    description: 'Freehand drawing canvas',
    kind: 'raster',
    create: function (ctx) {
      const COLORS = ['#1a1a1a', '#e03131', '#2f9e44', '#1971c2', '#f08c00', '#ffffff'];
      const SIZES = [
        { id: 's', label: 'S', width: 2 },
        { id: 'm', label: 'M', width: 6 },
        { id: 'l', label: 'L', width: 14 }
      ];
      let color = COLORS[0];
      let sizeId = 'm';
      let drawing = false;
      let lastX = 0, lastY = 0;
      let canvas = null, wrap = null, c2d = null;
      let imageDataUrl = null;
      let ro = null;
      let resizeTimer = null;
      let history = new HistoryStack(MAX_UNDO);
      let toolsHost = null;
      let skipHistory = false;
      let alive = false;

      function brushWidth() {
        const s = SIZES.find(function (x) { return x.id === sizeId; });
        return s ? s.width : 6;
      }

      function pointerPos(e) {
        if (!canvas) return { x: 0, y: 0 };
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / Math.max(1, rect.width);
        const scaleY = canvas.height / Math.max(1, rect.height);
        const src = e.touches && e.touches[0] ? e.touches[0] : e;
        return {
          x: (src.clientX - rect.left) * scaleX,
          y: (src.clientY - rect.top) * scaleY
        };
      }

      function snapshot() {
        if (!canvas || !alive) return;
        try { imageDataUrl = canvas.toDataURL('image/png'); } catch (err) { console.warn(err); }
      }

      function pushHistory() {
        if (skipHistory || !alive) return;
        snapshot();
        history.push(imageDataUrl);
        updateUndoUI();
      }

      function fillWhite() {
        if (!c2d || !canvas || !alive) return;
        c2d.save();
        c2d.setTransform(1, 0, 0, 1, 0, 0);
        c2d.fillStyle = '#ffffff';
        c2d.fillRect(0, 0, canvas.width, canvas.height);
        c2d.restore();
      }

      function drawDataUrl(url, then) {
        if (!alive || !c2d || !canvas) {
          if (then) then();
          return;
        }
        if (!url) {
          fillWhite();
          if (then) then();
          return;
        }
        const img = new Image();
        img.onload = function () {
          if (!alive || !c2d || !canvas) { if (then) then(); return; }
          fillWhite();
          c2d.drawImage(img, 0, 0, canvas.width, canvas.height);
          if (then) then();
        };
        img.onerror = function () { fillWhite(); if (then) then(); };
        img.src = url;
      }

      function applyHistoryUrl(url) {
        skipHistory = true;
        imageDataUrl = url;
        drawDataUrl(url, function () {
          skipHistory = false;
          updateUndoUI();
          if (alive) ctx.onChange();
        });
      }

      function startDraw(e) {
        if (!alive || !c2d) return;
        e.preventDefault();
        drawing = true;
        const p = pointerPos(e);
        lastX = p.x; lastY = p.y;
        c2d.beginPath();
        c2d.fillStyle = color;
        c2d.arc(lastX, lastY, brushWidth() / 2, 0, Math.PI * 2);
        c2d.fill();
      }

      function moveDraw(e) {
        if (!drawing || !alive || !c2d) return;
        e.preventDefault();
        const p = pointerPos(e);
        c2d.beginPath();
        c2d.strokeStyle = color;
        c2d.lineWidth = brushWidth();
        c2d.lineCap = 'round';
        c2d.lineJoin = 'round';
        c2d.moveTo(lastX, lastY);
        c2d.lineTo(p.x, p.y);
        c2d.stroke();
        lastX = p.x; lastY = p.y;
      }

      function endDraw(e) {
        if (!drawing) return;
        if (e) e.preventDefault();
        drawing = false;
        if (!alive || !c2d) return;
        pushHistory();
        ctx.onChange();
      }

      function clearCanvas() {
        if (!alive || !c2d) return;
        fillWhite();
        imageDataUrl = null;
        pushHistory();
        ctx.onChange();
        ctx.setStatus('Canvas cleared');
      }

      function resizeCanvasKeepContent() {
        if (!alive || !wrap || !canvas || !c2d) return;
        const dpr = window.devicePixelRatio || 1;
        const cssW = wrap.clientWidth;
        const cssH = wrap.clientHeight;
        if (cssW < 1 || cssH < 1) return;
        const prev = imageDataUrl || (canvas.width ? canvas.toDataURL('image/png') : null);
        canvas.width = Math.max(1, Math.floor(cssW * dpr));
        canvas.height = Math.max(1, Math.floor(cssH * dpr));
        drawDataUrl(prev, function () {
          snapshot();
        });
      }

      function updateToolUI() {
        if (!toolsHost) return;
        toolsHost.querySelectorAll('.swatch').forEach(function (b) {
          b.classList.toggle('active', b.dataset.color === color);
        });
        toolsHost.querySelectorAll('.brush-size-btn').forEach(function (b) {
          b.classList.toggle('active', b.dataset.size === sizeId);
        });
        updateUndoUI();
      }

      function updateUndoUI() {
        if (!toolsHost) return;
        const u = toolsHost.querySelector('[data-act="undo"]');
        const r = toolsHost.querySelector('[data-act="redo"]');
        if (u) u.disabled = !history.canUndo();
        if (r) r.disabled = !history.canRedo();
      }

      return {
        setState: function (state) {
          if (!state || typeof state !== 'object') return;
          if (typeof state.color === 'string') color = state.color;
          if (typeof state.sizeId === 'string') sizeId = state.sizeId;
          if (typeof state.imageDataUrl === 'string') {
            imageDataUrl = state.imageDataUrl;
            // If already mounted (e.g. post-compression), redraw from new URL
            if (alive && canvas && c2d) {
              drawDataUrl(imageDataUrl, function () {
                updateToolUI();
              });
            }
          }
          if (alive) updateToolUI();
        },
        getState: function () {
          if (canvas && c2d) {
            try { imageDataUrl = canvas.toDataURL('image/png'); } catch (_) {}
          }
          return { color: color, sizeId: sizeId, imageDataUrl: imageDataUrl };
        },
        mount: function (container) {
          alive = true;
          container.classList.add('paint-root');
          wrap = document.createElement('div');
          wrap.className = 'paint-canvas-wrap';
          canvas = document.createElement('canvas');
          canvas.setAttribute('aria-label', 'Paint canvas');
          wrap.appendChild(canvas);
          container.appendChild(wrap);
          c2d = canvas.getContext('2d');
          resizeCanvasKeepContent();
          // Seed history after first paint
          setTimeout(function () {
            if (!alive) return;
            snapshot();
            if (history.index < 0) history.reset(imageDataUrl);
            updateUndoUI();
          }, 50);

          canvas.addEventListener('mousedown', startDraw);
          canvas.addEventListener('mousemove', moveDraw);
          window.addEventListener('mouseup', endDraw);
          canvas.addEventListener('mouseleave', endDraw);
          canvas.addEventListener('touchstart', startDraw, { passive: false });
          canvas.addEventListener('touchmove', moveDraw, { passive: false });
          canvas.addEventListener('touchend', endDraw, { passive: false });
          canvas.addEventListener('touchcancel', endDraw, { passive: false });

          ro = new ResizeObserver(function () {
            if (resizeTimer) clearTimeout(resizeTimer);
            resizeTimer = setTimeout(function () {
              resizeTimer = null;
              resizeCanvasKeepContent();
            }, 80);
          });
          ro.observe(wrap);
        },
        unmount: function () {
          alive = false;
          drawing = false;
          if (resizeTimer) { clearTimeout(resizeTimer); resizeTimer = null; }
          if (canvas && c2d) {
            try { imageDataUrl = canvas.toDataURL('image/png'); } catch (_) {}
          }
          if (ro) { ro.disconnect(); ro = null; }
          window.removeEventListener('mouseup', endDraw);
          canvas = wrap = c2d = toolsHost = null;
        },
        undo: function () {
          const url = history.undo();
          if (url !== null && url !== undefined) applyHistoryUrl(url);
        },
        redo: function () {
          const url = history.redo();
          if (url !== null && url !== undefined) applyHistoryUrl(url);
        },
        canUndo: function () { return history.canUndo(); },
        canRedo: function () { return history.canRedo(); },
        exportPng: function () {
          if (!canvas) return imageDataUrl;
          try { return canvas.toDataURL('image/png'); } catch (_) { return imageDataUrl; }
        },
        renderTools: function (toolsEl) {
          toolsHost = toolsEl;
          const group = document.createElement('div');
          group.className = 'toolbar-group';

          function addBtn(label, act, title) {
            const b = document.createElement('button');
            b.type = 'button';
            b.textContent = label;
            b.dataset.act = act;
            b.title = title || label;
            group.appendChild(b);
            return b;
          }
          addBtn('Undo', 'undo', 'Undo (Ctrl+Z)').addEventListener('click', function () {
            const url = history.undo();
            if (url !== null && url !== undefined) applyHistoryUrl(url);
          });
          addBtn('Redo', 'redo', 'Redo (Ctrl+Shift+Z)').addEventListener('click', function () {
            const url = history.redo();
            if (url !== null && url !== undefined) applyHistoryUrl(url);
          });

          const sep0 = document.createElement('div');
          sep0.className = 'toolbar-sep';
          group.appendChild(sep0);

          const colorLabel = document.createElement('span');
          colorLabel.className = 'label';
          colorLabel.textContent = 'Color';
          group.appendChild(colorLabel);
          COLORS.forEach(function (c) {
            const b = document.createElement('button');
            b.type = 'button';
            b.className = 'swatch' + (c === color ? ' active' : '');
            b.style.background = c;
            b.dataset.color = c;
            b.title = c;
            if (c === '#ffffff') b.style.boxShadow = 'inset 0 0 0 1px #ccc';
            b.addEventListener('click', function () {
              color = c;
              updateToolUI();
              ctx.onChange();
            });
            group.appendChild(b);
          });

          const sep = document.createElement('div');
          sep.className = 'toolbar-sep';
          group.appendChild(sep);

          const sizeLabel = document.createElement('span');
          sizeLabel.className = 'label';
          sizeLabel.textContent = 'Brush';
          group.appendChild(sizeLabel);
          SIZES.forEach(function (s) {
            const b = document.createElement('button');
            b.type = 'button';
            b.className = 'brush-size-btn' + (s.id === sizeId ? ' active' : '');
            b.dataset.size = s.id;
            b.textContent = s.label;
            b.addEventListener('click', function () {
              sizeId = s.id;
              updateToolUI();
              ctx.onChange();
            });
            group.appendChild(b);
          });

          const sep2 = document.createElement('div');
          sep2.className = 'toolbar-sep';
          group.appendChild(sep2);

          const clearBtn = document.createElement('button');
          clearBtn.type = 'button';
          clearBtn.className = 'danger';
          clearBtn.textContent = 'Clear';
          clearBtn.addEventListener('click', function () {
            if (confirm('Clear the entire canvas?')) clearCanvas();
          });
          group.appendChild(clearBtn);

          toolsEl.appendChild(group);
          updateToolUI();
        }
      };
    }
  };

  // =========================================================================
  // Template: Notepad
  // =========================================================================
  const NotepadTemplate = {
    id: 'notepad',
    name: 'Notepad',
    description: 'Sticky notes board',
    kind: 'other',
    create: function (ctx) {
      let notes = [];
      let board = null, hint = null, nextId = 1;
      let drag = null, resize = null;
      let tagFilter = null;

      function nid() { return 'n' + (nextId++) + '_' + Math.random().toString(36).slice(2, 7); }
      function updateHint() { if (hint) hint.classList.toggle('hidden', notes.length > 0); }
      function emitChange() { ctx.onChange(); }
      function noteById(id) { return notes.find(function (n) { return n.id === id; }); }

      function rules() {
        return (ctx.getAutoColorRules && ctx.getAutoColorRules()) || defaultAutoColorRules();
      }

      /**
       * Apply auto-color heuristics. Manual color pick sets colorAuto=false until triggerKey changes.
       */
      function applyAutoColor(note, opts) {
        opts = opts || {};
        if (!note) return;
        const resolved = resolveAutoColor(note.text || '', rules());
        const newKey = resolved ? resolved.triggerKey : null;
        if (note.colorAuto === false) {
          // Re-enable only when the matching trigger changes (or appears/disappears)
          if (note.lockedTriggerKey !== newKey) {
            note.colorAuto = true;
            note.lockedTriggerKey = null;
          } else {
            return;
          }
        }
        if (resolved && NOTE_COLORS.indexOf(resolved.color) >= 0) {
          note.color = resolved.color;
          note.lastAutoTrigger = resolved.triggerKey;
        } else if (opts.clearWhenNone && note.lastAutoTrigger) {
          // Leave color as-is when no rule matches (don't force yellow)
          note.lastAutoTrigger = null;
        }
      }

      function noteMatchesTag(note, tag) {
        if (!tag) return true;
        const tags = extractTags(note.text || '');
        return tags.indexOf(tag) !== -1;
      }

      function syncBodyMode(el, note) {
        const wrap = el.querySelector('.note-body-wrap');
        if (!wrap) return;
        const ta = wrap.querySelector('.note-body');
        const cl = wrap.querySelector('.note-checklist');
        const hintEl = wrap.querySelector('.cl-edit-hint');
        const editing = el.classList.contains('editing-text');
        const hasCl = hasChecklistLines(note.text || '');

        if (editing || !hasCl) {
          if (ta) {
            ta.classList.remove('hidden');
            if (document.activeElement !== ta && ta.value !== (note.text || '')) {
              ta.value = note.text || '';
            }
          }
          if (cl) cl.classList.add('hidden');
          if (hintEl) hintEl.classList.add('hidden');
        } else {
          if (ta) ta.classList.add('hidden');
          if (cl) {
            cl.classList.remove('hidden');
            renderChecklistView(cl, note, el);
          }
          if (hintEl) hintEl.classList.remove('hidden');
        }
      }

      function renderChecklistView(cl, note, noteEl) {
        cl.innerHTML = '';
        const lines = String(note.text || '').split('\n');
        lines.forEach(function (line, idx) {
          const parsed = parseChecklistLine(line);
          const row = document.createElement('div');
          if (parsed.type === 'check') {
            row.className = 'cl-line' + (parsed.checked ? ' checked' : '');
            const cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.checked = !!parsed.checked;
            cb.setAttribute('aria-label', 'Toggle checklist item');
            cb.addEventListener('click', function (e) { e.stopPropagation(); });
            cb.addEventListener('change', function (e) {
              e.stopPropagation();
              const n = noteById(note.id);
              if (!n) return;
              n.text = toggleChecklistAtLine(n.text || '', idx);
              applyAutoColor(n);
              applyNoteEl(noteEl, n);
              emitChange();
            });
            const span = document.createElement('span');
            span.className = 'cl-text';
            span.textContent = parsed.content;
            row.appendChild(cb);
            row.appendChild(span);
          } else {
            row.className = 'cl-line plain';
            row.textContent = line;
          }
          cl.appendChild(row);
        });
      }

      function applyNoteEl(el, n) {
        el.style.left = n.x + 'px';
        el.style.top = n.y + 'px';
        el.style.width = n.w + 'px';
        el.style.height = n.h + 'px';
        const color = NOTE_COLORS.indexOf(n.color) >= 0 ? n.color : 'yellow';
        el.className = 'sticky-note color-' + color +
          (n.linkCard ? ' link-card' : '') +
          (n.colorAuto !== false && n.lastAutoTrigger ? ' auto-colored' : '') +
          (el.classList.contains('editing-text') ? ' editing-text' : '') +
          (el.classList.contains('selected') ? ' selected' : '') +
          (el.classList.contains('dragging') ? ' dragging' : '');
        el.dataset.id = n.id;
        el.classList.toggle('tag-filtered-out', !!(tagFilter && !noteMatchesTag(n, tagFilter)));
        if (n.linkCard) {
          const a = el.querySelector('a.link-card-url');
          const href = n.linkHref || parseSingleUrl(n.text) || n.text;
          if (a && href) {
            a.href = href;
            a.textContent = urlDomain(href);
          }
          return;
        }
        syncBodyMode(el, n);
      }

      function enterEditMode(el, note) {
        el.classList.add('editing-text');
        syncBodyMode(el, note);
        const ta = el.querySelector('.note-body');
        if (ta) {
          ta.value = note.text || '';
          setTimeout(function () {
            ta.focus();
            try { ta.setSelectionRange(ta.value.length, ta.value.length); } catch (_) {}
          }, 10);
        }
      }

      function exitEditMode(el, note) {
        el.classList.remove('editing-text');
        const ta = el.querySelector('.note-body');
        if (ta) {
          note.text = ta.value;
          applyAutoColor(note);
        }
        applyNoteEl(el, note);
        emitChange();
      }

      function createNoteEl(n) {
        const el = document.createElement('div');
        el.className = 'sticky-note color-' + (n.color || 'yellow');
        el.dataset.id = n.id;
        el.style.left = n.x + 'px';
        el.style.top = n.y + 'px';
        el.style.width = n.w + 'px';
        el.style.height = n.h + 'px';

        const header = document.createElement('div');
        header.className = 'note-header';
        const grip = document.createElement('div');
        grip.className = 'grip';
        grip.textContent = '⋮⋮ drag';
        header.appendChild(grip);

        const colorBtn = document.createElement('button');
        colorBtn.type = 'button';
        colorBtn.title = 'Cycle color (turns off auto-color until trigger text changes)';
        colorBtn.textContent = '🎨';
        colorBtn.addEventListener('click', function (e) {
          e.stopPropagation();
          const note = noteById(n.id);
          if (!note) return;
          const idx = NOTE_COLORS.indexOf(note.color || 'yellow');
          note.color = NOTE_COLORS[(idx + 1) % NOTE_COLORS.length];
          // Manual override
          note.colorAuto = false;
          const resolved = resolveAutoColor(note.text || '', rules());
          note.lockedTriggerKey = resolved ? resolved.triggerKey : null;
          note.lastAutoTrigger = null;
          applyNoteEl(el, note);
          emitChange();
        });
        header.appendChild(colorBtn);

        const kanbanBtn = document.createElement('button');
        kanbanBtn.type = 'button';
        kanbanBtn.title = 'Send to Kanban (keeps this sticky)';
        kanbanBtn.textContent = '📋';
        kanbanBtn.addEventListener('click', function (e) {
          e.stopPropagation();
          const note = noteById(n.id);
          if (!note) return;
          // Snapshot text from live textarea if editing
          const ta = el.querySelector('.note-body');
          if (ta && document.activeElement === ta) note.text = ta.value;
          if (ctx.sendStickyToKanban) ctx.sendStickyToKanban(note);
        });
        header.appendChild(kanbanBtn);

        const delBtn = document.createElement('button');
        delBtn.type = 'button';
        delBtn.title = 'Delete note';
        delBtn.textContent = '✕';
        delBtn.addEventListener('click', function (e) {
          e.stopPropagation();
          deleteNote(n.id);
        });
        header.appendChild(delBtn);

        const bodyWrap = document.createElement('div');
        bodyWrap.className = 'note-body-wrap';

        if (n.linkCard) {
          const linkBody = document.createElement('div');
          linkBody.className = 'link-card-body';
          const lab = document.createElement('div');
          lab.className = 'link-card-label';
          lab.textContent = 'Link';
          const a = document.createElement('a');
          a.className = 'link-card-url';
          const href = n.linkHref || parseSingleUrl(n.text) || n.text || '#';
          a.href = href;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          a.textContent = urlDomain(href);
          a.title = href;
          a.addEventListener('mousedown', function (e) { e.stopPropagation(); });
          a.addEventListener('click', function (e) { e.stopPropagation(); });
          linkBody.appendChild(lab);
          linkBody.appendChild(a);
          bodyWrap.appendChild(linkBody);
        } else {
          const body = document.createElement('textarea');
          body.className = 'note-body';
          body.value = n.text || '';
          body.placeholder = 'Type here…  - item  or  [ ] task  ·  #tags  ·  TODO';
          body.addEventListener('input', function () {
            const note = noteById(n.id);
            if (!note) return;
            note.text = body.value;
            applyAutoColor(note);
            const color = NOTE_COLORS.indexOf(note.color) >= 0 ? note.color : 'yellow';
            NOTE_COLORS.forEach(function (c) { el.classList.remove('color-' + c); });
            el.classList.add('color-' + color);
            el.classList.toggle('auto-colored', note.colorAuto !== false && !!note.lastAutoTrigger);
            emitChange();
          });
          body.addEventListener('mousedown', function (e) { e.stopPropagation(); });
          body.addEventListener('blur', function () {
            const note = noteById(n.id);
            if (!note) return;
            exitEditMode(el, note);
          });
          body.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') {
              e.preventDefault();
              body.blur();
            }
          });

          const checklist = document.createElement('div');
          checklist.className = 'note-checklist hidden';
          checklist.title = 'Click a checkbox to toggle. Click text area to edit.';
          checklist.addEventListener('click', function (e) {
            if (e.target && e.target.matches('input[type="checkbox"]')) return;
            const note = noteById(n.id);
            if (!note) return;
            enterEditMode(el, note);
          });

          const editHint = document.createElement('div');
          editHint.className = 'cl-edit-hint hidden';
          editHint.textContent = 'Click text to edit · checkboxes stay live';

          bodyWrap.appendChild(body);
          bodyWrap.appendChild(checklist);
          bodyWrap.appendChild(editHint);
        }

        const handle = document.createElement('div');
        handle.className = 'resize-handle';
        handle.title = 'Resize';

        header.addEventListener('pointerdown', function (e) {
          if (e.button !== 0 && e.pointerType === 'mouse') return;
          if (e.target.closest('button')) return;
          e.preventDefault();
          const note = noteById(n.id);
          if (!note) return;
          el.classList.add('dragging', 'selected');
          drag = { id: n.id, startX: e.clientX, startY: e.clientY, origX: note.x, origY: note.y };
          try { header.setPointerCapture(e.pointerId); } catch (_) {}
        });
        header.addEventListener('pointermove', function (e) {
          if (!drag || drag.id !== n.id) return;
          const note = noteById(n.id);
          if (!note) return;
          note.x = Math.max(0, drag.origX + (e.clientX - drag.startX));
          note.y = Math.max(0, drag.origY + (e.clientY - drag.startY));
          el.style.left = note.x + 'px';
          el.style.top = note.y + 'px';
        });
        header.addEventListener('pointerup', function () {
          if (!drag || drag.id !== n.id) return;
          el.classList.remove('dragging');
          drag = null;
          emitChange();
        });
        header.addEventListener('pointercancel', function () {
          if (!drag || drag.id !== n.id) return;
          el.classList.remove('dragging');
          drag = null;
        });

        handle.addEventListener('pointerdown', function (e) {
          if (e.button !== 0 && e.pointerType === 'mouse') return;
          e.preventDefault(); e.stopPropagation();
          const note = noteById(n.id);
          if (!note) return;
          el.classList.add('selected');
          resize = { id: n.id, startX: e.clientX, startY: e.clientY, startW: note.w, startH: note.h };
          try { handle.setPointerCapture(e.pointerId); } catch (_) {}
        });
        handle.addEventListener('pointermove', function (e) {
          if (!resize || resize.id !== n.id) return;
          const note = noteById(n.id);
          if (!note) return;
          note.w = Math.max(140, resize.startW + (e.clientX - resize.startX));
          note.h = Math.max(100, resize.startH + (e.clientY - resize.startY));
          el.style.width = note.w + 'px';
          el.style.height = note.h + 'px';
        });
        handle.addEventListener('pointerup', function () {
          if (!resize || resize.id !== n.id) return;
          resize = null;
          emitChange();
        });
        handle.addEventListener('pointercancel', function () {
          if (!resize || resize.id !== n.id) return;
          resize = null;
        });

        el.addEventListener('mousedown', function (e) {
          if (e.target.closest('.note-header') || e.target.closest('.resize-handle')) return;
          board.querySelectorAll('.sticky-note.selected').forEach(function (x) { x.classList.remove('selected'); });
          el.classList.add('selected');
        });

        if (!n.linkCard) {
          bodyWrap.addEventListener('dblclick', function () {
            const note = noteById(n.id);
            if (!note) return;
            enterEditMode(el, note);
          });
          bodyWrap.addEventListener('click', function (e) {
            if (e.target.closest('input[type="checkbox"]')) return;
            const note = noteById(n.id);
            if (!note) return;
            if (!hasChecklistLines(note.text || '') && !el.classList.contains('editing-text')) {
              enterEditMode(el, note);
            }
          });
        }

        el.appendChild(header);
        el.appendChild(bodyWrap);
        el.appendChild(handle);

        if (!n.linkCard) applyAutoColor(n);
        applyNoteEl(el, n);

        return el;
      }

      function renderAll() {
        if (!board) return;
        const existing = new Map();
        board.querySelectorAll('.sticky-note').forEach(function (el) {
          existing.set(el.dataset.id, el);
        });
        const keep = new Set(notes.map(function (n) { return n.id; }));
        existing.forEach(function (el, id) {
          if (!keep.has(id)) el.remove();
        });
        notes.forEach(function (n) {
          if (!n.linkCard) applyAutoColor(n);
          let el = existing.get(n.id);
          if (!el) {
            el = createNoteEl(n);
            board.appendChild(el);
          } else applyNoteEl(el, n);
        });
        updateHint();
      }

      function addNote(partial) {
        const offset = notes.length * 24;
        const note = {
          id: (partial && partial.id) || nid(),
          x: (partial && partial.x != null) ? partial.x : 40 + (offset % 200),
          y: (partial && partial.y != null) ? partial.y : 40 + (offset % 160),
          w: (partial && partial.w) || 200,
          h: (partial && partial.h) || 180,
          text: (partial && partial.text) || '',
          color: (partial && partial.color) || 'yellow',
          colorAuto: partial && partial.colorAuto != null ? !!partial.colorAuto : true,
          lockedTriggerKey: (partial && partial.lockedTriggerKey) || null,
          lastAutoTrigger: (partial && partial.lastAutoTrigger) || null,
          linkCard: !!(partial && partial.linkCard),
          linkHref: (partial && partial.linkHref) || null
        };
        if (!note.linkCard) applyAutoColor(note);
        notes.push(note);
        if (board) {
          board.appendChild(createNoteEl(note));
          updateHint();
        }
        emitChange();
        ctx.setStatus(note.linkCard ? 'Link card added' : 'Note added');
      }

      function deleteNote(id) {
        notes = notes.filter(function (n) { return n.id !== id; });
        if (board) {
          const el = board.querySelector('.sticky-note[data-id="' + CSS.escape(id) + '"]');
          if (el) el.remove();
          updateHint();
        }
        emitChange();
        ctx.setStatus('Note deleted');
      }

      return {
        setState: function (state) {
          if (!state || typeof state !== 'object') return;
          if (Array.isArray(state.notes)) {
            notes = state.notes.map(function (n) {
              const note = {
                id: n.id || nid(),
                x: Number(n.x) || 0,
                y: Number(n.y) || 0,
                w: Math.max(140, Number(n.w) || 200),
                h: Math.max(100, Number(n.h) || 180),
                text: typeof n.text === 'string' ? n.text : '',
                color: NOTE_COLORS.indexOf(n.color) >= 0 ? n.color : 'yellow',
                colorAuto: n.colorAuto !== false,
                lockedTriggerKey: n.lockedTriggerKey || null,
                lastAutoTrigger: n.lastAutoTrigger || null,
                linkCard: !!n.linkCard,
                linkHref: n.linkHref || null
              };
              if (n.colorAuto === undefined && !note.linkCard) note.colorAuto = true;
              if (!note.linkCard) applyAutoColor(note);
              return note;
            });
            notes.forEach(function (n) {
              const m = String(n.id).match(/^n(\d+)/);
              if (m) nextId = Math.max(nextId, parseInt(m[1], 10) + 1);
            });
            if (board) renderAll();
          }
        },
        getState: function () {
          return {
            notes: notes.map(function (n) {
              return {
                id: n.id, x: n.x, y: n.y, w: n.w, h: n.h,
                text: n.text, color: n.color,
                colorAuto: n.colorAuto !== false,
                lockedTriggerKey: n.lockedTriggerKey || null,
                lastAutoTrigger: n.lastAutoTrigger || null,
                linkCard: !!n.linkCard,
                linkHref: n.linkHref || null
              };
            })
          };
        },
        mount: function (container) {
          container.classList.add('notepad-root');
          board = document.createElement('div');
          board.className = 'notepad-board';
          board.setAttribute('aria-label', 'Sticky notes board');
          hint = document.createElement('div');
          hint.className = 'empty-hint';
          hint.innerHTML = '<strong>No notes yet</strong><div>Click “Add note” · try <code>- task</code>, <code>TODO</code>, <code>#tag</code> · paste a URL for a link card</div>';
          board.appendChild(hint);
          container.appendChild(board);
          if (ctx.getTagFilter) tagFilter = ctx.getTagFilter();
          renderAll();
        },
        unmount: function () {
          board = hint = null;
          drag = resize = null;
        },
        addNote: function (partial) { addNote(partial); },
        applyTagFilter: function (tag) {
          tagFilter = tag || null;
          if (!board) return;
          board.querySelectorAll('.sticky-note').forEach(function (el) {
            const note = noteById(el.dataset.id);
            if (!note) return;
            el.classList.toggle('tag-filtered-out', !!(tagFilter && !noteMatchesTag(note, tagFilter)));
          });
        },
        reapplyAutoColors: function () {
          notes.forEach(function (n) {
            // Force re-eval: temporarily treat as auto if not locked
            if (n.colorAuto !== false) {
              n.lastAutoTrigger = null;
              applyAutoColor(n);
            }
          });
          renderAll();
          emitChange();
        },
        renderTools: function (toolsEl) {
          const group = document.createElement('div');
          group.className = 'toolbar-group';
          const addBtn = document.createElement('button');
          addBtn.type = 'button';
          addBtn.textContent = '+ Add note';
          addBtn.addEventListener('click', function () { addNote(); });
          group.appendChild(addBtn);
          const promoteBtn = document.createElement('button');
          promoteBtn.type = 'button';
          promoteBtn.title = 'Create a new Kanban board from every sticky on this board (original untouched)';
          promoteBtn.textContent = '→ Kanban board';
          promoteBtn.addEventListener('click', function () {
            if (ctx.promoteNotepadBoardToKanban) ctx.promoteNotepadBoardToKanban();
          });
          group.appendChild(promoteBtn);
          const clearBtn = document.createElement('button');
          clearBtn.type = 'button';
          clearBtn.className = 'danger';
          clearBtn.textContent = 'Delete all';
          clearBtn.addEventListener('click', function () {
            if (!notes.length) return;
            if (confirm('Delete all sticky notes?')) {
              notes = [];
              renderAll();
              emitChange();
              ctx.setStatus('All notes deleted');
            }
          });
          group.appendChild(clearBtn);
          const count = document.createElement('span');
          count.className = 'label';
          count.style.textTransform = 'none';
          count.style.marginLeft = '6px';
          const sync = function () {
            count.textContent = notes.length + (notes.length === 1 ? ' note' : ' notes');
          };
          sync();
          const iv = setInterval(function () {
            if (!count.isConnected) { clearInterval(iv); return; }
            sync();
          }, 400);
          group.appendChild(count);
          toolsEl.appendChild(group);
        }
      };
    }
  };

  // =========================================================================
  // Template: Annotate (snipping-tool-like)
  // =========================================================================
  const SnipTemplate = {
    id: 'snip',
    name: 'Annotate',
    description: 'Paste or drop an image, then mark it up',
    kind: 'raster',
    create: function (ctx) {
      const TOOLS = [
        { id: 'highlight', label: 'Highlight' },
        { id: 'arrow', label: 'Arrow' },
        { id: 'text', label: 'Text' },
        { id: 'blur', label: 'Blur/Redact' },
        { id: 'crop', label: 'Crop' }
      ];
      let tool = 'highlight';
      let strokeColor = '#e03131';
      let baseImageDataUrl = null; // original/current base
      let displayW = 0, displayH = 0; // canvas pixel size
      let canvas = null, wrap = null, stage = null, c2d = null, hint = null;
      let drawing = false;
      let startX = 0, startY = 0, lastX = 0, lastY = 0;
      let snapshotBeforeStroke = null;
      let history = new HistoryStack(MAX_UNDO);
      let toolsHost = null;
      let pasteHandler = null;
      /** Searchable text labels placed with the Text tool (also burned into the bitmap). */
      let textLayers = [];
      let captureAvailable = typeof navigator !== 'undefined' &&
        navigator.mediaDevices && typeof navigator.mediaDevices.getDisplayMedia === 'function';

      function pointerPos(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / Math.max(1, rect.width);
        const scaleY = canvas.height / Math.max(1, rect.height);
        const src = e.touches && e.touches[0] ? e.touches[0] : e;
        return {
          x: (src.clientX - rect.left) * scaleX,
          y: (src.clientY - rect.top) * scaleY
        };
      }

      function updateHint() {
        if (!hint) return;
        hint.classList.toggle('hidden', !!baseImageDataUrl);
      }

      function pushHistory() {
        try {
          const url = canvas.toDataURL('image/png');
          baseImageDataUrl = url;
          history.push(url);
          updateUndoUI();
        } catch (e) { console.warn(e); }
      }

      function loadImageToCanvas(src, opts) {
        opts = opts || {};
        return new Promise(function (resolve, reject) {
          const img = new Image();
          img.onload = function () {
            const maxW = 1600;
            let w = img.naturalWidth || img.width;
            let h = img.naturalHeight || img.height;
            if (w > maxW) {
              h = Math.round(h * (maxW / w));
              w = maxW;
            }
            displayW = w;
            displayH = h;
            canvas.width = w;
            canvas.height = h;
            canvas.style.width = w + 'px';
            canvas.style.height = h + 'px';
            c2d.setTransform(1, 0, 0, 1, 0, 0);
            c2d.drawImage(img, 0, 0, w, h);
            wrap.classList.add('has-image');
            try { baseImageDataUrl = canvas.toDataURL('image/png'); } catch (_) {}
            if (!opts.skipHistory) {
              history.reset(baseImageDataUrl);
            }
            updateHint();
            updateUndoUI();
            resolve();
          };
          img.onerror = function () { reject(new Error('image load failed')); };
          img.src = src;
        });
      }

      function applyHistoryUrl(url) {
        if (!url) return;
        loadImageToCanvas(url, { skipHistory: true }).then(function () {
          baseImageDataUrl = url;
          ctx.onChange();
        });
      }

      function handleImageFile(file) {
        if (!file || !file.type || file.type.indexOf('image/') !== 0) {
          ctx.setStatus('Not an image file', 'error');
          return;
        }
        const reader = new FileReader();
        reader.onload = function () {
          loadImageToCanvas(reader.result).then(function () {
            ctx.onChange();
            ctx.setStatus('Image loaded');
          }).catch(function () {
            ctx.setStatus('Failed to load image', 'error');
          });
        };
        reader.readAsDataURL(file);
      }

      function onPaste(e) {
        const items = e.clipboardData && e.clipboardData.items;
        if (!items) return;

          if (items[i].type.indexOf('image/') === 0) {
            e.preventDefault();
            const file = items[i].getAsFile();
            if (file) handleImageFile(file);
            return;
          }
        }
      }

      function drawArrow(x1, y1, x2, y2) {
        const head = 14;
        const angle = Math.atan2(y2 - y1, x2 - x1);
        c2d.strokeStyle = strokeColor;
        c2d.fillStyle = strokeColor;
        c2d.lineWidth = 3;
        c2d.lineCap = 'round';
        c2d.beginPath();
        c2d.moveTo(x1, y1);
        c2d.lineTo(x2, y2);
        c2d.stroke();
        c2d.beginPath();
        c2d.moveTo(x2, y2);
        c2d.lineTo(x2 - head * Math.cos(angle - 0.4), y2 - head * Math.sin(angle - 0.4));
        c2d.lineTo(x2 - head * Math.cos(angle + 0.4), y2 - head * Math.sin(angle + 0.4));
        c2d.closePath();
        c2d.fill();
      }

      function redactRect(x, y, w, h) {
        // Pixelate / solid redact for reliable offline redaction
        const sx = Math.max(0, Math.floor(Math.min(x, x + w)));
        const sy = Math.max(0, Math.floor(Math.min(y, y + h)));
        const sw = Math.min(canvas.width - sx, Math.floor(Math.abs(w)));
        const sh = Math.min(canvas.height - sy, Math.floor(Math.abs(h)));
        if (sw < 2 || sh < 2) return;
        try {
          const sample = c2d.getImageData(sx, sy, sw, sh);
          const block = 12;
          for (let by = 0; by < sh; by += block) {
            for (let bx = 0; bx < sw; bx += block) {
              const i = ((by * sw) + bx) * 4;
              const r = sample.data[i], g = sample.data[i + 1], b = sample.data[i + 2];
              c2d.fillStyle = 'rgb(' + r + ',' + g + ',' + b + ')';
              // Darken for redact feel
              c2d.fillStyle = '#2b2b2b';
              c2d.fillRect(sx + bx, sy + by, Math.min(block, sw - bx), Math.min(block, sh - by));
            }
          }
          // Extra solid overlay for true redaction
          c2d.fillStyle = 'rgba(20,20,20,0.92)';
          c2d.fillRect(sx, sy, sw, sh);
        } catch (err) {
          c2d.fillStyle = '#1a1a1a';
          c2d.fillRect(sx, sy, sw, sh);
        }
      }

      function restoreSnapshot() {
        if (!snapshotBeforeStroke) return;
        const img = new Image();
        img.onload = function () {
          c2d.clearRect(0, 0, canvas.width, canvas.height);
          c2d.drawImage(img, 0, 0);

      function startStroke(e) {
        if (!baseImageDataUrl) return;
        e.preventDefault();
        const p = pointerPos(e);
        drawing = true;
        startX = lastX = p.x;
        startY = lastY = p.y;
        try { snapshotBeforeStroke = c2d.getImageData(0, 0, canvas.width, canvas.height); } catch (_) {
          snapshotBeforeStroke = null;
        }

        if (tool === 'text') {
          drawing = false;
          const text = prompt('Label text:');
          if (text) {
            c2d.font = 'bold 18px system-ui, sans-serif';
            c2d.fillStyle = strokeColor;
            c2d.strokeStyle = 'rgba(255,255,255,0.85)';
            c2d.lineWidth = 3;
            c2d.strokeText(text, p.x, p.y);
            c2d.fillText(text, p.x, p.y);
            textLayers.push({
              text: text,
              x: p.x,
              y: p.y,
              color: strokeColor,
              at: new Date().toISOString()
            });
            pushHistory();
            ctx.onChange();
          }
          return;
        }
      }

      function moveStroke(e) {
        if (!drawing || !baseImageDataUrl) return;
        e.preventDefault();
        const p = pointerPos(e);

        if (tool === 'highlight') {
          c2d.strokeStyle = 'rgba(255, 224, 50, 0.45)';
          c2d.lineWidth = 18;
          c2d.lineCap = 'round';
          c2d.lineJoin = 'round';
          c2d.beginPath();
          c2d.moveTo(lastX, lastY);
          c2d.lineTo(p.x, p.y);
          c2d.stroke();
          lastX = p.x; lastY = p.y;
          return;
        }

        // Preview tools: restore and redraw
        if (snapshotBeforeStroke) {
          c2d.putImageData(snapshotBeforeStroke, 0, 0);
        }
        if (tool === 'arrow') {
          drawArrow(startX, startY, p.x, p.y);
        } else if (tool === 'blur' || tool === 'crop') {
          const x = Math.min(startX, p.x), y = Math.min(startY, p.y);
          const w = Math.abs(p.x - startX), h = Math.abs(p.y - startY);
          c2d.strokeStyle = tool === 'crop' ? '#4a7cff' : '#e03131';
          c2d.lineWidth = 2;
          c2d.setLineDash([6, 4]);
          c2d.strokeRect(x, y, w, h);
          c2d.setLineDash([]);
          if (tool === 'blur') {
            c2d.fillStyle = 'rgba(0,0,0,0.25)';
            c2d.fillRect(x, y, w, h);
          }
        }
        lastX = p.x; lastY = p.y;
      }

      function endStroke(e) {
        if (!drawing) return;
        if (e) e.preventDefault();
        drawing = false;
        const p = e ? pointerPos(e) : { x: lastX, y: lastY };

        if (tool === 'highlight') {
          pushHistory();
          ctx.onChange();
          return;
        }

        if (snapshotBeforeStroke) c2d.putImageData(snapshotBeforeStroke, 0, 0);

        if (tool === 'arrow') {
          drawArrow(startX, startY, p.x, p.y);
          pushHistory();
          ctx.onChange();
        } else if (tool === 'blur') {
          redactRect(startX, startY, p.x - startX, p.y - startY);
          pushHistory();
          ctx.onChange();
          ctx.setStatus('Region redacted');
        } else if (tool === 'crop') {
          const x = Math.max(0, Math.floor(Math.min(startX, p.x)));
          const y = Math.max(0, Math.floor(Math.min(startY, p.y)));
          const w = Math.min(canvas.width - x, Math.floor(Math.abs(p.x - startX)));
          const h = Math.min(canvas.height - y, Math.floor(Math.abs(p.y - startY)));
          if (w > 4 && h > 4) {
            try {
              const cropped = c2d.getImageData(x, y, w, h);
              canvas.width = w;
              canvas.height = h;
              canvas.style.width = w + 'px';
              canvas.style.height = h + 'px';
              c2d.putImageData(cropped, 0, 0);
              pushHistory();
              ctx.onChange();
              ctx.setStatus('Cropped');
            } catch (err) {
              ctx.setStatus('Crop failed', 'error');
            }
          }
        }
        snapshotBeforeStroke = null;
      }

      function tryCapture() {
        if (!captureAvailable) {
          ctx.setStatus('Screen capture API not available here — use paste or drop', 'error');
          return;
        }
        // getDisplayMedia is often blocked or restricted under file://

          const video = document.createElement('video');
          video.srcObject = stream;
          video.muted = true;
          video.playsInline = true;

            video.play().then(function () {
              const w = video.videoWidth || 1280;
              const h = video.videoHeight || 720;

              tmp.height = h;

                ctx.onChange();
                ctx.setStatus('Screen captured');

            }).catch(function () {
              stream.getTracks().forEach(function (t) { t.stop(); });
              ctx.setStatus('Capture play failed — use paste/drop', 'error');
            });

        }).catch(function (err) {
          const msg = (err && err.name) ? err.name : 'error';
          ctx.setStatus('Capture unavailable (' + msg + ') — paste or drop an image instead', 'error');
        });
      }

      function updateToolUI() {
        if (!toolsHost) return;
        toolsHost.querySelectorAll('[data-tool]').forEach(function (b) {
          b.classList.toggle('active', b.dataset.tool === tool);
        });
        toolsHost.querySelectorAll('.swatch').forEach(function (b) {
          b.classList.toggle('active', b.dataset.color === strokeColor);
        });
        updateUndoUI();
      }

      function updateUndoUI() {
        if (!toolsHost) return;
        const u = toolsHost.querySelector('[data-act="undo"]');
        const r = toolsHost.querySelector('[data-act="redo"]');
        if (u) u.disabled = !history.canUndo();
        if (r) r.disabled = !history.canRedo();
      }

      return {
        setState: function (state) {
          if (!state || typeof state !== 'object') return;
          if (typeof state.tool === 'string') tool = state.tool;
          if (typeof state.strokeColor === 'string') strokeColor = state.strokeColor;
          if (typeof state.imageDataUrl === 'string') baseImageDataUrl = state.imageDataUrl;
          if (Array.isArray(state.textLayers)) {
            textLayers = state.textLayers.map(function (t) {
              return {
                text: typeof t.text === 'string' ? t.text : String(t.text || ''),
                x: Number(t.x) || 0,
                y: Number(t.y) || 0,
                color: t.color || strokeColor,
                at: t.at || null
              };
            });
          }
        },
        getState: function () {
          if (canvas && baseImageDataUrl) {
            try { baseImageDataUrl = canvas.toDataURL('image/png'); } catch (_) {}
          }
          return {
            tool: tool,
            strokeColor: strokeColor,
            imageDataUrl: baseImageDataUrl,
            textLayers: textLayers.slice()
          };
        },
        mount: function (container) {
          container.classList.add('snip-root');
          stage = document.createElement('div');
          stage.className = 'snip-stage';
          wrap = document.createElement('div');
          wrap.className = 'snip-canvas-wrap';
          canvas = document.createElement('canvas');
          canvas.width = 640;
          canvas.height = 400;
          canvas.setAttribute('aria-label', 'Annotation canvas');
          wrap.appendChild(canvas);
          stage.appendChild(wrap);

          hint = document.createElement('div');
          hint.className = 'empty-hint';
          hint.innerHTML = '<strong>Paste or drop an image to annotate</strong>' +
            '<div>Press <kbd>Ctrl</kbd>+<kbd>V</kbd> to paste a screenshot, or drag an image file here</div>';
          stage.appendChild(hint);

          container.appendChild(stage);
          c2d = canvas.getContext('2d');

          if (baseImageDataUrl) {
            loadImageToCanvas(baseImageDataUrl).catch(function () {});
          } else {
            updateHint();
          }

          canvas.addEventListener('mousedown', startStroke);
          canvas.addEventListener('mousemove', moveStroke);
          window.addEventListener('mouseup', endStroke);
          canvas.addEventListener('touchstart', startStroke, { passive: false });
          canvas.addEventListener('touchmove', moveStroke, { passive: false });
          canvas.addEventListener('touchend', endStroke, { passive: false });

          window.addEventListener('paste', pasteHandler);

          stage.addEventListener('dragover', function (e) {

          });

            stage.classList.remove('drop-active');
          });

          });

        unmount: function () {

        undo: function () {

        redo: function () {

          if (url) applyHistoryUrl(url);
        },
        canUndo: function () { return history.canUndo(); },
        canRedo: function () { return history.canRedo(); },
        exportPng: function () {

          if (canvas && baseImageDataUrl) {

          }
          return baseImageDataUrl;
        },
        renderTools: function (toolsEl) {
