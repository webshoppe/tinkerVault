  /**
   * Lightweight human summary for a board snapshot (no canvas thumbnail required).
   */
  function summarizeBoardContent(templateId, state, name) {
    state = state || {};
    const tpl = TemplateRegistry.get(templateId);
    const tname = tpl ? tpl.name : (templateId || 'board');
    try {
      if (templateId === 'notepad' && Array.isArray(state.notes)) {
        const notes = state.notes;
        const tags = [];
        const seen = Object.create(null);
        notes.forEach(function (n) {
          extractTags(n && n.text).forEach(function (tag) {
            if (!seen[tag]) { seen[tag] = true; tags.push(tag); }
          });
        });
        let s = notes.length + ' sticky' + (notes.length === 1 ? '' : 'ies');
        if (tags.length) s += ', tags: ' + tags.slice(0, 5).map(function (t) { return '#' + t; }).join(' ');
        const sample = notes[0] && notes[0].text ? String(notes[0].text).replace(/\s+/g, ' ').slice(0, 60) : '';
        if (sample) s += ' · “' + sample + (notes[0].text.length > 60 ? '…' : '') + '”';
        return s;
      }
      if (templateId === 'kanban') {
        const cols = Array.isArray(state.columns) ? state.columns : [];
        const cardMap = state.cards || {};
        let n = 0;
        cols.forEach(function (c) { n += (c.cardIds && c.cardIds.length) || 0; });
        return cols.length + ' columns, ' + n + ' card' + (n === 1 ? '' : 's');
      }
      if (templateId === 'wordpad') {
        const plain = stripHtmlToText(state.html || '');
        const words = plain ? plain.split(/\s+/).filter(Boolean).length : 0;
        const preview = plain.slice(0, 70);
        return words + ' word' + (words === 1 ? '' : 's') +
          (preview ? ' · “' + preview + (plain.length > 70 ? '…' : '') + '”' : ' (empty)');
      }
      if (templateId === 'paint' || templateId === 'snip') {
        const url = state.imageDataUrl || '';
        if (!url) return tname + ' · empty canvas';
        const kb = Math.round((url.length * 0.75) / 1024);
        return tname + ' · image (~' + kb + ' KB stored)';
      }
    } catch (_) {}
    return tname + (name ? ' · ' + name : '');
  }

  function formatRelativeTime(iso) {
    try {
      const t = new Date(iso).getTime();
      if (!isFinite(t)) return iso || '';
      const sec = Math.round((Date.now() - t) / 1000);
      if (sec < 60) return 'just now';
      if (sec < 3600) return Math.floor(sec / 60) + 'm ago';
      if (sec < 86400) return Math.floor(sec / 3600) + 'h ago';
      const days = Math.floor(sec / 86400);
      if (days < 14) return days + 'd ago';
      return new Date(t).toLocaleString();
    } catch (_) {
      return iso || '';
    }
  }

  function purgeExpiredTrash(trash, history) {
    const list = Array.isArray(trash) ? trash : [];
    const now = Date.now();
    const kept = [];
    const purgedIds = [];
    list.forEach(function (entry) {
      if (!entry || !entry.deletedAt) return;
      const t = new Date(entry.deletedAt).getTime();
      if (!isFinite(t)) return;
      if ((now - t) < TRASH_MAX_AGE_MS) {
        kept.push(entry);
      } else if (entry.board && entry.board.id) {
        purgedIds.push(entry.board.id);
      }
    });
    if (history && purgedIds.length) {
      purgedIds.forEach(function (id) { delete history[id]; });
    }
    return kept;
  }

  function normalizeHistoryMap(raw) {
    const out = {};
    if (!raw || !isPlainObject(raw)) return out;
    Object.keys(raw).forEach(function (boardId) {
      const arr = raw[boardId];
      if (!Array.isArray(arr)) return;
      out[boardId] = arr.filter(function (s) {
        return s && typeof s === 'object' && s.at && s.state != null;
      }).slice(0, HISTORY_MAX_SNAPSHOTS);
    });
    return out;
  }

  /**
   * Drop oldest snapshots globally until payload JSON length is under soft chars
   * or estimate under pressure ratio. Mutates payload.history.
   */
  function trimHistoryForQuota(payload, maxChars) {
    maxChars = maxChars || STORAGE_SOFT_CHARS;
    if (!payload.history) payload.history = {};
    function totalSnaps() {
      let n = 0;
      Object.keys(payload.history).forEach(function (k) {
        n += (payload.history[k] && payload.history[k].length) || 0;
      });
      return n;
    }
    function dropOldest() {
      let oldestKey = null;
      let oldestIdx = -1;
      let oldestAt = Infinity;
      Object.keys(payload.history).forEach(function (bid) {
        const arr = payload.history[bid];
        if (!arr || !arr.length) return;
        // History stored newest-first; oldest is last
        const snap = arr[arr.length - 1];
        const t = new Date(snap.at).getTime();
        if (t < oldestAt) {
          oldestAt = t;
          oldestKey = bid;
          oldestIdx = arr.length - 1;
        }
      });
      if (oldestKey == null) return false;
      payload.history[oldestKey].splice(oldestIdx, 1);
      if (!payload.history[oldestKey].length) delete payload.history[oldestKey];
      return true;
    }
    let guard = 0;
    while (guard++ < 200) {
      const len = JSON.stringify(payload).length;
      const bytesEst = len * 2;
      if (len <= maxChars && bytesEst <= STORAGE_QUOTA_ESTIMATE * QUOTA_SNAPSHOT_TRIM_RATIO) break;
      if (totalSnaps() === 0) break;
      if (!dropOldest()) break;
    }
    return payload;
  }

  /**
   * Load + validate. Returns { store, recovery } where recovery is null or quarantine record.
   */
  function loadStore() {
    const rawStr = loadRawString(STORAGE_KEY);
    if (rawStr) {
      let parsed = null;
      try {
        parsed = JSON.parse(rawStr);
      } catch (e) {
        const rec = quarantineCorrupt(rawStr, 'json-parse:' + (e && e.message));
        return { store: defaultStore(), recovery: rec };
      }
      const v = validateStore(parsed);
      if (v.ok) {
        if (!v.data.session || !isPlainObject(v.data.session)) v.data.session = defaultSession();
        if (!v.data.session.scrolls) v.data.session.scrolls = {};
        if (!v.data.session.lastTool) v.data.session.lastTool = {};
        if (typeof v.data.session.zoom !== 'number') v.data.session.zoom = 1;
        v.data.settings = normalizeSettings(v.data.settings);
        v.data.history = normalizeHistoryMap(v.data.history);
        v.data.trash = purgeExpiredTrash(v.data.trash, v.data.history);
        // Drop history entries for boards that no longer exist and are not in trash
        const liveIds = Object.create(null);
        (v.data.boards || []).forEach(function (b) { if (b && b.id) liveIds[b.id] = true; });
        (v.data.trash || []).forEach(function (t) {
          if (t && t.board && t.board.id) liveIds[t.board.id] = true;
        });
        Object.keys(v.data.history).forEach(function (id) {
          if (!liveIds[id]) delete v.data.history[id];
        });
        return { store: v.data, recovery: null };
      }
      const rec = quarantineCorrupt(rawStr, v.reason);
      return { store: defaultStore(), recovery: rec };
    }

    const legacy = loadRaw(STORAGE_KEY_LEGACY);
    if (legacy) {
      const migrated = migrateLegacy(legacy);
      if (migrated) {
        const ok = validateStore(migrated);
        if (ok.ok) {
          saveRaw(STORAGE_KEY, migrated);
          return { store: migrated, recovery: null };
        }
      }
    }
    return { store: defaultStore(), recovery: null };
  }

  // =========================================================================
  // Template registry
  // =========================================================================
  /**
   * Template contract:
   *   id, name, description?, kind? ('raster'|'text'|'other')
   *   create(ctx) -> instance
   * Instance:
   *   mount(el), unmount(), getState(), setState(s), renderTools(el)
   *   Optional: undo(), redo(), canUndo(), canRedo(),
   *             exportPng() -> dataUrl|null, exportText() -> string|null
   * ctx: onChange(), setStatus(msg, kind?)
   */
  const TemplateRegistry = {
    _map: Object.create(null),
    register: function (t) {
      if (!t || !t.id || typeof t.create !== 'function') throw new Error('Invalid template');
      this._map[t.id] = t;
    },
    get: function (id) { return this._map[id] || null; },
    list: function () {
      const self = this;
      return Object.keys(this._map).map(function (k) { return self._map[k]; });
    }
  };

  // =========================================================================
  // Modal helper
  // =========================================================================
  function showModal(opts) {
    return new Promise(function (resolve) {
      const backdrop = document.createElement('div');
      backdrop.className = 'modal-backdrop';
      backdrop.setAttribute('role', 'dialog');
      backdrop.setAttribute('aria-modal', 'true');

      const modal = document.createElement('div');
      modal.className = 'modal';
      const h2 = document.createElement('h2');
      h2.textContent = opts.title || 'Dialog';
      modal.appendChild(h2);
      if (opts.subtitle) {
        const p = document.createElement('p');
        p.className = 'sub';
        p.textContent = opts.subtitle;
        modal.appendChild(p);
      }

      const fields = opts.fields || [];
      const values = {};
      fields.forEach(function (f) {
        const wrap = document.createElement('div');
        wrap.className = 'field';
        const lab = document.createElement('label');
        lab.textContent = f.label;
        wrap.appendChild(lab);
        if (f.type === 'template-picker') {
          const grid = document.createElement('div');
          grid.className = 'template-picker';
          values[f.name] = f.value || (f.options[0] && f.options[0].id);
          f.options.forEach(function (opt) {
            const b = document.createElement('button');
            b.type = 'button';
            b.className = opt.id === values[f.name] ? 'active' : '';
            b.innerHTML = '<strong></strong><span></span>';
            b.querySelector('strong').textContent = opt.name;
            b.querySelector('span').textContent = opt.description || '';
            b.addEventListener('click', function () {
              values[f.name] = opt.id;
              grid.querySelectorAll('button').forEach(function (x) { x.classList.remove('active'); });
              b.classList.add('active');
            });
            grid.appendChild(b);
          });
          wrap.appendChild(grid);
        } else {
          const input = document.createElement(f.type === 'select' ? 'select' : 'input');
          if (f.type !== 'select') {
            input.type = f.type || 'text';
            input.value = f.value || '';
          } else {
            (f.options || []).forEach(function (opt) {
              const o = document.createElement('option');
              o.value = opt.id;
              o.textContent = opt.name;
              if (opt.id === f.value) o.selected = true;
              input.appendChild(o);
            });
          }
          input.id = 'modal-field-' + f.name;
          wrap.appendChild(input);
          values[f.name] = function () { return input.value; };
        }
        modal.appendChild(wrap);
      });

      const actions = document.createElement('div');
      actions.className = 'modal-actions';
      const cancel = document.createElement('button');
      cancel.type = 'button';
      cancel.textContent = opts.cancelLabel || 'Cancel';
      cancel.addEventListener('click', close.bind(null, null));
      const ok = document.createElement('button');
      ok.type = 'button';
      ok.className = opts.danger ? 'danger active' : 'active';
      ok.textContent = opts.okLabel || 'OK';
      ok.addEventListener('click', function () {
        const out = {};
        fields.forEach(function (f) {
          out[f.name] = typeof values[f.name] === 'function' ? values[f.name]() : values[f.name];
        });
        close(out);
      });
      actions.appendChild(cancel);
      actions.appendChild(ok);
      modal.appendChild(actions);
      backdrop.appendChild(modal);

      function onKey(e) {
        if (e.key === 'Escape') close(null);
        if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') {
          e.preventDefault();
          ok.click();
        }
      }
      function close(result) {
        document.removeEventListener('keydown', onKey);
        backdrop.remove();
        resolve(result);
      }
      backdrop.addEventListener('click', function (e) {
        if (e.target === backdrop) close(null);
      });
      document.addEventListener('keydown', onKey);
      document.body.appendChild(backdrop);
      const first = modal.querySelector('input, select, button.active');
      if (first && first.focus) setTimeout(function () { first.focus(); first.select && first.select(); }, 30);
    });
  }

          if (e.target === workspace) workspace.classList.remove('drop-target');

      });
      searchInput.addEventListener('focus', function () {
        if (searchInput.value.trim()) self.runSearch(searchInput.value);
      });
      searchInput.addEventListener('keydown', function (e) {
        const results = document.getElementById('search-results');
        const items = results.querySelectorAll('.search-result');
        if (e.key === 'Escape') {
          searchInput.blur();
          searchWrap.classList.remove('open');
          return;
        }
        if (e.key === 'ArrowDown' && items.length) {
          e.preventDefault();
          self._searchActiveIndex = Math.min(items.length - 1, self._searchActiveIndex + 1);
          self.highlightSearchIndex(items);
        } else if (e.key === 'ArrowUp' && items.length) {
          e.preventDefault();
          self._searchActiveIndex = Math.max(0, self._searchActiveIndex - 1);
          self.highlightSearchIndex(items);
        } else if (e.key === 'Enter' && items.length) {
          e.preventDefault();
          const idx = self._searchActiveIndex >= 0 ? self._searchActiveIndex : 0;
          const btn = items[idx];
          if (btn) btn.click();
        }
      });
      document.getElementById('search-results').addEventListener('mousedown', function (e) {
        // Prevent input blur before click
        e.preventDefault();
      });

      document.addEventListener('click', function (e) {
        self.closeMenus();
        if (!searchWrap.contains(e.target)) searchWrap.classList.remove('open');
      });
    },

    // ----- Quota meter -----
    updateQuotaMeter: function () {
      const el = document.getElementById('quota-meter');
      const fill = document.getElementById('quota-fill');
      const label = document.getElementById('quota-label');
      if (!el || !fill || !label) return;
      const used = estimateLocalStorageBytes();
      const pct = Math.min(100, Math.round((used / STORAGE_QUOTA_ESTIMATE) * 100));
      fill.style.width = pct + '%';
      label.textContent = pct + '%';
      el.classList.remove('warn', 'danger');
      if (pct >= 85) el.classList.add('danger');
      else if (pct >= 60) el.classList.add('warn');
      const kb = Math.round(used / 1024);
      el.title = 'localStorage ≈ ' + kb + ' KB used (of ~' + Math.round(STORAGE_QUOTA_ESTIMATE / 1024) + ' KB estimate)';
    },

    // ----- Zoom / session -----
    setZoom: function (z) {
      z = Math.round(Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, z)) * 100) / 100;
      this.applyZoom(z, false);
      this.scheduleSave();
    },

    applyZoom: function (z, skipSave) {
      z = typeof z === 'number' && isFinite(z) ? z : 1;
      z = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, z));
      if (!this.store.session) this.store.session = defaultSession();
      this.store.session.zoom = z;
      const root = document.getElementById('board-root');
      if (root) {
        if (Math.abs(z - 1) < 0.001) {
          root.style.transform = '';
          root.classList.remove('zoomed');
        } else {
          root.style.transform = 'scale(' + z + ')';
          root.style.width = (100 / z) + '%';
          root.style.height = (100 / z) + '%';
          root.classList.add('zoomed');
        }
      }
      const label = document.getElementById('zoom-label');
      if (label) label.textContent = Math.round(z * 100) + '%';
      if (!skipSave) { /* caller schedules save when needed */ }
    },

    captureScroll: function () {
      if (!this.currentBoardId) return;
      if (!this.store.session) this.store.session = defaultSession();
      if (!this.store.session.scrolls) this.store.session.scrolls = {};
      const scroller = this.findScrollContainer();
      if (scroller) {
        this.store.session.scrolls[this.currentBoardId] = {
          left: scroller.scrollLeft || 0,
          top: scroller.scrollTop || 0
        };
      }
      // Capture last tool from instance state
      if (this.instance && typeof this.instance.getState === 'function') {
        try {
          const st = this.instance.getState();
          if (!this.store.session.lastTool) this.store.session.lastTool = {};
          const board = this.currentBoard();
          if (board) {
            if (board.templateId === 'paint') {
              this.store.session.lastTool.paint = { color: st.color, sizeId: st.sizeId };
            } else if (board.templateId === 'snip') {
              this.store.session.lastTool.snip = { tool: st.tool, strokeColor: st.strokeColor };
            }
          }
        } catch (_) {}
      }
    },

    findScrollContainer: function () {
      const root = document.getElementById('board-root');
      if (!root) return null;
      return (
        root.querySelector('.notepad-board') ||
        root.querySelector('.snip-stage') ||
        root.querySelector('.wordpad-editor-wrap') ||
        null
      );
    },

    restoreScroll: function (boardId) {
      const self = this;
      const entry = this.store.session && this.store.session.scrolls && this.store.session.scrolls[boardId];
      if (!entry) return;
      // Retry a few frames — mount may not have laid out yet
      let tries = 0;
      const apply = function () {
        const scroller = self.findScrollContainer();
        if (!scroller) {
          if (tries++ < 12) requestAnimationFrame(apply);
          return;
        }
        scroller.scrollLeft = entry.left || 0;
        scroller.scrollTop = entry.top || 0;
      };
      requestAnimationFrame(function () { requestAnimationFrame(apply); });
    },

    // ----- Multi-tab -----
    onRemoteStorageChange: function (newValue) {
      if (this._saving) return;
      // Ignore if we just wrote (race) — storage events shouldn't fire for same tab, but be safe
      this._remotePending = newValue;
      this._remoteDismissed = false;
      const banner = document.getElementById('tab-banner');
      if (banner) banner.classList.add('visible');
      this.setStatus('Another tab saved changes', 'error');
    },

    dismissRemoteWarning: function (keepEditing) {
      const banner = document.getElementById('tab-banner');
      if (banner) banner.classList.remove('visible');
      if (keepEditing) {
        this._remoteDismissed = true;
        this.setStatus('Overwriting other tab’s save…');
        this.flushSave({ forceOverwrite: true });
      } else {
        this._remotePending = null;
        this._remoteDismissed = false;
      }
    },

    reloadFromRemote: function () {
      if (!this._remotePending) {
        this.dismissRemoteWarning(false);
        return;
      }
      let parsed;
      try {
        parsed = JSON.parse(this._remotePending);
      } catch (e) {
        this.setStatus('Other tab data unreadable', 'error');
        return;
      }
      const v = validateStore(parsed);
      if (!v.ok) {
        this.setStatus('Other tab data failed validation (' + v.reason + ')', 'error');
        return;
      }
      this.snapshotCurrent();
      // Replace local store with remote
      if (!v.data.session) v.data.session = defaultSession();
      this.store = v.data;
      this._remotePending = null;
      this._remoteDismissed = false;
      this.dismissRemoteWarning(false);
      this.applyTheme(this.store.theme || 'light', true);
      this.applyZoom((this.store.session && this.store.session.zoom) || 1, true);
      const board = this.getBoard(this.store.currentBoardId) || this.store.boards[0];
      if (board) this.openBoard(board.id, { force: true, silent: true, restoreSession: true });
      this.refreshBoardSelect();
      this.updateQuotaMeter();
      this.setStatus('Synced from other tab', 'saved');
    },

    // ----- Corrupt recovery -----
    showRecoveryBanner: function (rec) {
      const banner = document.getElementById('recovery-banner');
      const msg = document.getElementById('recovery-msg');
      if (!banner) return;
      if (msg) {
        msg.textContent = 'Saved data was unreadable (' + (rec.reason || 'unknown') +
          ') and was quarantined. Starting with a clean board. You can download the raw data.';
      }
      banner.classList.add('visible');
    },

    exportQuarantine: function () {
      let rec = this._recovery;
      if (!rec) {
        try {
          rec = JSON.parse(localStorage.getItem(STORAGE_KEY_QUARANTINE) || 'null');
        } catch (_) { rec = null; }
      }
      if (!rec) {
        this.setStatus('No quarantined data found', 'error');
        return;
      }
      downloadText(
        'whiteboard-quarantine-' + (rec.quarantinedAt || 'unknown').replace(/[:.]/g, '-') + '.json',
        JSON.stringify(rec, null, 2),
        'application/json'
      );
      this.setStatus('Downloaded quarantined data');
    },

    // ----- Global search -----
    runSearch: function (query) {
      const wrap = document.getElementById('search-wrap');
      const box = document.getElementById('search-results');
      const q = (query || '').trim().toLowerCase();
      this._searchActiveIndex = -1;
      if (!q) {
        wrap.classList.remove('open');
        box.innerHTML = '';
        return;
      }
      this.snapshotCurrent();
      const results = this.searchAll(q);
      box.innerHTML = '';
      if (!results.length) {
        box.innerHTML = '<div class="search-empty">No matches</div>';
        wrap.classList.add('open');
        return;
      }
      const self = this;
      results.slice(0, 40).forEach(function (r, i) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'search-result';
        btn.setAttribute('role', 'option');
        btn.dataset.index = String(i);
        btn.innerHTML =
          '<div class="sr-title"></div>' +
          '<div class="sr-meta"></div>' +
          (r.preview ? '<div class="sr-preview"></div>' : '');
        btn.querySelector('.sr-title').textContent = r.title;
        btn.querySelector('.sr-meta').textContent = r.meta;
        if (r.preview) btn.querySelector('.sr-preview').textContent = r.preview;
        btn.addEventListener('click', function () {
          self.jumpToSearchResult(r);
        });
        box.appendChild(btn);
      });
      wrap.classList.add('open');
    },

    highlightSearchIndex: function (items) {
      items.forEach(function (el, i) {
        el.classList.toggle('active', i === App._searchActiveIndex);
      });
      const active = items[this._searchActiveIndex];
      if (active && active.scrollIntoView) active.scrollIntoView({ block: 'nearest' });
    },

    searchAll: function (q) {
      const results = [];
      const boards = (this.store && this.store.boards) || [];
      boards.forEach(function (board) {
        if (!board) return;
        const tpl = TemplateRegistry.get(board.templateId);
        const tname = tpl ? tpl.name : board.templateId;
        if ((board.name || '').toLowerCase().indexOf(q) !== -1) {
          results.push({
            kind: 'board-name',
            boardId: board.id,
            title: board.name,
            meta: tname + ' · board name',
            preview: ''
          });
        }
        const state = board.state || {};
        if (board.templateId === 'notepad' && Array.isArray(state.notes)) {
          state.notes.forEach(function (n) {
            const text = (n && n.text) || '';
            if (text.toLowerCase().indexOf(q) !== -1) {
              results.push({
                kind: 'note',
                boardId: board.id,
                noteId: n.id,
                title: board.name,
                meta: tname + ' · sticky note',
                preview: text.slice(0, 120)
              });
            }
          });
        }
        if (board.templateId === 'wordpad' && typeof state.html === 'string') {
          const plain = stripHtmlToText(state.html);
          if (plain.toLowerCase().indexOf(q) !== -1) {
            const idx = plain.toLowerCase().indexOf(q);
            const start = Math.max(0, idx - 30);
            results.push({
              kind: 'wordpad',
              boardId: board.id,
              title: board.name,
              meta: tname + ' · document',
              preview: (start > 0 ? '…' : '') + plain.slice(start, start + 120)
            });
          }
        }
        if (board.templateId === 'snip') {
          const layers = Array.isArray(state.textLayers) ? state.textLayers : [];
          layers.forEach(function (layer, li) {
            const text = (layer && layer.text) || '';
            if (text.toLowerCase().indexOf(q) !== -1) {
              results.push({
                kind: 'annotate-text',
                boardId: board.id,
                layerIndex: li,
                title: board.name,
                meta: tname + ' · text label',
                preview: text.slice(0, 120)
              });
            }
          });
        }
        if (board.templateId === 'kanban' && state.cards && typeof state.cards === 'object') {
          Object.keys(state.cards).forEach(function (cid) {
            const card = state.cards[cid];
            const text = (card && card.text) || '';
            if (text.toLowerCase().indexOf(q) !== -1) {
              results.push({
                kind: 'kanban-card',
                boardId: board.id,
                cardId: cid,
                title: board.name,
                meta: tname + ' · card',
                preview: text.slice(0, 120)
              });
            }
          });
        }
      });
      return results;
    },

    jumpToSearchResult: function (r) {
      const self = this;
      document.getElementById('search-wrap').classList.remove('open');
      document.getElementById('global-search').value = '';
      const afterOpen = function () {
        if (r.kind === 'note' && r.noteId) {
          // Highlight sticky note
          setTimeout(function () {
            const el = document.querySelector('.sticky-note[data-id="' + CSS.escape(r.noteId) + '"]');
            if (el) {
              el.classList.add('search-hit', 'selected');
              el.scrollIntoView({ block: 'center', inline: 'center', behavior: 'smooth' });
              const ta = el.querySelector('.note-body');
              if (ta) ta.focus();
              setTimeout(function () { el.classList.remove('search-hit'); }, 2500);
            }
          }, 200);
        } else if (r.kind === 'wordpad') {
          setTimeout(function () {
            const ed = document.querySelector('.wordpad-editor');
            if (ed) {
              ed.focus();
              ed.scrollIntoView({ block: 'nearest' });
            }
          }, 200);
        } else if (r.kind === 'kanban-card' && r.cardId) {
          setTimeout(function () {
            const el = document.querySelector('.kanban-card[data-id="' + CSS.escape(r.cardId) + '"]');
            if (el) {
              el.classList.add('search-hit');
              el.scrollIntoView({ block: 'center', inline: 'nearest', behavior: 'smooth' });
              const ta = el.querySelector('textarea');
              if (ta) ta.focus();
              setTimeout(function () { el.classList.remove('search-hit'); }, 2500);
            }
          }, 200);
        }
        self.setStatus('Jumped to “' + r.title + '”');
      };
      if (r.boardId === this.currentBoardId && this.instance) {
        afterOpen();
      } else {
        this.openBoard(r.boardId, { restoreSession: true });
        setTimeout(afterOpen, 160);
      }
    },

    toggleMenu: function (wrapId) {
      const wrap = document.getElementById(wrapId);
      const wasOpen = wrap.classList.contains('open');
      this.closeMenus();
      if (!wasOpen) {
        wrap.classList.add('open');
        const btn = wrap.querySelector('button');
        if (btn) btn.setAttribute('aria-expanded', 'true');
      }
    },

    closeMenus: function () {
      document.querySelectorAll('.menu-wrap.open').forEach(function (w) {
        w.classList.remove('open');
        const btn = w.querySelector('button');
        if (btn) btn.setAttribute('aria-expanded', 'false');
      });
    },

    applyTheme: function (theme, skipSave) {
      theme = theme === 'dark' ? 'dark' : 'light';
      this.store.theme = theme;
      document.documentElement.setAttribute('data-theme', theme);
      const btn = document.getElementById('btn-theme');
      if (btn) btn.title = theme === 'dark' ? 'Switch to light theme' : 'Switch to dark theme';
      if (!skipSave) this.scheduleSave();
    },

    getBoard: function (id) {
      return this.store.boards.find(function (b) { return b.id === id; }) || null;
    },

    currentBoard: function () {
      return this.getBoard(this.currentBoardId);
    },

    snapshotCurrent: function () {
      this.captureScroll();
      if (this.instance && this.currentBoardId) {
        const board = this.getBoard(this.currentBoardId);
        if (board) {
          try {
            board.state = this.instance.getState();
            board.updatedAt = new Date().toISOString();
          } catch (e) {
            console.warn('getState failed', e);
          }
        }
      }
    },

    refreshBoardSelect: function () {
      const sel = document.getElementById('board-select');
      const cur = this.currentBoardId;
      sel.innerHTML = '';
      this.store.boards.forEach(function (b) {
        const opt = document.createElement('option');
        opt.value = b.id;
        const tpl = TemplateRegistry.get(b.templateId);
        const tname = tpl ? tpl.name : b.templateId;
        opt.textContent = b.name + ' (' + tname + ')';
        if (b.id === cur) opt.selected = true;
        sel.appendChild(opt);
      });
      const board = this.getBoard(cur);
      const badge = document.getElementById('type-badge');
      if (board) {
        const tpl = TemplateRegistry.get(board.templateId);
        badge.textContent = tpl ? tpl.name : board.templateId;
      } else {
        badge.textContent = '—';
      }
    },

    openBoard: function (id, opts) {
      opts = opts || {};
      const board = this.getBoard(id);
      if (!board) {
        this.setStatus('Board not found', 'error');
        return;
      }
      if (id === this.currentBoardId && this.instance && !opts.force) return;

      // skipSnapshot: used when board.state was just set externally (e.g. time-machine restore)
      if (!opts.skipSnapshot) this.snapshotCurrent();

      const root = document.getElementById('board-root');
      root.classList.add('switching');

      const self = this;
      const doMount = function () {
        if (self.instance) {
          try { self.instance.unmount(); } catch (e) { console.warn(e); }
          self.instance = null;
        }
        root.innerHTML = '';
        // Preserve zoom class/transform applied via applyZoom
        root.className = '';
        if ((self.store.session && self.store.session.zoom || 1) !== 1) {
          root.classList.add('zoomed');
        }
        document.getElementById('template-tools').innerHTML = '';
        // Re-apply zoom sizing after class reset
        self.applyZoom((self.store.session && self.store.session.zoom) || 1, true);

        const template = TemplateRegistry.get(board.templateId);
        if (!template) {
          root.innerHTML = '<div class="empty-hint"><strong>Unknown template</strong><div>' + board.templateId + '</div></div>';
          self.currentBoardId = board.id;
          self.store.currentBoardId = board.id;
          self.refreshBoardSelect();
          root.classList.remove('switching');
          self.setStatus('Unknown template: ' + board.templateId, 'error');
          return;
        }

        const ctx = {
          onChange: function () {
            self.scheduleSave();
            self.refreshTagBar();
          },
          setStatus: function (msg, kind) { self.setStatus(msg, kind); },
          getSettings: function () {
            return self.store.settings || defaultSettings();
          },
          getAutoColorRules: function () {
            const s = self.store.settings || defaultSettings();
            return s.autoColorRules || defaultAutoColorRules();
          },
          getTagFilter: function () { return self.activeTagFilter; },
          onTagsMaybeChanged: function () { self.refreshTagBar(); },
          sendStickyToKanban: function (note) { self.promptSendStickyToKanban(note); },
          promoteNotepadBoardToKanban: function () { self.promoteNotepadBoardToKanban(); }
        };
        const instance = template.create(ctx);

        // Merge session last-tool into board state for restore
        let stateToApply = board.state ? Object.assign({}, board.state) : {};
        if (opts.restoreSession && self.store.session && self.store.session.lastTool) {
          const lt = self.store.session.lastTool;
          if (board.templateId === 'paint' && lt.paint) {
            if (lt.paint.color) stateToApply.color = lt.paint.color;
            if (lt.paint.sizeId) stateToApply.sizeId = lt.paint.sizeId;
          }
          if (board.templateId === 'snip' && lt.snip) {
            if (lt.snip.tool) stateToApply.tool = lt.snip.tool;
            if (lt.snip.strokeColor) stateToApply.strokeColor = lt.snip.strokeColor;
          }
        }
        // Prefer board.state tools (already in state) over session — board.state wins when present
        if (board.state) {
          if (board.templateId === 'paint') {
            if (board.state.color) stateToApply.color = board.state.color;
            if (board.state.sizeId) stateToApply.sizeId = board.state.sizeId;
            if (board.state.imageDataUrl) stateToApply.imageDataUrl = board.state.imageDataUrl;
          } else if (board.templateId === 'snip') {
            if (board.state.tool) stateToApply.tool = board.state.tool;
            if (board.state.strokeColor) stateToApply.strokeColor = board.state.strokeColor;
            if (board.state.imageDataUrl) stateToApply.imageDataUrl = board.state.imageDataUrl;
            if (board.state.textLayers) stateToApply.textLayers = board.state.textLayers;
          } else {
            stateToApply = board.state;
          }
        }

        try { instance.setState(stateToApply); } catch (e) { console.warn(e); }
        instance.mount(root);
        if (typeof instance.renderTools === 'function') {
          instance.renderTools(document.getElementById('template-tools'));
        }
        self.instance = instance;
        self.currentBoardId = board.id;
        self.store.currentBoardId = board.id;
        self.refreshBoardSelect();
        requestAnimationFrame(function () {
          root.classList.remove('switching');
          if (opts.restoreSession !== false) {
            self.restoreScroll(board.id);
          }
          self.refreshTagBar();
          // Re-apply active tag filter to the newly mounted board
          if (self.activeTagFilter && self.instance && typeof self.instance.applyTagFilter === 'function') {
            self.instance.applyTagFilter(self.activeTagFilter);
          }
        });
        if (!opts.silent) self.setStatus('Opened “' + board.name + '”');
        self.scheduleSave();
      };

      setTimeout(doMount, 90);
    },

    promptNewBoard: async function () {
      const templates = TemplateRegistry.list();
      const result = await showModal({
        title: 'New board',
        subtitle: 'Choose a name and board type. Type is fixed for this board.',
        okLabel: 'Create',
        fields: [
          { name: 'name', label: 'Name', value: 'Untitled board' },
          {
            name: 'templateId',
            label: 'Type',
            type: 'template-picker',
            value: 'paint',
            options: templates.map(function (t) {
              return { id: t.id, name: t.name, description: t.description || '' };
            })
          }
        ]
      });
      if (!result) return;
      const name = (result.name || '').trim() || 'Untitled board';
      const templateId = result.templateId;
      if (!TemplateRegistry.get(templateId)) {
        this.setStatus('Invalid template', 'error');
        return;
      }
      const board = {
        id: uid('board'),
        name: name,
        templateId: templateId,
        state: {},
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString()
      };
      this.store.boards.push(board);
      this.openBoard(board.id);
      this.setStatus('Created “' + name + '”');
    },

    promptRename: async function () {
      const board = this.currentBoard();
      if (!board) return;
      const result = await showModal({
        title: 'Rename board',
        okLabel: 'Rename',
        fields: [{ name: 'name', label: 'Name', value: board.name }]
      });
      if (!result) return;
      const name = (result.name || '').trim();
      if (!name) return;
      board.name = name;
      board.updatedAt = new Date().toISOString();
      this.refreshBoardSelect();
      this.scheduleSave();
      this.setStatus('Renamed to “' + name + '”');
    },

    duplicateBoard: function () {
      this.snapshotCurrent();
      const board = this.currentBoard();
      if (!board) return;
      const copy = {
        id: uid('board'),
        name: board.name + ' copy',
        templateId: board.templateId,
        state: JSON.parse(JSON.stringify(board.state || {})),
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString()
      };
      this.store.boards.push(copy);
      this.openBoard(copy.id);
      this.setStatus('Duplicated board');
    },

    deleteBoard: async function () {
      const board = this.currentBoard();
      if (!board) return;
      if (this.store.boards.length <= 1) {
        this.setStatus('Cannot delete the only board', 'error');
        return;
      }
      const result = await showModal({
        title: 'Move board to trash?',
        subtitle: '“' + board.name + '” will move to Trash (recoverable for 7 days). It is not permanently deleted yet.',
        okLabel: 'Move to trash',
        danger: true,
        fields: []
      });
      if (result === null) return;

      this.snapshotCurrent();
      // Capture one history snapshot before trash so restore can still use time machine later
      this.recordHistorySnapshot(board, { force: true, reason: 'pre-trash' });

      const id = board.id;
      const boardCopy = deepClone(board);
      if (!Array.isArray(this.store.trash)) this.store.trash = [];
      this.store.trash.unshift({
        deletedAt: new Date().toISOString(),
        board: boardCopy
      });
      // Cap trash list size loosely (age purge is primary)
      if (this.store.trash.length > 40) this.store.trash = this.store.trash.slice(0, 40);

      if (this.instance) {
        try { this.instance.unmount(); } catch (_) {}
        this.instance = null;
      }
      this.store.boards = this.store.boards.filter(function (b) { return b.id !== id; });
      this.currentBoardId = null;
      const next = this.store.boards[0];
      this.openBoard(next.id, { force: true });
      this.scheduleSave();
      this.setStatus('Moved “' + boardCopy.name + '” to trash');
    },

    // ----- Time machine (Tier 5) -----
    getBoardHistory: function (boardId) {
      if (!this.store.history) this.store.history = {};
      const arr = this.store.history[boardId];
      return Array.isArray(arr) ? arr : [];
    },

    /**
     * Record a history snapshot for a board if force or (interval elapsed + fingerprint changed).
     * History is newest-first, capped at HISTORY_MAX_SNAPSHOTS.
     */
    recordHistorySnapshot: function (board, opts) {
      opts = opts || {};
      if (!board || !board.id) return null;
      this.snapshotCurrent();
      // Refresh board ref after snapshot
      board = this.getBoard(board.id) || board;
      const fp = contentFingerprint(board);
      const meta = this._historyMeta[board.id] || { at: 0, fingerprint: '' };
      const now = Date.now();
      if (!opts.force) {
        if (fp === meta.fingerprint) return null;
        if (meta.at && (now - meta.at) < HISTORY_MIN_INTERVAL_MS) return null;
      } else {
        // Even forced: skip exact duplicate of latest
        const hist = this.getBoardHistory(board.id);
        if (hist[0] && hist[0].fingerprint === fp) return null;
      }

      const snap = {
        id: uid('snap'),
        at: new Date().toISOString(),
        fingerprint: fp,
        templateId: board.templateId,
        name: board.name,
        state: deepClone(board.state || {}),
        summary: summarizeBoardContent(board.templateId, board.state, board.name),
        reason: opts.reason || 'auto'
      };
      if (!this.store.history) this.store.history = {};
      const list = this.getBoardHistory(board.id).slice();
      list.unshift(snap);
      while (list.length > HISTORY_MAX_SNAPSHOTS) list.pop();
      this.store.history[board.id] = list;
      this._historyMeta[board.id] = { at: now, fingerprint: fp };
      return snap;
    },

    maybeRecordHistoryOnSave: function () {
      const board = this.currentBoard();
      if (!board) return;
      this.recordHistorySnapshot(board, { force: false, reason: 'auto' });
    },

    restoreBoardSnapshot: function (boardId, snapshotId) {
      const board = this.getBoard(boardId);
      if (!board) {
        this.setStatus('Board not found', 'error');
        return false;
      }
      const list = this.getBoardHistory(boardId);
      const snap = list.find(function (s) { return s.id === snapshotId; });
      if (!snap) {
        this.setStatus('Snapshot not found', 'error');
        return false;
      }
      // Safety: snapshot current (pre-restore) so restore can be undone via time machine
      this.snapshotCurrent();
      this.recordHistorySnapshot(board, { force: true, reason: 'pre-restore' });

      // Unmount live instance so it cannot write over restored state
      if (this.instance && this.currentBoardId === boardId) {
        try { this.instance.unmount(); } catch (_) {}
        this.instance = null;
        this.currentBoardId = null;
      }

      board.state = deepClone(snap.state || {});
      board.updatedAt = new Date().toISOString();
      // Keep board name as-is (restore content only)
      this.openBoard(board.id, { force: true, skipSnapshot: true });
      this.scheduleSave();
      this.setStatus('Restored snapshot from ' + formatRelativeTime(snap.at));
      return true;
    },

    showHistoryPicker: function () {
      const self = this;
      this.snapshotCurrent();
      const board = this.currentBoard();
      if (!board) return;
      // Opportunistic snapshot of current before viewing (force if content changed)
      this.recordHistorySnapshot(board, { force: true, reason: 'open-picker' });

      const list = this.getBoardHistory(board.id);
      return new Promise(function (resolve) {
        const backdrop = document.createElement('div');
        backdrop.className = 'modal-backdrop';
        backdrop.setAttribute('role', 'dialog');
        backdrop.setAttribute('aria-modal', 'true');
        const modal = document.createElement('div');
        modal.className = 'modal wide-modal';
        modal.innerHTML =
          '<h2>Time machine</h2>' +
          '<p class="sub">Last ' + HISTORY_MAX_SNAPSHOTS + ' snapshots for “' +
          (board.name || 'board').replace(/</g, '') +
          '”. Restoring saves the current state first so you can undo.</p>' +
          '<div class="history-list" id="history-list"></div>' +
          '<div class="modal-actions"><button type="button" class="active" id="history-close">Close</button></div>';
        backdrop.appendChild(modal);
        const listEl = modal.querySelector('#history-list');

        function render() {
          const snaps = self.getBoardHistory(board.id);
          listEl.innerHTML = '';
          if (!snaps.length) {
            listEl.innerHTML = '<div class="history-empty">No snapshots yet. Edit this board and wait a couple of minutes, or reopen this panel after changes.</div>';
            return;
          }
          snaps.forEach(function (snap) {
            const row = document.createElement('div');
            row.className = 'history-item';
            row.setAttribute('role', 'button');
            row.tabIndex = 0;
            row.dataset.snapId = snap.id;
            row.innerHTML =
              '<div class="hi-main">' +
              '<div class="hi-time"></div>' +
              '<div class="hi-summary"></div>' +
              '</div>' +
              '<div class="hi-actions"><button type="button" class="active hi-restore">Restore</button></div>';
            row.querySelector('.hi-time').textContent =
              formatRelativeTime(snap.at) + ' · ' + new Date(snap.at).toLocaleString() +
              (snap.reason === 'pre-restore' ? ' · before restore' : '') +
              (snap.reason === 'pre-trash' ? ' · before trash' : '');
            row.querySelector('.hi-summary').textContent = snap.summary || '(no summary)';
            const doRestore = function (e) {
              if (e) e.stopPropagation();
              // Confirm via second step
              showModal({
                title: 'Restore this snapshot?',
                subtitle: 'Current board content will be saved as a new snapshot first, then replaced with: ' +
                  (snap.summary || snap.at),
                okLabel: 'Restore',
                fields: []
              }).then(function (ok) {
                if (ok === null) return;
                self.restoreBoardSnapshot(board.id, snap.id);
                close();
              });
            };
            row.querySelector('.hi-restore').addEventListener('click', doRestore);
            row.addEventListener('dblclick', doRestore);
            listEl.appendChild(row);
          });
        }

        function close() {
          document.removeEventListener('keydown', onKey);
          backdrop.remove();
          resolve();
        }
        function onKey(e) { if (e.key === 'Escape') close(); }
        modal.querySelector('#history-close').addEventListener('click', close);
        backdrop.addEventListener('click', function (e) { if (e.target === backdrop) close(); });
        document.addEventListener('keydown', onKey);
        document.body.appendChild(backdrop);
        render();
        modal.querySelector('#history-close').focus();
      });
    },

    // ----- Trash (Tier 5) -----
    showTrashView: function () {
      const self = this;
      this.store.trash = purgeExpiredTrash(this.store.trash || [], this.store.history);
      return new Promise(function (resolve) {
        const backdrop = document.createElement('div');
        backdrop.className = 'modal-backdrop';
        backdrop.setAttribute('role', 'dialog');
        backdrop.setAttribute('aria-modal', 'true');
        const modal = document.createElement('div');
        modal.className = 'modal wide-modal';
        modal.innerHTML =
          '<h2>Trash</h2>' +
          '<p class="sub">Boards stay here for 7 days, then are purged automatically. Restore brings a board back to your library.</p>' +
          '<div class="trash-list" id="trash-list"></div>' +
          '<div class="modal-actions"><button type="button" class="active" id="trash-close">Close</button></div>';
        backdrop.appendChild(modal);
        const listEl = modal.querySelector('#trash-list');

        function render() {
          self.store.trash = purgeExpiredTrash(self.store.trash || [], self.store.history);
          listEl.innerHTML = '';
          if (!self.store.trash.length) {
            listEl.innerHTML = '<div class="trash-empty">Trash is empty.</div>';
            return;
          }
          self.store.trash.forEach(function (entry, idx) {
            const b = entry.board || {};
            const tpl = TemplateRegistry.get(b.templateId);
            const row = document.createElement('div');
            row.className = 'trash-item';
            row.dataset.idx = String(idx);
            row.innerHTML =
              '<div class="ti-main">' +
              '<div class="ti-time"></div>' +
              '<div class="ti-meta"></div>' +
              '</div>' +
              '<div class="ti-actions">' +
              '<button type="button" class="active ti-restore">Restore</button>' +
              '</div>';
            row.querySelector('.ti-time').textContent =
              (b.name || 'Board') + ' · deleted ' + formatRelativeTime(entry.deletedAt);
            row.querySelector('.ti-meta').textContent =
              (tpl ? tpl.name : b.templateId) + ' · ' +
              summarizeBoardContent(b.templateId, b.state, b.name) +
              ' · ' + new Date(entry.deletedAt).toLocaleString();
            row.querySelector('.ti-restore').addEventListener('click', function (e) {
              e.stopPropagation();
              self.restoreFromTrash(idx);
              render();
            });
            listEl.appendChild(row);
          });
        }

        function close() {
          document.removeEventListener('keydown', onKey);
          backdrop.remove();
          self.scheduleSave();
          resolve();
        }
        function onKey(e) { if (e.key === 'Escape') close(); }
        modal.querySelector('#trash-close').addEventListener('click', close);
        backdrop.addEventListener('click', function (e) { if (e.target === backdrop) close(); });
        document.addEventListener('keydown', onKey);
        document.body.appendChild(backdrop);
        render();
        modal.querySelector('#trash-close').focus();
      });
    },

    restoreFromTrash: function (index) {
      if (!Array.isArray(this.store.trash)) return false;
      const entry = this.store.trash[index];
      if (!entry || !entry.board) return false;
      const board = deepClone(entry.board);
      // Ensure unique id if somehow collision (keep original id so history maps)
      if (this.getBoard(board.id)) {
        board.id = uid('board');
      }
      board.updatedAt = new Date().toISOString();
      this.store.boards.push(board);
      this.store.trash.splice(index, 1);
      this.openBoard(board.id, { force: true });
      this.scheduleSave();
      this.setStatus('Restored “' + board.name + '” from trash');
      return true;
    },

    scheduleSave: function () {
      const self = this;
      if (this.saveTimer) clearTimeout(this.saveTimer);
      this.saveTimer = setTimeout(function () { self.flushSave(); }, 400);
    },

    /**
     * Persist store. When remote tab has written and user hasn't reloaded, warn before overwrite.
     * Auto-compresses large paint/annotate PNGs when past soft threshold.
     * opts.sync: skip async compression retries (best-effort for beforeunload)
     */
    flushSave: function (opts) {
      opts = opts || {};
      const self = this;
      if (this.saveTimer) {
        clearTimeout(this.saveTimer);
        this.saveTimer = null;
      }

      // Multi-tab overwrite guard
      if (this._remotePending && !this._remoteDismissed && !opts.forceOverwrite) {
        // Non-blocking for silent autosave: surface banner again; block only if dismissed was false
        // Allow first auto-save attempt to wait for user action via banner
        const banner = document.getElementById('tab-banner');
        if (banner) banner.classList.add('visible');
        // Do not clobber remote data until user dismisses with "Keep editing" or reloads
        this.setStatus('Paused save — another tab has newer data', 'error');
        return Promise.resolve({ ok: false, reason: 'remote-pending' });
      }

      this.snapshotCurrent();
      if (!this.store.session) this.store.session = defaultSession();
      if (!this.store.settings) this.store.settings = defaultSettings();
      if (!Array.isArray(this.store.trash)) this.store.trash = [];
      if (!this.store.history) this.store.history = {};
      this.store.trash = purgeExpiredTrash(this.store.trash, this.store.history);

      // Time machine: opportunistic snapshot when content changed + interval elapsed
      if (!opts.skipHistory) {
        this.maybeRecordHistoryOnSave();
      }

      let payload = {
        version: 2,
        theme: this.store.theme || 'light',
        currentBoardId: this.currentBoardId,
        boards: this.store.boards,
        session: this.store.session,
        settings: this.store.settings,
        trash: this.store.trash,
        history: this.store.history,
        savedAt: new Date().toISOString(),
        writerTabId: TAB_ID
      };

      // Prefer dropping old snapshots before hitting hard quota
      trimHistoryForQuota(payload);

      const writePayload = function (p, note) {
        self._saving = true;
        const result = saveRaw(STORAGE_KEY, p);
        self._lastLocalWriteAt = Date.now();
        if (result.ok) {
          self._remotePending = null;
          self._remoteDismissed = false;
          const banner = document.getElementById('tab-banner');
          if (banner) banner.classList.remove('visible');
          self.store = p;
          self.setStatus(note || 'Saved', 'saved');
        } else {
          self.setStatus('Save failed (storage full?)', 'error');
        }
        setTimeout(function () { self._saving = false; }, 0);
        self.updateQuotaMeter();
        return result;
      };

      const jsonLen = JSON.stringify(payload).length;
      // Fast path
      if (jsonLen <= STORAGE_SOFT_CHARS || opts.sync) {
        const result = writePayload(payload);
        if (result.ok || opts.sync) {
          if (!result.ok && opts.sync) {
            // beforeunload: try drop more history then retry once
            trimHistoryForQuota(payload, STORAGE_SOFT_CHARS * 0.5);
            return Promise.resolve(writePayload(payload, 'Saved (trimmed history)'));
          }
          return Promise.resolve(result);
        }

        // Quota exceeded — trim more snapshots, then compress images
        trimHistoryForQuota(payload, Math.floor(STORAGE_SOFT_CHARS * 0.5));
        return compressStorePayload(payload).then(function (compressed) {
          trimHistoryForQuota(compressed, Math.floor(STORAGE_SOFT_CHARS * 0.4));
          const r2 = writePayload(compressed, 'Saved (compressed + trimmed history)');
          if (!r2.ok) {
            self.setStatus('Save failed after compression — export JSON backup', 'error');
          } else {
            self.store = compressed;
            const cur = self.currentBoard();
            if (cur && self.instance && typeof self.instance.setState === 'function') {
              try { self.instance.setState(cur.state); } catch (_) {}
            }
          }
          return r2;
        });
      }

      // Soft threshold: compress images, then trim snapshots if still large
      return compressStorePayload(payload).then(function (compressed) {
        const before = jsonLen;
        trimHistoryForQuota(compressed);
        const after = JSON.stringify(compressed).length;
        const note = after < before
          ? 'Saved (auto-compressed ' + Math.round((1 - after / before) * 100) + '%)'
          : 'Saved';
        const r = writePayload(compressed, note);
        if (r.ok) {
          self.store = compressed;
          const cur = self.currentBoard();
          if (cur && cur.state && cur.state._compressedEdge && self.instance &&
              typeof self.instance.setState === 'function') {
            try {
              self.instance.setState(cur.state);
            } catch (_) {}
          }
        } else {
          trimHistoryForQuota(compressed, Math.floor(STORAGE_SOFT_CHARS * 0.35));
          const r3 = writePayload(compressed, 'Saved (trimmed history)');
          if (!r3.ok) {
            self.setStatus('Save failed after compression — export JSON backup', 'error');
          }
          return r3;
        }
        return r;
      });
    },

    setStatus: function (msg, kind) {
      const el = document.getElementById('status');
      if (!el) return;
      el.textContent = msg || '';
      el.classList.remove('saved', 'error');
      if (kind === 'saved') el.classList.add('saved');
      if (kind === 'error') el.classList.add('error');
    },

    onGlobalKey: function (e) {
      const mod = e.ctrlKey || e.metaKey;
      const tag = (e.target && e.target.tagName) || '';
      const isField = tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT';

      // Zoom shortcuts
      if (mod && (e.key === '=' || e.key === '+')) {
        e.preventDefault();
        this.setZoom((this.store.session.zoom || 1) + ZOOM_STEP);
        return;
      }
      if (mod && (e.key === '-' || e.key === '_')) {
        e.preventDefault();
        this.setZoom((this.store.session.zoom || 1) - ZOOM_STEP);
        return;
      }
      if (mod && e.key === '0') {
        e.preventDefault();
        this.setZoom(1);
        return;
      }

      // Focus global content search (Ctrl/Cmd+K). Ctrl+F only when not in a text field.
      // Command palette uses Ctrl/Cmd+/ — keep these distinct.
      if (mod && (e.key === 'k' || e.key === 'K' || ((e.key === 'f' || e.key === 'F') && !isField && !e.target.isContentEditable))) {
        e.preventDefault();
        const inp = document.getElementById('global-search');
        if (inp) { inp.focus(); inp.select(); }
        return;
      }

      // Command palette: Ctrl/Cmd+/ (forward slash)
      if (mod && (e.key === '/' || e.code === 'Slash')) {
        e.preventDefault();
        this.openCommandPalette();
        return;
      }

      if (!mod) return;
      // Don't steal keys from plain inputs except we handle undo ourselves for paint

      if (e.key === 'z' || e.key === 'Z') {
        if (isField && !e.target.isContentEditable) return;
        if (!this.instance) return;
        if (e.shiftKey) {
          if (typeof this.instance.redo === 'function' && this.instance.canRedo && this.instance.canRedo()) {
            e.preventDefault();
            this.instance.redo();
            this.scheduleSave();
            this.setStatus('Redo');
          }
        } else {
          if (typeof this.instance.undo === 'function' && this.instance.canUndo && this.instance.canUndo()) {
            e.preventDefault();
            this.instance.undo();
            this.scheduleSave();
            this.setStatus('Undo');
          }
        }
      }
      if ((e.key === 'y' || e.key === 'Y') && this.instance && typeof this.instance.redo === 'function') {
        if (isField && !e.target.isContentEditable) return;
        if (this.instance.canRedo && this.instance.canRedo()) {
          e.preventDefault();
          this.instance.redo();
          this.scheduleSave();
          this.setStatus('Redo');
        }
      }
    },

    exportBoardJson: function (all) {
      this.snapshotCurrent();
      let payload;
      if (all) {
        payload = {
          format: 'whiteboard-export',
          version: 2,
          exportedAt: new Date().toISOString(),
          boards: this.store.boards
        };
        downloadText('whiteboard-all-boards.json', JSON.stringify(payload, null, 2), 'application/json');
        this.setStatus('Exported all boards');
      } else {
        const board = this.currentBoard();
        if (!board) return;
        payload = {
          format: 'whiteboard-export',
          version: 2,
          exportedAt: new Date().toISOString(),
          boards: [board]
        };
        downloadText(safeName(board.name) + '.json', JSON.stringify(payload, null, 2), 'application/json');
        this.setStatus('Exported board JSON');
      }
    },

    importJsonFile: function (file) {
      const self = this;
      const reader = new FileReader();
      reader.onload = function () {
        try {
          const data = JSON.parse(reader.result);
          self.importData(data);
        } catch (e) {
          self.setStatus('Import failed: invalid JSON', 'error');
        }
      };
      reader.onerror = function () { self.setStatus('Import failed: read error', 'error'); };
      reader.readAsText(file);
    },

    importData: function (data) {
      let boards = [];
      if (data && data.format === 'whiteboard-export' && Array.isArray(data.boards)) {
        boards = data.boards;
      } else if (data && data.version === 2 && Array.isArray(data.boards)) {
        boards = data.boards;
      } else if (data && data.version === 1 && data.templates) {
        const m = migrateLegacy(data);
        boards = m ? m.boards : [];
      } else if (data && data.templateId && data.state) {
        boards = [data];
      } else {
        this.setStatus('Import failed: unrecognized format', 'error');
        return;
      }
      if (!boards.length) {
        this.setStatus('Import failed: no boards in file', 'error');
        return;
      }
      this.snapshotCurrent();
      let added = 0;
      const self = this;
      boards.forEach(function (b) {
        if (!b || !b.templateId) return;
        if (!TemplateRegistry.get(b.templateId)) return;
        self.store.boards.push({
          id: uid('board'),
          name: (b.name || 'Imported board') + '',
          templateId: b.templateId,
          state: b.state || {},
          createdAt: b.createdAt || new Date().toISOString(),
          updatedAt: new Date().toISOString()
        });
        added++;
      });
      if (!added) {
        this.setStatus('Import failed: no compatible boards', 'error');
        return;
      }
      const last = this.store.boards[this.store.boards.length - 1];
      this.openBoard(last.id, { force: true });
      this.setStatus('Imported ' + added + ' board' + (added === 1 ? '' : 's'));
    },

    // =========================================================================
    // Smart paste / drop (Tier 3)
    // =========================================================================
    _toastTimer: null,
    _toastToken: 0,

    dismissSmartToast: function (silent) {
      const el = document.getElementById('smart-toast');
      if (el) el.classList.remove('visible');
      if (this._toastTimer) {
        clearTimeout(this._toastTimer);
        this._toastTimer = null;
      }
      this._toastToken++;
    },

    /**
     * Non-blocking toast. actions: [{ label, primary?, run }]
     * Auto-dismisses after SMART_TOAST_MS. One click runs action and closes.
     */
    showSmartToast: function (messageHtml, actions) {
      const self = this;
      this.dismissSmartToast(true);
      const token = ++this._toastToken;
      const el = document.getElementById('smart-toast');
      const msg = document.getElementById('smart-toast-msg');
      const act = document.getElementById('smart-toast-actions');
      if (!el || !msg || !act) return;
      msg.innerHTML = messageHtml;
      act.innerHTML = '';
      (actions || []).forEach(function (a) {
        const b = document.createElement('button');
        b.type = 'button';
        b.textContent = a.label;
        if (a.primary) b.className = 'primary';
        b.addEventListener('click', function (e) {
          e.stopPropagation();
          self.dismissSmartToast(true);
          try { a.run(); } catch (err) { console.warn(err); }
        });
        act.appendChild(b);
      });
      // Always offer dismiss
      const dismiss = document.createElement('button');
      dismiss.type = 'button';
      dismiss.textContent = 'Dismiss';
      dismiss.addEventListener('click', function (e) {
        e.stopPropagation();
        self.dismissSmartToast(true);
      });
      act.appendChild(dismiss);
      el.classList.add('visible');
      this._toastTimer = setTimeout(function () {
        if (self._toastToken === token) self.dismissSmartToast(true);
      }, SMART_TOAST_MS);
    },

    /**
     * Create a board and optionally open it.
     */
    createBoard: function (opts) {
      opts = opts || {};
      const board = {
        id: uid('board'),
        name: opts.name || 'Untitled board',
        templateId: opts.templateId,
        state: opts.state || {},
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString()
      };
      if (!TemplateRegistry.get(board.templateId)) {
        this.setStatus('Unknown template', 'error');
        return null;
      }
      this.snapshotCurrent();
      this.store.boards.push(board);
      this.refreshBoardSelect();
      if (opts.open !== false) {
        this.openBoard(board.id, { force: true, silent: !!opts.silent });
      } else {
        this.scheduleSave();
      }
      return board;
    },

    /** Compress image data URL then open as new Annotate board. */
    createAnnotateFromImage: function (dataUrl, name) {
      const self = this;
      return prepareAnnotateImage(dataUrl).then(function (url) {
        const board = self.createBoard({
          name: name || 'Annotate',
          templateId: 'snip',
          state: {
            tool: 'highlight',
            strokeColor: '#e03131',
            imageDataUrl: url,
            textLayers: []
          },
          open: true
        });
        self.setStatus('Opened Annotate from image');
        return board;
      }).catch(function (err) {
        console.warn(err);
        self.setStatus('Failed to open image', 'error');
        return null;
      });
    },

    createWordpadFromText: function (text, name) {
      const html = textToHtmlParagraphs(text);
      const board = this.createBoard({
        name: name || 'Wordpad',
        templateId: 'wordpad',
        state: { html: html },
        open: true
      });
      this.setStatus('Opened Wordpad from text');
      return board;
    },

    createWordpadFromTable: function (text, delimiter, name) {
      const html = tabularToHtmlTable(text, delimiter || ',');
      const board = this.createBoard({
        name: name || 'Table',
        templateId: 'wordpad',
        state: { html: html },
        open: true
      });
      this.setStatus('Opened Wordpad table');
      return board;
    },

    /**
     * Add sticky (or link card) to current notepad, or create a new notepad board.
     * Tier 2 auto-color / checklist / tags apply via normal note pipeline.
     */
    addStickyFromText: function (text, opts) {
      opts = opts || {};
      this.snapshotCurrent();
      const board = this.currentBoard();
      const note = {
        id: 'n' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 7),
        x: opts.x != null ? opts.x : 40 + (Math.random() * 40 | 0),
        y: opts.y != null ? opts.y : 40 + (Math.random() * 40 | 0),
        w: opts.w || (opts.linkCard ? 220 : 200),
        h: opts.h || (opts.linkCard ? 110 : 180),
        text: text || '',
        color: opts.color || 'yellow',
        colorAuto: opts.linkCard ? false : true,
        linkCard: !!opts.linkCard,
        linkHref: opts.linkHref || null
      };

      if (board && board.templateId === 'notepad' && this.instance && typeof this.instance.addNote === 'function') {
        this.instance.addNote(note);
        this.setStatus(opts.linkCard ? 'Link card added' : 'Sticky note added');
        this.scheduleSave();
        this.refreshTagBar();
        return note;
      }

      // New notepad board with this note
      const nb = this.createBoard({
        name: opts.boardName || (opts.linkCard ? (opts.domain || 'Link') : 'Sticky notes'),
        templateId: 'notepad',
        state: { notes: [note] },
        open: true
      });
      this.setStatus(opts.linkCard ? 'Link card board opened' : 'Sticky board opened');
      return note;
    },

    routePlainText: function (text) {
      // Always clear any previous toast so a prior ambiguous paste cannot linger
      this.dismissSmartToast(true);
      const c = classifyPlainText(text);
      const self = this;
      if (c.kind === 'empty') return;
      if (c.kind === 'url') {
        this.addStickyFromText(c.href, {
          linkCard: true,
          linkHref: c.href,
          domain: c.domain,
          boardName: c.domain,
          color: 'blue'
        });
        return;
      }
      if (c.kind === 'tabular') {
        this.showSmartToast(
          '<strong>Looks like a table</strong> (' + c.table.rows + '×' + c.table.columns +
          '). Add as a table in a new Wordpad page?',
          [
            {
              label: 'Add as table',
              primary: true,
              run: function () { self.createWordpadFromTable(c.text, c.table.delimiter, 'Pasted table'); }
            },
            {
              label: 'As Wordpad text',
              run: function () { self.createWordpadFromText(c.text, 'Pasted text'); }
            }
          ]
        );
        return;
      }
      if (c.kind === 'sticky') {
        this.addStickyFromText(c.text);
        this.setStatus('Sticky note (' + c.length + ' chars, ≤' + PASTE_STICKY_MAX + ')');
        return;
      }
      if (c.kind === 'wordpad') {
        this.createWordpadFromText(c.text, 'Pasted text');
        this.setStatus('Wordpad page (' + c.length + ' chars, ≥' + PASTE_WORDPAD_MIN + ')');
        return;
      }
      if (c.kind === 'ambiguous-text') {
        this.showSmartToast(
          '<strong>Paste text</strong> (' + c.length + ' chars; sticky if ≤' + PASTE_STICKY_MAX +
          ', Wordpad if ≥' + PASTE_WORDPAD_MIN + '). Sticky note or Wordpad page?',
          [
            {
              label: 'Sticky note',
              primary: true,
              run: function () { self.addStickyFromText(c.text); }
            },
            {
              label: 'Wordpad',
              run: function () { self.createWordpadFromText(c.text, 'Pasted text'); }
            }
          ]
        );
      }
    },

    handleGlobalPaste: function (e) {
      const cd = e.clipboardData;
      if (!cd) return;
      const inField = isEditableTarget(e.target);

      // Images always auto-route to new Annotate (even when a field is focused)
      const items = cd.items ? Array.prototype.slice.call(cd.items) : [];
      for (let i = 0; i < items.length; i++) {
        if (items[i].type && items[i].type.indexOf('image/') === 0) {
          e.preventDefault();
          e.stopPropagation();
          this.dismissSmartToast(true);
          const file = items[i].getAsFile();
          if (file) {
            const self = this;
            readFileAsDataUrl(file).then(function (url) {
              return self.createAnnotateFromImage(url, 'Pasted image');
            });
          }
          return;
        }
      }

      // Files from paste (some browsers)
      const files = cd.files ? Array.prototype.slice.call(cd.files) : [];
      if (files.length) {
        e.preventDefault();
        e.stopPropagation();
        this.dismissSmartToast(true);
        this.routeFiles(files);
        return;
      }

      // Text: only when not typing into an editor (so sticky/Wordpad typing still works)
      if (inField) return;
      // Prefer plain text only — never route on HTML length
      const text = cd.getData('text/plain') || '';
      if (text.length) {
        e.preventDefault();
        e.stopPropagation();
        this.routePlainText(text);
      }
    },

    handleGlobalDrop: function (e) {
      const dt = e.dataTransfer;
      if (!dt) return;
      this.dismissSmartToast(true);
      const files = dt.files ? Array.prototype.slice.call(dt.files) : [];
      if (files.length) {
        this.routeFiles(files);
        return;
      }
      // Text drop — plain text only
      const text = dt.getData('text/plain');
      if (text && text.trim()) {
        this.routePlainText(text);
      }
    },

    routeFiles: function (files) {
      const self = this;
      if (!files || !files.length) return;
      this.dismissSmartToast(true);

      const images = [];
      const texts = [];
      const jsons = [];
      const other = [];

      files.forEach(function (f) {
        const name = f.name || '';
        const type = f.type || '';
        if (type.indexOf('image/') === 0 || isImageExt(name)) {
          images.push(f);
        } else if (isJsonExt(name) || type === 'application/json') {
          jsons.push(f);
        } else if (isTextExt(name) || type.indexOf('text/') === 0) {
          texts.push(f);
        } else {
          other.push(f);
        }
      });

      // Multiple images → one Annotate board each (cascade names)
      if (images.length) {
        let chain = Promise.resolve();
        const created = [];
        images.forEach(function (file, idx) {
          chain = chain.then(function () {
            return readFileAsDataUrl(file).then(function (url) {
              const label = images.length > 1
                ? ('Image ' + (idx + 1) + (file.name ? ' · ' + file.name : ''))
                : (file.name ? file.name.replace(/\.[^.]+$/, '') : 'Dropped image');
              // create without opening until last (except single)
              return prepareAnnotateImage(url).then(function (prepared) {
                const open = idx === images.length - 1;
                const board = self.createBoard({
                  name: label.slice(0, 48),
                  templateId: 'snip',
                  state: {
                    tool: 'highlight',
                    strokeColor: '#e03131',
                    imageDataUrl: prepared,
                    textLayers: []
                  },
                  open: open,
                  silent: !open
                });
                created.push(board);
              });
            });
          });
        });
        chain.then(function () {
          self.setStatus(
            created.length === 1
              ? 'Opened Annotate from image'
              : ('Created ' + created.length + ' Annotate boards from images')
          );
        }).catch(function (err) {
          console.warn(err);
          self.setStatus('Some images failed to import', 'error');
        });
      }

      // Text files → Wordpad each; open the last text board if no images
      if (texts.length) {
        let textChain = Promise.resolve();
        texts.forEach(function (file, idx) {
          textChain = textChain.then(function () {
            return readFileAsText(file).then(function (text) {
              const name = (file.name || 'Text').replace(/\.[^.]+$/, '');
              const isLast = idx === texts.length - 1;
              const shouldOpen = isLast && images.length === 0;
              self.createBoard({
                name: name.slice(0, 48),
                templateId: 'wordpad',
                state: { html: textToHtmlParagraphs(text) },
                open: shouldOpen,
                silent: !shouldOpen
              });
              if (isLast) {
                self.setStatus(
                  texts.length === 1
                    ? ('Opened Wordpad from ' + (file.name || 'text file'))
                    : ('Created ' + texts.length + ' Wordpad boards from text files')
                );
              }
            });
          });
        });
        textChain.catch(function () {
          self.setStatus('Failed to read text file', 'error');
        });
      }

      // JSON → never silent; toast to import as board(s)
      jsons.forEach(function (file) {
        readFileAsText(file).then(function (raw) {
          let data;
          try {
            data = JSON.parse(raw);
          } catch (err) {
            self.setStatus('Dropped JSON is not valid JSON', 'error');
            return;
          }
          const fname = file.name || 'file.json';
          self.showSmartToast(
            '<strong>Import JSON as board(s)?</strong> “' + fname.replace(/[<>&]/g, '') +
            '” will be imported into your library using the normal board import. This cannot be undone easily.',
            [
              {
                label: 'Import as board(s)',
                primary: true,
                run: function () { self.importData(data); }
              }
            ]
          );
        }).catch(function () {
          self.setStatus('Failed to read JSON file', 'error');
        });
      });

      if (other.length && !images.length && !texts.length && !jsons.length) {
        this.setStatus('Unsupported file type for drop', 'error');
      }
    },

    exportPng: function () {
      this.snapshotCurrent();
      if (!this.instance || typeof this.instance.exportPng !== 'function') {
        this.setStatus('PNG export not available for this board type', 'error');
        return;
      }
      const dataUrl = this.instance.exportPng();
      if (!dataUrl) {
        this.setStatus('Nothing to export as PNG', 'error');
        return;
      }
      const board = this.currentBoard();
      downloadDataUrl(safeName(board && board.name) + '.png', dataUrl);
      this.setStatus('Exported PNG');
    },

    exportText: function () {
      this.snapshotCurrent();
      if (!this.instance || typeof this.instance.exportText !== 'function') {
        this.setStatus('Text export not available for this board type', 'error');
        return;
      }
      const text = this.instance.exportText();
      if (text == null) {
        this.setStatus('Nothing to export as text', 'error');
        return;
      }
      const board = this.currentBoard();
      downloadText(safeName(board && board.name) + '.txt', text, 'text/plain;charset=utf-8');
      this.setStatus('Exported text');
    },

    // ----- Kanban promote (Tier 4) -----
    listKanbanBoards: function () {
      return (this.store.boards || []).filter(function (b) { return b.templateId === 'kanban'; });
    },

    /**
     * Ensure a kanban board's state is normalized and has at least default columns.
     * Mutates board.state; returns normalized state.
     */
    ensureKanbanState: function (board) {
      if (!board) return null;
      board.state = normalizeKanbanState(board.state || {});
      return board.state;
    },

    /**
     * Add a card to a Kanban board (by id). Does not open the board unless open is true.
     * Returns { board, cardId, columnId }.
     */
    addCardToKanbanBoard: function (boardId, text, opts) {
      opts = opts || {};
      this.snapshotCurrent();
      const board = this.getBoard(boardId);
      if (!board || board.templateId !== 'kanban') return null;
      const st = this.ensureKanbanState(board);
      let col = null;
      if (opts.columnId) {
        col = st.columns.find(function (c) { return c.id === opts.columnId; });
      }
      if (!col) col = st.columns[0];
      if (!col) return null;
      const cardId = uid('card');
      const card = {
        id: cardId,
        text: typeof text === 'string' ? text : '',
        color: opts.color || 'yellow',
        colorAuto: opts.colorAuto !== false,
        lockedTriggerKey: opts.lockedTriggerKey || null,
        lastAutoTrigger: opts.lastAutoTrigger || null
      };
      // Apply auto-color heuristics once
      if (card.colorAuto !== false) {
        const resolved = resolveAutoColor(card.text, (this.store.settings && this.store.settings.autoColorRules) || defaultAutoColorRules());
